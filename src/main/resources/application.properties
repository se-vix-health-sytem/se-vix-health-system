spring.application.name=vix-health-system

# =============================================================
# DATABASE — H2 file-based (PostgreSQL-compat mode)
# Active profile for development and demo; switch to the
# PostgreSQL block below for staging/production.
# =============================================================

# PostgreSQL (disabled — uncomment for production)
#spring.datasource.url=jdbc:postgresql://localhost:5432/VIX-health-system
#spring.datasource.username=postgres
#spring.datasource.password=1234
#spring.datasource.driver-class-name=org.postgresql.Driver

# H2 persists to ./data/vixdb; MODE=PostgreSQL enables PostgreSQL dialect compatibility
spring.datasource.url=jdbc:h2:file:./data/vixdb;MODE=PostgreSQL;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# =============================================================
# H2 CONSOLE — browser-accessible SQL client at /h2-console
# Disable in production to avoid exposing an unauthenticated SQL shell
# =============================================================
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# =============================================================
# SCHEMA & SEED DATA INITIALISATION
# =============================================================

# Always run schema.sql and data.sql on startup (idempotent scripts required)
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:database/schema.sql
spring.sql.init.data-locations=classpath:database/data.sql

# =============================================================
# JPA / HIBERNATE
# =============================================================

# "none" — schema is managed by schema.sql, not by Hibernate DDL auto-generation.
# Change to "validate" when switching to PostgreSQL to catch schema drift.
spring.jpa.hibernate.ddl-auto=none

# Ensures the DataSource is fully initialised before Hibernate tries to validate/use it
spring.jpa.defer-datasource-initialization=true

# Log generated SQL (disable in production to reduce log verbosity)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Use exact column/table names from the entity model — no camelCase-to-snake_case conversion
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.hibernate.naming.implicit-strategy=org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyJpaImpl

# =============================================================
# FIREBASE AUTHENTICATION
# =============================================================

# Set to false in test profiles to skip Firebase SDK initialisation
firebase.enabled=true

# Classpath location of the Firebase Admin SDK service-account JSON
firebase.service-account=classpath:firebase/firebase-service-account.json

# Web API key used by the mock SPID/CIE login flow to exchange credentials for ID tokens
firebase.web-api-key=AIzaSyD-f-UJJC3L2PZOUrxkPhh6uegPkrgXa_4

# =============================================================
# SERVER
# =============================================================
server.port=8080
