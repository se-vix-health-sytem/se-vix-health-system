spring.application.name=vix-health-system

# PostgreSQL Database
#spring.datasource.url=jdbc:postgresql://localhost:5432/VIX-health-system
#spring.datasource.username=postgres
#spring.datasource.password=1234
#spring.datasource.driver-class-name=org.postgresql.Driver

# H2 Database
spring.datasource.url=jdbc:h2:mem:vixdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:database/schema.sql
spring.sql.init.data-locations=classpath:database/data.sql

#spring.jpa.hibernate.ddl-auto=validate for PostgreSQL
spring.jpa.hibernate.ddl-auto=none
spring.jpa.defer-datasource-initialization=true

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.hibernate.naming.implicit-strategy=org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyJpaImpl

firebase.enabled=false
firebase.service-account=classpath:firebase/firebase-service-account.json
app.demo-reset-email=vivianafrak@gmail.com

server.port=8080