<!-- src/main/resources/templates/patient/select-slot.html -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Select Time Slot</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <div class="card">
        <div class="card-header bg-primary text-white">
            <h3>Select Time Slot</h3>
        </div>
        <div class="card-body">
            <h5>Dr. <span th:text="${doctor.name} + ' ' + ${doctor.surname}">Doctor</span></h5>
            <p><strong>Specialty:</strong> <span th:text="${doctor.specialty}">Cardiology</span></p>

            <form th:action="@{/patient/appointments/book}" method="post">
                <input type="hidden" name="doctorId" th:value="${doctor.id}">

                <label class="form-label">Select Date & Time:</label>
                <select name="dateTime" class="form-select" required>
                    <option value="">Choose a time slot...</option>
                    <option th:each="slot : ${availableSlots}"
                            th:value="${slot}"
                            th:text="${#temporals.format(slot, 'dd/MM/yyyy HH:mm')}">
                    </option>
                </select>

                <button type="submit" class="btn btn-success mt-3">Confirm Booking</button>
                <a href="/patient/appointments/book" class="btn btn-secondary mt-3">Back</a>
            </form>
        </div>
    </div>
</div>
</body>
</html>
