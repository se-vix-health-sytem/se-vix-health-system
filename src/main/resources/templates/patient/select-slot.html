<!DOCTYPE html>
<!--
==============================================================================
  FILE:    patient/select-slot.html
  ACCESS:  ROLE_PATIENT (session.patient required)
  PURPOSE: Step 2 of the booking flow: shows available time slots for the
           chosen specialist and lets the patient confirm a booking.

  Model attributes:
    - specialist (MedicalSpecialist): the selected doctor
    - availableSlots (List<LocalDateTime>): open appointment slots

  Dependencies:
    - fragments/head, fragments/dashboard-nav, fragments/footer
==============================================================================
-->
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Select Time Slot')}"></head>
<body>
<div th:replace="~{fragments/dashboard-nav :: dashboardNav}"></div>

<div class="dashboard-content" style="margin-left: 280px;">
    <div class="container p-4" style="max-width: 700px;">
        <div class="card">
            <div class="card-header">
                <h3 class="mb-0 font-display"><i class="bi bi-calendar-week me-2"></i> Select Time Slot</h3>
            </div>
            <div class="card-body">
                <div class="mb-4">
                    <h5>Dr. <span th:text="${specialist.name} + ' ' + ${specialist.surname}"></span></h5>
                    <p class="text-muted">
                        <i class="bi bi-stethoscope me-1"></i> <span th:text="${specialist.specialty}">Specialty</span>
                        <span class="mx-2">|</span>
                        <i class="bi bi-card-list me-1"></i> License: <span th:text="${specialist.licenseNumber}">-</span>
                    </p>
                </div>

                <!-- Embed available slots as JSON for JS to read -->
                <script th:inline="javascript">
                    const AVAILABLE_SLOTS = /*[[${availableSlots != null ? availableSlots.![#temporals.format(#this, 'yyyy-MM-dd''T''HH:mm')] : {}}]]*/ [];
                </script>

                <div th:if="${availableSlots == null or availableSlots.isEmpty()}" class="alert alert-warning mb-4">
                    <i class="bi bi-calendar-x me-2"></i>
                    No available slots found for this specialist in the next 14 days.
                </div>

                <form th:action="@{/patient/appointments/book}" method="post" th:if="${availableSlots != null and !availableSlots.isEmpty()}">
                    <input type="hidden" name="specialistId" th:value="${specialist.id}">
                    <input type="hidden" name="dateTime" id="selectedDateTime">

                    <!-- Step 1: pick a date -->
                    <div class="mb-4">
                        <label class="form-label">Step 1: Pick a date</label>
                        <input type="date" id="datePicker" class="form-control"
                               style="max-width:220px;"
                               th:min="${#temporals.format(availableSlots[0], 'yyyy-MM-dd')}"
                               th:max="${#temporals.format(availableSlots[availableSlots.size()-1], 'yyyy-MM-dd')}">
                    </div>

                    <!-- Step 2: pick a time slot -->
                    <div class="mb-4" id="slotSection" style="display:none;">
                        <label class="form-label">Step 2: Choose a time slot</label>
                        <div id="slotGrid" class="d-flex flex-wrap gap-2 mt-2"></div>
                        <div id="noSlots" class="text-muted small mt-2" style="display:none;">
                            No slots available on this date.
                        </div>
                    </div>

                    <!-- Selected summary -->
                    <div id="selectedSummary" class="alert mb-4"
                         style="display:none;background:var(--vix-gold-pale);border:1px solid var(--vix-gold);color:var(--vix-text);">
                        <i class="bi bi-calendar-check me-2" style="color:var(--vix-gold);"></i>
                        <span id="selectedLabel"></span>
                    </div>

                    <div class="d-flex gap-3">
                        <button type="submit" id="confirmBtn" class="btn btn-primary rounded-pill px-5" disabled>
                            <i class="bi bi-check-circle me-2"></i>Confirm Booking
                        </button>
                        <a th:href="@{/patient/appointments/book}" class="btn btn-outline-secondary rounded-pill">
                            <i class="bi bi-arrow-left me-1"></i>Back
                        </a>
                    </div>
                </form>

                <div th:if="${availableSlots == null or availableSlots.isEmpty()}" class="mt-3">
                    <a th:href="@{/patient/appointments/book}" class="btn btn-outline-secondary rounded-pill">
                        <i class="bi bi-arrow-left me-1"></i>Back
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
(function () {
    const datePicker    = document.getElementById('datePicker');
    const slotSection   = document.getElementById('slotSection');
    const slotGrid      = document.getElementById('slotGrid');
    const noSlots       = document.getElementById('noSlots');
    const summary       = document.getElementById('selectedSummary');
    const summaryLabel  = document.getElementById('selectedLabel');
    const hiddenDT      = document.getElementById('selectedDateTime');
    const confirmBtn    = document.getElementById('confirmBtn');

    if (!datePicker) return; // no slots → form not rendered

    // Restrict date picker to only dates that have at least one slot
    const slotDates = new Set(AVAILABLE_SLOTS.map(s => s.slice(0, 10)));
    datePicker.min = [...slotDates].sort()[0];
    datePicker.max = [...slotDates].sort().slice(-1)[0];

    datePicker.addEventListener('input', function () {
        const chosen = this.value;
        const slots  = AVAILABLE_SLOTS.filter(s => s.startsWith(chosen));

        slotGrid.innerHTML = '';
        hiddenDT.value = '';
        confirmBtn.disabled = true;
        summary.style.display = 'none';

        if (slots.length === 0) {
            slotSection.style.display = 'block';
            noSlots.style.display     = 'block';
            return;
        }

        noSlots.style.display = 'none';
        slotSection.style.display = 'block';

        slots.forEach(function (slot) {
            const time = slot.slice(11); // HH:mm
            const btn  = document.createElement('button');
            btn.type      = 'button';
            btn.className = 'btn btn-sm rounded-pill slot-btn';
            btn.style.cssText = 'border:1.5px solid var(--vix-gold);color:var(--vix-crimson);background:#fff;min-width:80px;';
            btn.textContent = time;
            btn.dataset.value = slot;

            btn.addEventListener('click', function () {
                document.querySelectorAll('.slot-btn').forEach(b => {
                    b.style.background = '#fff';
                    b.style.color      = 'var(--vix-crimson)';
                });
                this.style.background = 'var(--vix-gold)';
                this.style.color      = '#fff';

                hiddenDT.value     = slot;
                confirmBtn.disabled = false;

                const [date, t] = slot.split('T');
                const [y, m, d] = date.split('-');
                const label = `${d}/${m}/${y} at ${t}`;
                summaryLabel.textContent = 'Selected: ' + label;
                summary.style.display    = 'block';
            });

            slotGrid.appendChild(btn);
        });
    });
})();
</script>
</body>
</html>
