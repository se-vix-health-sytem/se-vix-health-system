<!-- src/main/resources/templates/patient/book-appointment.html -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Book Appointment</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <div class="card" style="max-width: 600px; margin: 0 auto;">
        <div class="card-header bg-primary text-white">
            <h3>Book an Appointment</h3>
        </div>
        <div class="card-body">
            <div class="alert alert-info">
                Select a specialist to see available time slots.
            </div>

            <div th:each="doctor : ${specialists}" class="card mb-2">
                <div class="card-body">
                    <h5>Dr. <span th:text="${doctor.name} + ' ' + ${doctor.surname}">Doctor Name</span></h5>
                    <p><strong>Specialty:</strong> <span th:text="${doctor.specialty}">Cardiology</span></p>
                    <p><strong>License:</strong> <span th:text="${doctor.licenseNumber}">LIC123</span></p>
                    <a th:href="@{/patient/appointments/book/{id}(id=${doctor.id})}"
                       class="btn btn-primary">Select Doctor</a>
                </div>
            </div>

            <a href="/patient/dashboard" class="btn btn-secondary">Back to Dashboard</a>
        </div>
    </div>
</div>
</body>
</html>
