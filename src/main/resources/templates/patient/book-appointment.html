<!DOCTYPE html>
<!--
==============================================================================
  FILE:    patient/book-appointment.html
  ACCESS:  ROLE_PATIENT (session.patient required)
  PURPOSE: Step 1 of the booking flow — lets the patient pick a specialist
           from the list before proceeding to time-slot selection.

  Model attributes:
    - specialists (List<MedicalSpecialist>) — available specialists

  Dependencies:
    - fragments/head, fragments/dashboard-nav, fragments/footer
==============================================================================
-->
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Book Appointment')}"></head>
<body>
<div th:replace="~{fragments/dashboard-nav :: dashboardNav}"></div>

<div class="dashboard-content" style="margin-left: 280px;">
    <div class="container p-4" style="max-width: 800px;">
        <div class="card">
            <div class="card-header">
                <h3 class="mb-0 font-display"><i class="bi bi-calendar-plus me-2"></i> Book an Appointment</h3>
            </div>
            <div class="card-body">
                <div class="alert alert-info mb-4">
                    <i class="bi bi-info-circle me-2"></i>
                    Select a specialist to see available time slots.
                </div>

                <div th:if="${specialists != null and !specialists.isEmpty()}">
                    <div th:each="doc : ${specialists}" class="card mb-3">
                        <div class="card-body">
                            <div class="row align-items-center">
                                <div class="col-md-8">
                                    <h5 class="font-display mb-1" style="color: var(--vix-crimson);">
                                        Dr. <span th:text="${doc.name} + ' ' + ${doc.surname}"></span>
                                    </h5>
                                    <p class="mb-1">
                                        <span class="badge bg-primary me-2" th:text="${doc.specialty}">Specialty</span>
                                        <small class="text-muted">License: <span th:text="${doc.licenseNumber}">LIC123</span></small>
                                    </p>
                                    <div class="mt-2">
                                        <i class="bi bi-envelope me-1"></i> <small th:text="${doc.email}">email@example.com</small>
                                    </div>
                                </div>
                                <div class="col-md-4 text-end">
                                    <a th:href="@{/patient/appointments/book/{id}(id=${doc.id})}" class="btn btn-primary rounded-pill px-4">
                                        Select <i class="bi bi-arrow-right ms-2"></i>
                                    </a>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div th:if="${specialists == null or specialists.isEmpty()}" class="text-center py-5">
                    <i class="bi bi-person-x fs-1 text-muted"></i>
                    <p class="text-muted mt-2">No specialists available at this time.</p>
                </div>

                <hr class="my-4">

                <div class="text-center">
                    <a th:href="@{/patient/dashboard}" class="btn btn-outline-secondary rounded-pill">
                        <i class="bi bi-arrow-left me-1"></i> Back to Dashboard
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
