<!-- src/main/resources/templates/patient/dashboard.html -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Patient Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <div class="card">
        <div class="card-header bg-success text-white d-flex justify-content-between align-items-center">
            <h2>Welcome, <span th:text="${patient.name} + ' ' + ${patient.surname}">Patient</span></h2>
            <a href="/patient/logout" class="btn btn-light btn-sm">Logout <i class="bi bi-box-arrow-right"></i></a>
        </div>
        <div class="card-body">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <div class="card h-100">
                        <div class="card-body">
                            <h5><i class="bi bi-calendar-check"></i> My Appointments</h5>
                            <p>View, book, or cancel appointments</p>
                            <a href="/patient/appointments" class="btn btn-success">View Appointments</a>
                            <a href="/patient/appointments/book" class="btn btn-primary">Book New</a>
                        </div>
                    </div>
                </div>
                <div class="col-md-6 mb-3">
                    <div class="card h-100">
                        <div class="card-body">
                            <h5><i class="bi bi-file-medical"></i> Medical Records</h5>
                            <p>View your health records and history</p>
                            <a href="/patient/records" class="btn btn-info">View Records</a>
                        </div>
                    </div>
                </div>
                <div class="col-md-6 mb-3">
                    <div class="card h-100">
                        <div class="card-body">
                            <h5><i class="bi bi-person-circle"></i> My Profile</h5>
                            <p>Update personal information</p>
                            <a href="/patient/profile" class="btn btn-secondary">View Profile</a>
                        </div>
                    </div>
                </div>
                <div class="col-md-6 mb-3">
                    <div class="card h-100">
                        <div class="card-body">
                            <h5><i class="bi bi-question-circle"></i> Find Specialist</h5>
                            <p>Not sure which doctor to see?</p>
                            <a href="/questionnaire" class="btn btn-warning">Take Questionnaire</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
