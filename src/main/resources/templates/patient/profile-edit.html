<!DOCTYPE html>
<!--
==============================================================================
  FILE:    patient/profile-edit.html
  ACCESS:  ROLE_PATIENT (session.patient required)
  PURPOSE: Editable form for all non-identity patient profile fields.
           Identity fields (fiscal code, patient ID) are shown read-only.

  Model attributes:
    - patient (Patient) — the authenticated patient

  Dependencies:
    - fragments/head, fragments/dashboard-nav, fragments/footer
==============================================================================
-->
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Edit Profile')}"></head>
<body>
<div th:replace="~{fragments/dashboard-nav :: dashboardNav}"></div>

<div class="dashboard-content" style="margin-left: 280px;">
    <div class="container p-4" style="max-width: 700px;">
        <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center">
                <h3 class="mb-0 font-display"><i class="bi bi-pencil-square me-2"></i>Edit Profile</h3>
                <span class="badge rounded-pill px-3 py-2"
                      style="background: var(--vix-crimson);">Patient</span>
            </div>
            <div class="card-body">

                <!-- Avatar row -->
                <div class="text-center mb-4 py-3" style="background: var(--vix-cream); border-radius: 0.75rem;">
                    <div class="rounded-circle mx-auto d-flex align-items-center justify-content-center mb-3"
                         style="width:80px;height:80px;background:var(--vix-crimson);">
                        <i class="bi bi-person-fill text-white fs-2"></i>
                    </div>
                    <h4 class="font-display mb-1"
                        th:text="${patient.name + ' ' + patient.surname}">Name</h4>
                    <div class="text-muted small"
                         th:text="${patient.fiscalCode}">Fiscal Code</div>
                </div>

                <form th:action="@{/patient/profile/update}" method="post">

                    <!-- Personal Details -->
                    <h6 class="text-muted text-uppercase small fw-semibold mb-3 mt-4">
                        <i class="bi bi-person me-2"></i>Personal Details
                    </h6>
                    <div class="row g-3 mb-4">
                        <div class="col-md-6">
                            <label class="form-label">First Name</label>
                            <input type="text" name="name" class="form-control"
                                   th:value="${patient.name}" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Surname</label>
                            <input type="text" name="surname" class="form-control"
                                   th:value="${patient.surname}" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Date of Birth</label>
                            <input type="date" name="birthDate" class="form-control"
                                   th:value="${patient.birthDate != null ? #temporals.format(patient.birthDate, 'yyyy-MM-dd') : ''}">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Place of Birth</label>
                            <input type="text" name="birthPlace" class="form-control"
                                   th:value="${patient.birthPlace ?: ''}">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Gender</label>
                            <select name="gender" class="form-select">
                                <option value="M" th:selected="${patient.gender == 'M' or patient.gender == 77}">Male</option>
                                <option value="F" th:selected="${patient.gender == 'F' or patient.gender == 70}">Female</option>
                            </select>
                        </div>
                    </div>

                    <!-- Contact Details -->
                    <h6 class="text-muted text-uppercase small fw-semibold mb-3">
                        <i class="bi bi-envelope me-2"></i>Contact Details
                    </h6>
                    <div class="row g-3 mb-4">
                        <div class="col-md-6">
                            <label class="form-label">Email Address</label>
                            <input type="email" name="email" class="form-control"
                                   th:value="${patient.email ?: ''}">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Phone Number</label>
                            <input type="tel" name="phoneNumber" class="form-control"
                                   th:value="${patient.phoneNumber ?: ''}">
                        </div>
                    </div>

                    <!-- Identity (read-only) -->
                    <h6 class="text-muted text-uppercase small fw-semibold mb-3">
                        <i class="bi bi-person-vcard me-2"></i>Identification (read-only)
                    </h6>
                    <div class="row g-3 mb-4">
                        <div class="col-md-6">
                            <label class="form-label text-muted small">Fiscal Code</label>
                            <div class="form-control-plaintext fw-semibold font-monospace"
                                 th:text="${patient.fiscalCode ?: '-'}">-</div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label text-muted small">Patient ID</label>
                            <div class="form-control-plaintext text-muted"
                                 th:text="${'#' + patient.id}">-</div>
                        </div>
                    </div>

                    <hr>

                    <div class="d-flex justify-content-between align-items-center flex-wrap gap-2">
                        <a th:href="@{/patient/profile}" class="btn btn-outline-secondary rounded-pill">
                            <i class="bi bi-x-lg me-1"></i>Cancel
                        </a>
                        <button type="submit" class="btn btn-primary rounded-pill px-4">
                            <i class="bi bi-check-lg me-1"></i>Save Changes
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
