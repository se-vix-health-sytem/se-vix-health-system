<!DOCTYPE html>
<!--
==============================================================================
  FILE:    patient/appointments.html
  ACCESS:  ROLE_PATIENT (session.patient required)
  PURPOSE: Lists all the patient's upcoming and past appointments with
           options to reschedule, cancel, or pay.

  Model attributes:
    - upcomingAppointments (List<Appointment>) — future appointments
    - pastAppointments (List<Appointment>) — completed / past appointments
    - message (String) — success flash message
    - error (String) — error flash message

  Dependencies:
    - fragments/head, fragments/dashboard-nav, fragments/footer
==============================================================================
-->
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('My Appointments')}"></head>
<body>
<div th:replace="~{fragments/dashboard-nav :: dashboardNav}"></div>

<div class="dashboard-content" style="margin-left: 280px;">
    <div class="container p-4">
        <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center">
                <h3 class="mb-0 font-display"><i class="bi bi-calendar-check me-2"></i> My Appointments</h3>
                <a th:href="@{/patient/appointments/book}" class="btn btn-light rounded-pill">
                    <i class="bi bi-plus-circle me-1"></i> Book New
                </a>
            </div>
            <div class="card-body">
                <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
                <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

                <!-- Upcoming Appointments -->
                <h4 class="mt-3">Upcoming Appointments</h4>
                <div th:if="${upcomingAppointments != null and !upcomingAppointments.isEmpty()}">
                    <div th:each="apt : ${upcomingAppointments}" class="card mb-3">
                        <div class="card-body">
                            <div class="row align-items-center">
                                <div class="col-md-3">
                                    <strong class="font-display" style="color: var(--vix-crimson);">
                                        <i class="bi bi-calendar-date me-1"></i>
                                        <span th:text="${#temporals.format(apt.dateTime, 'dd/MM/yyyy')}"></span>
                                    </strong><br>
                                    <small class="text-muted">
                                        <i class="bi bi-clock me-1"></i>
                                        <span th:text="${#temporals.format(apt.dateTime, 'HH:mm')}"></span>
                                    </small>
                                </div>
                                <div class="col-md-3">
                                    <i class="bi bi-person-circle me-1"></i>
                                    <span th:if="${apt.medicalSpecialist != null}">
                                        Dr. <span th:text="${apt.medicalSpecialist.name} + ' ' + ${apt.medicalSpecialist.surname}"></span><br>
                                        <small class="text-muted" th:text="${apt.medicalSpecialist.specialty}">Specialty</small>
                                    </span>
                                    <span th:if="${apt.medicalSpecialist == null}" class="text-muted small">No specialist assigned</span>
                                </div>
                                <div class="col-md-2">
                                    <span class="badge" th:classappend="'badge-status-' + ${apt.status?.toLowerCase()}" th:text="${apt.status}">CONFIRMED</span>
                                </div>
                                <div class="col-md-4 text-end">
                                    <div th:if="${!apt.paid}" class="mb-2">
                                        <a th:href="@{/payment/appointment/{id}(id=${apt.id})}" class="btn btn-sm btn-warning">
                                            <i class="bi bi-credit-card me-1"></i> Pay €85.00
                                        </a>
                                    </div>
                                    <div th:if="${apt.paid}">
                                        <span class="badge bg-success mb-2">✓ Paid</span>
                                    </div>
                                    <button class="btn btn-sm btn-outline-secondary me-1" data-bs-toggle="modal"
                                            data-bs-target="#rescheduleModal" th:data-aptid="${apt.id}" th:data-datetime="${apt.dateTime}">
                                        <i class="bi bi-arrow-repeat"></i> Reschedule
                                    </button>
                                    <form th:action="@{/patient/appointments/{id}/cancel(id=${apt.id})}" method="post" class="d-inline">
                                        <button type="submit" class="btn btn-sm btn-outline-danger" onclick="return confirm('Cancel this appointment?')">
                                            <i class="bi bi-x-circle"></i> Cancel
                                        </button>
                                    </form>
                                </div>
                            </div>
                            <div th:if="${apt.notes}" class="mt-2 pt-2 border-top small text-muted">
                                <i class="bi bi-chat me-1"></i> <span th:text="${apt.notes}">Notes</span>
                            </div>
                        </div>
                    </div>
                </div>
                <div th:if="${upcomingAppointments == null or upcomingAppointments.isEmpty()}" class="alert alert-info">
                    <i class="bi bi-info-circle me-2"></i> No upcoming appointments.
                    <a th:href="@{/patient/appointments/book}">Book one now!</a>
                </div>

                <!-- Past Appointments -->
                <h4 class="mt-4">Past Appointments</h4>
                <div th:if="${pastAppointments != null and !pastAppointments.isEmpty()}">
                    <div th:each="apt : ${pastAppointments}" class="card mb-2 bg-light">
                        <div class="card-body">
                            <div class="row align-items-center">
                                <div class="col-md-3">
                                    <span th:text="${#temporals.format(apt.dateTime, 'dd/MM/yyyy HH:mm')}"></span>
                                </div>
                                <div class="col-md-3">
                                    <span th:if="${apt.medicalSpecialist != null}">
                                        Dr. <span th:text="${apt.medicalSpecialist.name} + ' ' + ${apt.medicalSpecialist.surname}"></span>
                                    </span>
                                    <span th:if="${apt.medicalSpecialist == null}" class="text-muted small">N/A</span>
                                </div>
                                <div class="col-md-2">
                                    <span class="badge" th:classappend="'badge-status-' + ${apt.status?.toLowerCase()}" th:text="${apt.status}">COMPLETED</span>
                                </div>
                                <div class="col-md-2" th:if="${apt.paid}">
                                    <span class="badge bg-success">✓ Paid</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div th:if="${pastAppointments == null or pastAppointments.isEmpty()}" class="alert alert-secondary">
                    No past appointments.
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Reschedule Modal -->
<div class="modal fade" id="rescheduleModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header" style="background: var(--vix-crimson); color: white;">
                <h5 class="modal-title">Reschedule Appointment</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <form method="post" th:action="@{/patient/appointments/0/reschedule}" id="rescheduleForm">
                <div class="modal-body">
                    <label class="form-label">New Date & Time:</label>
                    <input type="datetime-local" name="newDateTime" class="form-control" required>
                    <small class="text-muted">Available slots: Monday-Friday, 9am-5pm</small>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-primary">Confirm Reschedule</button>
                </div>
            </form>
        </div>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>

<script>
    var rescheduleModal = document.getElementById('rescheduleModal');
    rescheduleModal.addEventListener('show.bs.modal', function(event) {
        var button = event.relatedTarget;
        var aptId = button.getAttribute('data-aptid');
        var form = document.getElementById('rescheduleForm');
        form.action = '/patient/appointments/' + aptId + '/reschedule';
    });
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
