<!-- src/main/resources/templates/patient/appointments.html -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${pageTitle}">My Appointments</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <div class="card">
        <div class="card-header bg-success text-white">
            <h2><i class="bi bi-calendar-check"></i> <span th:text="${pageTitle}">My Appointments</span></h2>
        </div>
        <div class="card-body">
            <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
            <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

            <div class="mb-3">
                <a href="/patient/appointments/book" class="btn btn-primary">
                    <i class="bi bi-plus-circle"></i> Book New Appointment
                </a>
                <a href="/patient/dashboard" class="btn btn-secondary">
                    <i class="bi bi-arrow-left"></i> Back to Dashboard
                </a>
            </div>

            <h4>Upcoming Appointments</h4>
            <div th:if="${upcomingAppointments.empty}" class="alert alert-info">
                No upcoming appointments. <a href="/patient/appointments/book">Book one now!</a>
            </div>
            <div th:each="apt : ${upcomingAppointments}" class="card mb-2">
                <div class="card-body">
                    <div class="row align-items-center">
                        <div class="col-md-4">
                            <strong><i class="bi bi-calendar-date"></i> Date:</strong>
                            <span th:text="${#temporals.format(apt.dateTime, 'dd/MM/yyyy HH:mm')}">Date</span>
                        </div>
                        <div class="col-md-3">
                            <strong><i class="bi bi-person-circle"></i> Doctor:</strong>
                            <span th:text="${apt.doctor.name} + ' ' + ${apt.doctor.surname}">Doctor</span>
                        </div>
                        <div class="col-md-2">
                            <span class="badge bg-success" th:text="${apt.status}">Status</span>
                        </div>
                        <div class="col-md-3">
                            <button class="btn btn-sm btn-warning" data-bs-toggle="modal"
                                    data-bs-target="#rescheduleModal" th:data-aptid="${apt.id}"
                                    th:data-datetime="${apt.dateTime}">
                                <i class="bi bi-arrow-repeat"></i> Reschedule
                            </button>
                            <form th:action="@{/patient/appointments/{id}/cancel(id=${apt.id})}"
                                  method="post" style="display: inline;">
                                <button type="submit" class="btn btn-sm btn-danger"
                                        onclick="return confirm('Cancel this appointment?')">
                                    <i class="bi bi-x-circle"></i> Cancel
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>

            <h4 class="mt-4">Past Appointments</h4>
            <div th:if="${pastAppointments.empty}" class="alert alert-secondary">
                No past appointments.
            </div>
            <div th:each="apt : ${pastAppointments}" class="card mb-2 bg-light">
                <div class="card-body">
                    <div class="row">
                        <div class="col-md-4">
                            <span th:text="${#temporals.format(apt.dateTime, 'dd/MM/yyyy HH:mm')}">Date</span>
                        </div>
                        <div class="col-md-4">
                            Dr. <span th:text="${apt.doctor.name} + ' ' + ${apt.doctor.surname}">Doctor</span>
                        </div>
                        <div class="col-md-2">
                            <span class="badge bg-secondary" th:text="${apt.status}">Status</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Reschedule Modal -->
<div class="modal fade" id="rescheduleModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Reschedule Appointment</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <form method="post" th:action="${rescheduleUrl}" id="rescheduleForm">
                <div class="modal-body">
                    <input type="hidden" name="apptId" id="rescheduleApptId">
                    <label class="form-label">New Date & Time:</label>
                    <input type="datetime-local" name="newDateTime" class="form-control" required>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-primary">Confirm Reschedule</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    var rescheduleModal = document.getElementById('rescheduleModal');
    rescheduleModal.addEventListener('show.bs.modal', function(event) {
        var button = event.relatedTarget;
        var aptId = button.getAttribute('data-aptid');
        var datetime = button.getAttribute('data-datetime');
        var form = document.getElementById('rescheduleForm');
        form.action = '/patient/appointments/' + aptId + '/reschedule';
    });
</script>
</body>
</html>
