<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Patient Login')}"></head>
<body class="d-flex align-items-center justify-content-center" style="min-height: 100vh; background: linear-gradient(135deg, var(--vix-crimson-dk) 0%, var(--vix-crimson) 100%);">

<div class="login-container" style="background: white; border-radius: 1.5rem; box-shadow: 0 20px 60px rgba(0,0,0,0.3); width: 100%; max-width: 450px;">
    <div class="text-center p-4" style="background: linear-gradient(135deg, var(--vix-crimson) 0%, var(--vix-crimson-dk) 100%); color: white; border-radius: 1.5rem 1.5rem 0 0;">
        <img src="/images/vix-logo.png" alt="VIX" width="70" height="70"
             style="background: white; border-radius: 50%; padding: 6px; margin-bottom: 1rem;">
        <h2 class="font-display">Patient Portal</h2>
        <p class="opacity-75">SPID / CIE Authentication (Simulated)</p>
    </div>

    <div class="p-4">
        <div class="alert alert-info mb-4" style="background: var(--vix-gold-pale); border: 1px solid rgba(184,149,42,0.3); border-radius: 0.75rem;">
            <i class="bi bi-info-circle-fill me-2" style="color: var(--vix-gold);"></i>
            <strong>🔐 SIMULATION MODE</strong><br>
            In production, this would redirect to SPID/CIE portal.
            <br><br>
            <strong>Test Fiscal Codes:</strong><br>
            RSSMRA80A01F205X - Mario Rossi<br>
            BNCLRA92B41L219Y - Laura Bianchi<br>
            VRDGPP75C12H501Z - Giuseppe Verdi
        </div>

        <form th:action="@{/patient/authenticate}" method="post">
            <input type="hidden" name="redirectUrl" th:value="${redirectUrl}">

            <div class="mb-3">
                <label class="form-label">Fiscal Code</label>
                <input type="text" name="fiscalCode" class="form-control"
                       placeholder="Enter your fiscal code (e.g., RSSMRA80A01F205X)" required>
            </div>

            <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

            <button type="submit" class="btn btn-primary w-100 py-2">
                <i class="bi bi-box-arrow-in-right me-2"></i>Login with SPID/CIE
            </button>
        </form>

        <hr class="my-4">

        <div class="text-center">
            <a th:href="@{/login}" class="btn btn-outline-secondary w-100">
                <i class="bi bi-person-badge me-1"></i> Staff Portal Login
            </a>
            <a th:href="@{/}" class="d-block mt-3 text-muted text-decoration-none small">
                <i class="bi bi-arrow-left me-1"></i> Back to Home
            </a>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
