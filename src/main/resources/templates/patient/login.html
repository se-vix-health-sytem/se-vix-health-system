<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Patient Login - SPID/CIE Simulation</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #7a1428 0%, #5a0e1e 100%); min-height: 100vh; }
        .container { max-width: 500px; margin: 100px auto; }
        .card { border-radius: 15px; }
        .card-header { background: #7a1428; color: white; border-radius: 15px 15px 0 0; }
        .spid-btn { background: #0066CC; color: white; margin: 5px; }
        .cie-btn { background: #009933; color: white; margin: 5px; }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <div class="card-header text-center">
            <h2>Patient Access</h2>
            <p>SPID / CIE Authentication (Simulated)</p>
        </div>
        <div class="card-body text-center">
            <div class="alert alert-info">
                <strong>🔐 SIMULATION MODE</strong><br>
                In production, this would redirect to SPID/CIE portal.
                <br><br>
                <strong>Test Fiscal Code:</strong> RSSMRA85M01F205X (Maria Rossi)
            </div>

            <form action="/patient/authenticate" method="post">
                <div class="mb-3">
                    <label class="form-label">Fiscal Code</label>
                    <input type="text" name="fiscalCode" class="form-control"
                           placeholder="Enter your fiscal code (e.g., RSSMRA85M01F205X)" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Login with SPID/CIE</button>
            </form>

            <hr>
            <div class="mt-3">
                <p class="text-muted small">This is a simulation for development purposes.<br>
                    Real implementation would redirect to SPID/CIE identity provider.</p>
            </div>
        </div>
    </div>
</div>
</body>
</html>
