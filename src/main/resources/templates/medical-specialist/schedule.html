<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('My Schedule')}"></head>
<body>
<div th:replace="~{fragments/dashboard-nav :: dashboardNav}"></div>

<div class="dashboard-content" style="margin-left: 280px;">
    <div class="container p-4">
        <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center">
                <h3 class="mb-0 font-display"><i class="bi bi-clock me-2"></i>My Schedule</h3>
                <span class="badge rounded-pill px-3" style="background:var(--vix-crimson);">
                    Dr. <span th:text="${session.user.name + ' ' + session.user.surname}">-</span>
                </span>
            </div>
            <div class="card-body">

                <div th:if="${shifts != null and !shifts.isEmpty()}">
                    <div class="table-responsive">
                        <table class="table table-hover mb-0">
                            <thead style="background: var(--vix-cream);">
                                <tr>
                                    <th>Date</th>
                                    <th>Shift</th>
                                    <th>Notes</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="shift : ${shifts}">
                                    <td th:text="${shift.date != null ? #temporals.format(shift.date,'dd/MM/yyyy') : '-'}">-</td>
                                    <td>
                                        <span class="badge rounded-pill"
                                              th:classappend="${shift.shiftType == 'MORNING' ? 'bg-warning text-dark' :
                                                               shift.shiftType == 'AFTERNOON' ? 'bg-info text-dark' : 'bg-dark'}"
                                              th:text="${shift.shiftType}">-</span>
                                    </td>
                                    <td class="small text-muted" th:text="${shift.notes ?: '-'}">-</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <div th:if="${shifts == null or shifts.isEmpty()}"
                     class="text-center py-4 text-muted">
                    <i class="bi bi-calendar-event fs-1"></i>
                    <p class="mt-3">No shifts assigned to your account yet.</p>
                    <p class="small">Contact your Staff Manager to request schedule changes.</p>
                    <a th:href="@{/medical-specialist/dashboard}" class="btn btn-outline-secondary rounded-pill">
                        <i class="bi bi-arrow-left me-1"></i>Dashboard
                    </a>
                </div>

            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
