<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('My Surgeries')}"></head>
<body>
<div th:replace="~{fragments/dashboard-nav :: dashboardNav}"></div>

<div class="dashboard-content" style="margin-left: 280px;">
    <div class="container p-4">

        <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-3">
            <div>
                <p class="section-eyebrow mb-1">Medical Specialist</p>
                <h2 class="font-display mb-0" style="color: var(--vix-crimson);">
                    <i class="bi bi-scissors me-2"></i>My Surgeries
                </h2>
            </div>
            <span class="badge rounded-pill fs-6 px-3 py-2"
                  style="background: var(--vix-crimson);"
                  th:text="${surgeries != null ? surgeries.size() + ' procedure(s)' : '0 procedure(s)'}">0 procedure(s)</span>
        </div>

        <div th:if="${message != null}" class="alert alert-info" th:text="${message}"></div>
        <div th:if="${error != null}" class="alert alert-danger" th:text="${error}"></div>

        <!-- Surgeries list -->
        <div th:if="${surgeries != null and !surgeries.isEmpty()}">
            <div class="row g-4">
                <div class="col-12" th:each="s : ${surgeries}">
                    <div class="card border-0 shadow-sm">
                        <div class="card-body p-4">
                            <div class="row align-items-start g-3">

                                <!-- Date column -->
                                <div class="col-md-2 text-center">
                                    <div class="p-3 rounded-3" style="background: var(--vix-cream);">
                                        <div class="fw-bold font-display" style="color: var(--vix-crimson); font-size: 1.4rem;"
                                             th:text="${s.dateTime != null ? #temporals.format(s.dateTime, 'dd') : '-'}">01</div>
                                        <div class="small text-muted"
                                             th:text="${s.dateTime != null ? #temporals.format(s.dateTime, 'MMM yyyy') : '-'}">Jan 2025</div>
                                        <div class="small mt-1"
                                             th:text="${s.dateTime != null ? #temporals.format(s.dateTime, 'HH:mm') : '-'}">09:00</div>
                                    </div>
                                </div>

                                <!-- Details column -->
                                <div class="col-md-7">
                                    <h5 class="font-display mb-1" style="color: var(--vix-crimson);"
                                        th:text="${s.name}">Surgery Name</h5>
                                    <p class="text-muted mb-2 small"
                                       th:text="${s.description ?: 'No description provided.'}">Description</p>

                                    <div th:if="${s.specializedRoom != null}" class="small">
                                        <i class="bi bi-door-open me-1" style="color: var(--vix-gold);"></i>
                                        <span th:text="'Room: ' + ${s.specializedRoom.number ?: 'Room #' + s.specializedRoom.id}">Room</span>
                                    </div>
                                    <div th:unless="${s.specializedRoom != null}" class="small text-muted">
                                        <i class="bi bi-door-open me-1"></i>
                                        <span>Room: Not assigned yet</span>
                                    </div>
                                    <div class="small mt-1">
                                        <i class="bi bi-file-medical me-1" style="color: var(--vix-gold);"></i>
                                        <span th:text="'Medical Record #' + ${s.medicalRecord.id}">Record</span>
                                    </div>
                                </div>

                                <!-- Status column -->
                                <div class="col-md-3 text-md-end">
                                    <span class="badge rounded-pill px-3 py-2"
                                          th:classappend="${s.dateTime != null and s.dateTime.isBefore(T(java.time.LocalDateTime).now())} ? 'bg-secondary' : 'bg-primary'"
                                          th:text="${s.dateTime != null and s.dateTime.isBefore(T(java.time.LocalDateTime).now())} ? 'Completed' : 'Scheduled'">
                                        Status
                                    </span>
                                    <div class="small text-muted mt-2" th:if="${s.dateTime != null and s.dateTime.isAfter(T(java.time.LocalDateTime).now())}">
                                        <i class="bi bi-calendar me-1"></i>
                                        Upcoming
                                    </div>
                                    <div class="small text-muted mt-2" th:if="${s.dateTime != null and s.dateTime.isBefore(T(java.time.LocalDateTime).now())}">
                                        <i class="bi bi-check-circle me-1"></i>
                                        Performed
                                    </div>
                                </div>

                                <!-- Patient info -->
                                <div class="col-12 mt-2 pt-2 border-top">
                                    <div class="small text-muted">
                                        <i class="bi bi-person me-1"></i>
                                        Patient: <strong th:text="${s.medicalRecord?.patient?.name + ' ' + s.medicalRecord?.patient?.surname ?: 'Unknown'}">-</strong>
                                    </div>
                                </div>

                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Empty state -->
        <div th:if="${surgeries == null or surgeries.isEmpty()}" class="text-center py-5">
            <div class="rounded-circle mx-auto d-flex align-items-center justify-content-center mb-4"
                 style="width:90px;height:90px;background:var(--vix-cream);">
                <i class="bi bi-scissors fs-1" style="color:var(--vix-crimson);opacity:.5;"></i>
            </div>
            <h5 class="font-display text-muted">No surgeries recorded yet</h5>
            <p class="text-muted small">Surgeries you schedule for patients will appear here.</p>
            <a th:href="@{/medical-specialist/patients/search}" class="btn btn-primary rounded-pill mt-2">
                <i class="bi bi-search me-2"></i>Find a Patient to Schedule Surgery
            </a>
        </div>

    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
