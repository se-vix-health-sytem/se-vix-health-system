<!DOCTYPE html>
<!--
==============================================================================
  FILE:    medical-specialist/appointments.html
  ACCESS:  ROLE_MEDICALSPECIALIST (session.user required)
  PURPOSE: Full appointment table for the specialist showing patient, date,
           duration, status, and payment state for every assigned appointment.

  Model attributes:
    - appointments (List<Appointment>) — all appointments for this specialist

  Dependencies:
    - fragments/head, fragments/dashboard-nav, fragments/footer
==============================================================================
-->
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('My Appointments')}"></head>
<body>
<div th:replace="~{fragments/dashboard-nav :: dashboardNav}"></div>

<div class="dashboard-content" style="margin-left: 280px;">
    <div class="container p-4">
        <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center">
                <h3 class="mb-0 font-display"><i class="bi bi-calendar-week me-2"></i>My Appointments</h3>
                <span class="badge bg-secondary rounded-pill"
                      th:text="${appointments != null ? appointments.size() + ' total' : '0 total'}">0 total</span>
            </div>
            <div class="card-body p-0">

                <div th:if="${appointments != null and !appointments.isEmpty()}">
                    <div class="table-responsive">
                        <table class="table table-hover mb-0">
                            <thead style="background: var(--vix-cream);">
                                <tr>
                                    <th>#</th>
                                    <th>Patient</th>
                                    <th>Date &amp; Time</th>
                                    <th>Duration</th>
                                    <th>Status</th>
                                    <th>Payment</th>
                                    <th>Notes</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="appt : ${appointments}">
                                    <td class="small text-muted" th:text="${appt.id}">-</td>
                                    <td>
                                        <i class="bi bi-person me-1" style="color:var(--vix-crimson);"></i>
                                        <span th:text="${appt.patient != null ? appt.patient.name + ' ' + appt.patient.surname : 'Unknown'}">-</span>
                                    </td>
                                    <td th:text="${appt.dateTime != null ? #temporals.format(appt.dateTime, 'dd/MM/yyyy HH:mm') : '-'}">-</td>
                                    <td class="small" th:text="${appt.duration + ' min'}">-</td>
                                    <td>
                                        <span class="badge rounded-pill"
                                              th:classappend="${appt.status == 'CONFIRMED' ? 'bg-success' :
                                                               appt.status == 'PENDING'    ? 'bg-warning text-dark' :
                                                               appt.status == 'CANCELLED'  ? 'bg-danger' :
                                                               appt.status == 'COMPLETED'  ? 'bg-secondary' : 'bg-info'}"
                                              th:text="${appt.status ?: '-'}">-</span>
                                    </td>
                                    <td>
                                        <span th:if="${appt.paymentStatus}"
                                              class="badge bg-success rounded-pill">Paid</span>
                                        <span th:unless="${appt.paymentStatus}"
                                              class="badge bg-warning text-dark rounded-pill">Unpaid</span>
                                    </td>
                                    <td class="small text-muted" th:text="${appt.notes ?: '-'}">-</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <div th:if="${appointments == null or appointments.isEmpty()}"
                     class="text-center py-5 text-muted">
                    <i class="bi bi-calendar2 fs-1"></i>
                    <p class="mt-3">No appointments assigned to you yet.</p>
                    <a th:href="@{/medical-specialist/dashboard}" class="btn btn-outline-secondary rounded-pill">
                        <i class="bi bi-arrow-left me-1"></i>Dashboard
                    </a>
                </div>

            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
