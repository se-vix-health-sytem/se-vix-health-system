<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('My Appointments')}"></head>
<body>
<div th:replace="~{fragments/dashboard-nav :: dashboardNav}"></div>

<div class="dashboard-content" style="margin-left: 280px;">
    <div class="container p-4">
        <div class="card">
            <div class="card-header">
                <h3 class="mb-0 font-display"><i class="bi bi-calendar-week me-2"></i>My Appointments</h3>
            </div>
            <div class="card-body">
                <div class="alert alert-info">
                    <i class="bi bi-info-circle me-2"></i>
                    Appointments booked by patients and secretaries for
                    Dr. <strong th:text="${session.user.name + ' ' + session.user.surname}">You</strong>
                    will appear here once the appointment service integration is complete.
                </div>
                <div class="text-center py-5 text-muted">
                    <i class="bi bi-calendar2 fs-1"></i>
                    <p class="mt-3">No appointments loaded yet.</p>
                    <a th:href="@{/medical-specialist/calendar}" class="btn btn-outline-primary rounded-pill me-2">
                        <i class="bi bi-calendar3 me-1"></i>Open Calendar
                    </a>
                    <a th:href="@{/medical-specialist/dashboard}" class="btn btn-outline-secondary rounded-pill">
                        <i class="bi bi-arrow-left me-1"></i>Dashboard
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
