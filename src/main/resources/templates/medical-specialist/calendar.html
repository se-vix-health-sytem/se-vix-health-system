<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('My Calendar')}"></head>
<body>
<div th:replace="~{fragments/dashboard-nav :: dashboardNav}"></div>

<div class="dashboard-content" style="margin-left: 280px;">
    <div class="container p-4">
        <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center">
                <h3 class="mb-0 font-display"><i class="bi bi-calendar3 me-2"></i>My Calendar</h3>
                <span class="badge rounded-pill px-3" style="background:var(--vix-crimson);">
                    Dr. <span th:text="${session.user.name + ' ' + session.user.surname}">-</span>
                </span>
            </div>
            <div class="card-body">

                <p class="text-muted small mb-3">Showing upcoming shifts from today onwards, grouped by month.</p>

                <div th:if="${shiftsByMonth != null and !shiftsByMonth.isEmpty()}">
                    <div th:each="entry : ${shiftsByMonth}" class="mb-4">
                        <h6 class="fw-bold mb-2 px-1"
                            style="color: var(--vix-crimson); border-bottom: 2px solid var(--vix-cream); padding-bottom: 4px;">
                            <i class="bi bi-calendar3 me-1"></i>
                            <span th:text="${entry.key}">Month</span>
                        </h6>
                        <div class="table-responsive">
                            <table class="table table-hover mb-0">
                                <thead style="background: var(--vix-cream);">
                                    <tr>
                                        <th>Date</th>
                                        <th>Shift</th>
                                        <th>Notes</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="shift : ${entry.value}">
                                        <td th:text="${shift.date != null ? #temporals.format(shift.date,'EEE dd/MM/yyyy') : '-'}">-</td>
                                        <td>
                                            <span class="badge rounded-pill"
                                                  th:classappend="${shift.shiftType == 'MORNING' ? 'bg-warning text-dark' :
                                                                   shift.shiftType == 'AFTERNOON' ? 'bg-info text-dark' : 'bg-dark'}"
                                                  th:text="${shift.shiftType}">-</span>
                                        </td>
                                        <td class="small text-muted" th:text="${shift.notes ?: '-'}">-</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <div th:if="${shiftsByMonth == null or shiftsByMonth.isEmpty()}"
                     class="text-center py-4 text-muted">
                    <i class="bi bi-calendar-check fs-1"></i>
                    <p class="mt-3 mb-1">No upcoming shifts.</p>
                    <p class="small mb-4">All past shifts are visible in My Schedule.</p>
                    <a th:href="@{/medical-specialist/my-schedule}" class="btn btn-outline-primary rounded-pill">
                        <i class="bi bi-clock me-1"></i>My Schedule
                    </a>
                </div>

            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
