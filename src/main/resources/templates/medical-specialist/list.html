<!-- src/main/resources/templates/medical-specialists/list.html -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${pageTitle}">Medical Specialists</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <div class="card">
        <div class="card-header bg-success text-white">
            <h2><i class="bi bi-person-badge"></i> <span th:text="${pageTitle}">Our Medical Specialists</span></h2>
        </div>
        <div class="card-body">
            <div class="row">
                <div class="col-md-4 col-lg-3 mb-4" th:each="specialist : ${specialists}">
                    <div class="card h-100">
                        <div class="card-body text-center">
                            <i class="bi bi-person-circle fs-1" style="color: #7a1428;"></i>
                            <h5 class="mt-2" th:text="${specialist.name} + ' ' + ${specialist.surname}">Name</h5>
                            <p class="text-muted" th:text="${specialist.specialty}">Specialty</p>
                            <p class="small text-muted">
                                <i class="bi bi-envelope"></i> <span th:text="${specialist.email}">Email</span><br>
                                <i class="bi bi-card-list"></i> License: <span th:text="${specialist.licenseNumber}">License</span>
                            </p>
                            <a th:href="@{/patient/login?redirect=appointments}" class="btn btn-sm btn-primary">Book Appointment</a>
                        </div>
                    </div>
                </div>
            </div>
            <div th:if="${specialists.empty}">
                <p class="text-center">No specialists found.</p>
            </div>
            <a href="/" class="btn btn-secondary"><i class="bi bi-arrow-left"></i> Back to Home</a>
        </div>
    </div>
</div>
</body>
</html>
