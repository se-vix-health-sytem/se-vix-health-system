<!DOCTYPE html>
<!--
==============================================================================
  FILE:    medical-specialist/search-results.html
  ACCESS:  ROLE_MEDICALSPECIALIST (session.user required)
  PURPOSE: Displays patient search results with a refine-search bar and
           a "View Record" button for each matched patient.

  Model attributes:
    - patients (List<Patient>) — patients matching the query
    - query (String) — the search term that was submitted

  Dependencies:
    - fragments/head, fragments/dashboard-nav, fragments/footer
==============================================================================
-->
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Search Results')}"></head>
<body>
<div th:replace="~{fragments/dashboard-nav :: dashboardNav}"></div>

<div class="dashboard-content" style="margin-left: 280px;">
    <div class="container p-4" style="max-width: 900px;">
        <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center">
                <h3 class="mb-0 font-display"><i class="bi bi-people me-2"></i>Search Results</h3>
                <a th:href="@{/medical-specialist/patients/search}" class="btn btn-light rounded-pill btn-sm">
                    <i class="bi bi-arrow-left me-1"></i> New Search
                </a>
            </div>
            <div class="card-body">

                <!-- Search bar to refine -->
                <form th:action="@{/medical-specialist/patients/search}" method="post" class="mb-4">
                    <div class="input-group">
                        <input type="text" name="query" class="form-control"
                               th:value="${query}" placeholder="Refine search...">
                        <button class="btn btn-primary" type="submit">
                            <i class="bi bi-search"></i>
                        </button>
                    </div>
                </form>

                <p class="text-muted small mb-3">
                    Results for: <strong th:text="${query}">-</strong>
                    <span th:if="${patients != null}">
                        — <span th:text="${patients.size()}">0</span> patient(s) found
                    </span>
                </p>

                <div th:if="${patients != null and !patients.isEmpty()}">
                    <div th:each="p : ${patients}" class="card mb-2">
                        <div class="card-body py-2">
                            <div class="row align-items-center">
                                <div class="col-md-4">
                                    <i class="bi bi-person-circle me-2" style="color:var(--vix-crimson);"></i>
                                    <strong th:text="${p.name + ' ' + p.surname}">Name</strong>
                                </div>
                                <div class="col-md-3 text-muted small">
                                    <i class="bi bi-card-text me-1"></i>
                                    <span th:text="${p.fiscalCode}">-</span>
                                </div>
                                <div class="col-md-3 text-muted small">
                                    <i class="bi bi-envelope me-1"></i>
                                    <span th:text="${p.email ?: '-'}">-</span>
                                </div>
                                <div class="col-md-2 text-end">
                                    <a th:href="@{/medical-specialist/patients/{id}/record(id=${p.id})}"
                                       class="btn btn-sm btn-primary rounded-pill">
                                        View Record
                                    </a>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div th:if="${patients == null or patients.isEmpty()}"
                     class="text-center py-5 text-muted">
                    <i class="bi bi-person-x fs-1"></i>
                    <p class="mt-2">No patients found matching "<span th:text="${query}">-</span>".</p>
                    <a th:href="@{/medical-specialist/patients/search}" class="btn btn-outline-primary rounded-pill">
                        Try again
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
