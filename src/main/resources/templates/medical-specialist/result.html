<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Result')}"></head>
<body>
<div th:replace="~{fragments/dashboard-nav :: dashboardNav}"></div>

<div class="dashboard-content" style="margin-left: 280px;">
    <div class="container p-4" style="max-width: 700px;">
        <div class="card">
            <div class="card-header">
                <h3 class="mb-0 font-display" th:text="${pageTitle ?: 'Action Result'}">Result</h3>
            </div>
            <div class="card-body text-center py-5">
                <div th:if="${message != null}">
                    <i class="bi bi-check-circle-fill fs-1 mb-3"
                       th:classappend="${message.startsWith('❌') ? 'text-danger' : ''}"
                       style="color: var(--vix-crimson);"></i>
                    <div class="alert mt-3"
                         th:classappend="${message.startsWith('❌') ? 'alert-danger' : 'alert-success'}"
                         style="white-space: pre-line;" th:text="${message}"></div>
                </div>
                <div class="d-flex gap-3 justify-content-center mt-3">
                    <a th:href="@{/medical-specialist/dashboard}" class="btn btn-primary rounded-pill">
                        <i class="bi bi-speedometer2 me-1"></i>Dashboard
                    </a>
                    <a th:href="@{/medical-specialist/patients/search}" class="btn btn-outline-secondary rounded-pill">
                        <i class="bi bi-search me-1"></i>Search Patients
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
