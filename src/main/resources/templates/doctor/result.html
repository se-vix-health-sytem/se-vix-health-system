<!DOCTYPE html>
<!--
==============================================================================
  FILE:    doctor/result.html
  ACCESS:  Legacy doctor role
  PURPOSE: Minimal action-result page confirming that a doctor form
           submission reached the backend successfully. Standalone styling.

  Model attributes:
    - pageTitle (String) — heading text
    - message (String) — confirmation or error message

  NOTE: This is a legacy/prototype page — not using the standard fragments.
==============================================================================
-->
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${pageTitle}">Result</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            max-width: 800px;
            margin: 40px auto;
        }
        h1 { color: #007bff; }
        .message {
            padding: 20px;
            background: #d4edda;
            border: 1px solid #c3e6cb;
            border-radius: 5px;
            margin: 20px 0;
        }
        .btn {
            display: inline-block;
            padding: 10px 20px;
            background: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 4px;
            margin-top: 10px;
        }
        .btn:hover { background: #0056b3; }
    </style>
</head>
<body>
<h1 th:text="${pageTitle}">Result</h1>

<div class="message" th:text="${message}">
    Action completed successfully
</div>

<p><i>This proves frontend-backend communication works!</i></p>

<a href="/doctor/dashboard" class="btn">← Back to Dashboard</a>
</body>
</html>
