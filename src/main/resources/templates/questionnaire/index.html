<!-- src/main/resources/templates/questionnaire/index.html -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Find the Right Specialist</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <div class="card" style="max-width: 600px; margin: 0 auto;">
        <div class="card-header bg-info text-white">
            <h3>🏥 Find the Right Specialist</h3>
        </div>
        <div class="card-body">
            <p>Answer a few questions and we'll recommend the appropriate department for your needs.</p>

            <form action="/questionnaire/result" method="post">
                <div class="mb-3">
                    <label class="form-label">What is your primary symptom?</label>
                    <select name="symptomArea" class="form-select" required>
                        <option value="">Select a symptom...</option>
                        <option th:each="entry : ${symptomCategories}"
                                th:value="${entry.key}"
                                th:text="${entry.value}">
                        </option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">How severe is your condition?</label>
                    <select name="severity" class="form-select">
                        <option value="low">Mild - Slight discomfort</option>
                        <option value="medium">Moderate - Affects daily activities</option>
                        <option value="high">Severe - Need urgent care</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">How long have you had these symptoms?</label>
                    <select name="duration" class="form-select">
                        <option value="days">A few days</option>
                        <option value="weeks">A few weeks</option>
                        <option value="months">Several months</option>
                    </select>
                </div>

                <button type="submit" class="btn btn-primary w-100">Find Specialist →</button>
            </form>
        </div>
    </div>
</div>
</body>
</html>
