<!-- src/main/resources/templates/questionnaire/result.html -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Specialist Recommendation</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
  <div class="card">
    <div class="card-header bg-success text-white">
      <h3>🎯 Your Recommendation</h3>
    </div>
    <div class="card-body">
      <div class="alert alert-info">
        <strong>Based on your symptoms, we recommend:</strong>
      </div>

      <h2 class="text-center mb-4" style="color: #7a1428;" th:text="${recommendation.specialist}">
        Cardiology
      </h2>

      <div class="card mb-3">
        <div class="card-body">
          <p th:text="${recommendation.description}">Description here</p>
        </div>
      </div>

      <div class="alert" th:classappend="${recommendation.urgency.contains('HIGH')} ? 'alert-danger' : 'alert-warning'">
        <strong>⚠️ Urgency:</strong> <span th:text="${recommendation.urgency}">Medium</span>
      </div>

      <div class="mt-3">
        <a th:href="${recommendation.departmentLink}" class="btn btn-primary">
          View Department Details
        </a>
        <a href="/patient/appointments/book" class="btn btn-success">
          Book Appointment
        </a>
        <a href="/questionnaire" class="btn btn-secondary">
          Start Over
        </a>
      </div>
    </div>
  </div>
</div>
</body>
</html>
