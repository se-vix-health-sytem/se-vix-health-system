<!-- src/main/resources/templates/departments/list.html -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${pageTitle}">Medical Departments</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        .dept-card {
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
            border-left: 4px solid #7a1428;
        }
        .dept-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>
<div class="container mt-4">
    <div class="card">
        <div class="card-header bg-primary text-white">
            <h2><i class="bi bi-grid-3x3-gap"></i> <span th:text="${pageTitle}">Medical Departments</span></h2>
        </div>
        <div class="card-body">
            <div class="row">
                <div class="col-md-4 col-lg-3 mb-4" th:each="dept : ${departments}">
                    <div class="card dept-card h-100" onclick="location.href='/departments/' + ${dept.id}">
                        <div class="card-body">
                            <h5 class="card-title" th:text="${dept.name}">Department Name</h5>
                            <p class="card-text text-muted small" th:text="${dept.description}">Description</p>
                            <p class="card-text small">
                                <i class="bi bi-envelope"></i> <span th:text="${dept.email}">Email</span><br>
                                <i class="bi bi-telephone"></i> <span th:text="${dept.phoneNumber}">Phone</span>
                            </p>
                        </div>
                    </div>
                </div>
            </div>
            <a href="/" class="btn btn-secondary"><i class="bi bi-arrow-left"></i> Back to Home</a>
        </div>
    </div>
</div>
</body>
</html>
