<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Our Departments')}"></head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="container py-5">
    <div class="text-center mb-5">
        <p class="section-eyebrow">VIX Health System</p>
        <h1 class="font-display display-5" style="color: var(--vix-crimson);">Our Departments</h1>
        <p class="text-muted">Specialized care across every medical discipline</p>
    </div>

    <div th:if="${departments != null and !departments.isEmpty()}" class="row g-4">
        <div class="col-md-6 col-lg-4" th:each="dept : ${departments}">
            <div class="card h-100 border-0 shadow-sm">
                <div class="card-body">
                    <div class="d-flex align-items-center gap-3 mb-3">
                        <div class="rounded-circle d-flex align-items-center justify-content-center"
                             style="width:48px;height:48px;background:var(--vix-crimson);">
                            <i class="bi bi-hospital text-white fs-5"></i>
                        </div>
                        <h5 class="font-display mb-0" th:text="${dept.name}">Department</h5>
                    </div>
                    <p class="text-muted small" th:text="${dept.description ?: 'Providing expert medical care.'}">-</p>
                    <a th:href="@{/departments/{id}(id=${dept.id})}"
                       class="btn btn-outline-primary rounded-pill btn-sm">
                        Learn More <i class="bi bi-arrow-right ms-1"></i>
                    </a>
                </div>
            </div>
        </div>
    </div>

    <div th:if="${departments == null or departments.isEmpty()}" class="text-center py-5 text-muted">
        <i class="bi bi-hospital fs-1"></i>
        <p class="mt-3">Department information coming soon.</p>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
