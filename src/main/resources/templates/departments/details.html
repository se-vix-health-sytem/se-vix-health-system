<!-- src/main/resources/templates/departments/detail.html -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${pageTitle}">Department</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <div class="card">
        <div class="card-header bg-primary text-white">
            <h2 th:text="${department.name}">Department Name</h2>
        </div>
        <div class="card-body">
            <p th:text="${department.description}">Description</p>

            <h4>Services Offered</h4>
            <ul>
                <li th:each="service : ${services}" th:text="${service}"></li>
            </ul>

            <h4>Our Doctors</h4>
            <div class="row">
                <div class="col-md-4" th:each="doctor : ${doctors}">
                    <div class="card mb-2">
                        <div class="card-body">
                            <h6 th:text="${doctor.name} + ' ' + ${doctor.surname}">Doctor Name</h6>
                            <p class="text-muted" th:text="${doctor.specialty}">Specialty</p>
                            <a href="/patient/appointments/book" class="btn btn-sm btn-primary">Book Appointment</a>
                        </div>
                    </div>
                </div>
            </div>

            <a href="/#departments" class="btn btn-secondary">← Back</a>
        </div>
    </div>
</div>
</body>
</html>
