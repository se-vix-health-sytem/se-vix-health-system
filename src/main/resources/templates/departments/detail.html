<!DOCTYPE html>
<!--
==============================================================================
  FILE:    departments/detail.html
  ACCESS:  Public
  PURPOSE: Detail page for a single department showing its services list
           and the specialists who belong to it.

  Model attributes:
    - department (Department) — the department being displayed
    - services (List<String>) — service names offered by this department
    - doctors (List<MedicalSpecialist>) — specialists in the department
    - doctorImages (Map<Long, String>) — specialist ID → image path

  Dependencies:
    - fragments/head, fragments/navbar, fragments/footer
==============================================================================
-->
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Department')}"></head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="container py-5" style="max-width: 960px;">

    <a th:href="@{/departments}" class="btn btn-outline-secondary rounded-pill btn-sm mb-4">
        <i class="bi bi-arrow-left me-1"></i>All Departments
    </a>

    <div th:if="${department != null}">
        <!-- Header -->
        <div class="card border-0 shadow-sm mb-4">
            <div class="card-body p-4">
                <div class="d-flex align-items-center gap-3">
                    <div class="rounded-circle d-flex align-items-center justify-content-center flex-shrink-0"
                         style="width:64px;height:64px;background:var(--vix-crimson);">
                        <i class="bi bi-hospital text-white fs-3"></i>
                    </div>
                    <div>
                        <p class="section-eyebrow mb-1">Department</p>
                        <h1 class="font-display mb-1" style="color:var(--vix-crimson);"
                            th:text="${department.name}">Name</h1>
                        <p class="text-muted mb-0" th:text="${department.description ?: ''}">-</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="row g-4">
            <!-- Services -->
            <div class="col-md-5" th:if="${services != null and !services.isEmpty()}">
                <div class="card h-100">
                    <div class="card-header"><i class="bi bi-clipboard2-pulse me-2"></i>Services Offered</div>
                    <div class="card-body">
                        <ul class="list-unstyled mb-0">
                            <li th:each="svc : ${services}" class="border-bottom">
                                <a th:href="@{/patient/appointments/book}"
                                   class="d-flex align-items-center gap-2 py-2 px-1 text-decoration-none"
                                   style="color:inherit;">
                                    <i class="bi bi-check-circle flex-shrink-0" style="color:var(--vix-gold);"></i>
                                    <span class="small" th:text="${svc}">Service</span>
                                    <i class="bi bi-arrow-right ms-auto small text-muted"></i>
                                </a>
                            </li>
                        </ul>
                    </div>
                </div>
            </div>

            <!-- Doctors -->
            <div class="col-md-7">
                <div class="card h-100">
                    <div class="card-header">
                        <i class="bi bi-person-badge me-2"></i>Our Specialists
                        <span class="badge bg-secondary ms-2"
                              th:text="${doctors != null ? doctors.size() : 0}">0</span>
                    </div>
                    <div class="card-body p-0">
                        <div th:if="${doctors != null and !doctors.isEmpty()}">
                            <a th:each="doc : ${doctors}"
                               th:href="@{/specialists/{id}(id=${doc.id})}"
                               class="d-flex align-items-center gap-3 border-bottom px-3 py-2 text-decoration-none"
                               style="color:inherit; transition:background .15s;"
                               onmouseover="this.style.background='var(--vix-cream)'"
                               onmouseout="this.style.background=''">
                                <img th:src="${doctorImages != null and doctorImages.containsKey(doc.id) ? doctorImages[doc.id] : '/images/doctors/placeholder.jpg'}"
                                     th:alt="'Dr. ' + ${doc.name} + ' ' + ${doc.surname}"
                                     class="rounded-circle flex-shrink-0"
                                     width="48" height="48"
                                     style="object-fit:cover;border:2px solid var(--vix-gold);"
                                     onerror="this.onerror=null;this.src='/images/doctors/placeholder.jpg';">
                                <div class="flex-grow-1">
                                    <div class="fw-semibold small"
                                         th:text="'Dr. ' + ${doc.name} + ' ' + ${doc.surname}">-</div>
                                    <div class="text-muted small" th:text="${doc.specialty ?: '-'}">-</div>
                                </div>
                                <i class="bi bi-chevron-right text-muted small"></i>
                            </a>
                        </div>
                        <div th:if="${doctors == null or doctors.isEmpty()}"
                             class="text-center py-4 text-muted small">
                            <p>No specialists listed for this department.</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div th:if="${department == null}" class="text-center py-5 text-muted">
        <i class="bi bi-question-circle fs-1"></i>
        <p class="mt-3">Department not found.</p>
        <a th:href="@{/departments}" class="btn btn-outline-primary rounded-pill">All Departments</a>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
