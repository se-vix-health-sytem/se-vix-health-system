<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Find a Hospital')}"></head>
<!-- Leaflet CSS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<main>
    <div class="container py-4">
        <div class="text-center mb-4">
            <p class="section-eyebrow">VIX Health System</p>
            <h1 class="font-display display-5" style="color: var(--vix-crimson);">Find a Location</h1>
            <p class="text-muted">Hospitals, clinics and medical centres — click a marker for details</p>
        </div>
    </div>

    <!-- Full-width Leaflet map -->
    <div id="map" style="height: 480px; width: 100%; z-index: 0;"></div>

    <!-- Location cards below the map -->
    <div class="container py-4">
        <div th:if="${locations != null and !locations.isEmpty()}" class="row g-4">
            <div class="col-md-6 col-lg-4" th:each="loc, stat : ${locations}">
                <div class="card h-100 border-0 shadow-sm location-card"
                     th:attr="data-lat=${loc.lat}, data-lng=${loc.lng}, data-index=${stat.index}"
                     style="cursor:pointer; transition: box-shadow 0.2s;">
                    <div class="card-body">
                        <div class="d-flex align-items-center gap-2 mb-2">
                            <i class="bi bi-geo-alt-fill fs-5" style="color:var(--vix-crimson);"></i>
                            <h5 class="font-display mb-0" th:text="${loc.name}">Location</h5>
                        </div>
                        <div class="small text-muted mb-1" th:if="${loc.address}">
                            <i class="bi bi-building me-1"></i>
                            <span th:text="${loc.address}">-</span>
                        </div>
                        <div class="small text-muted mb-2" th:if="${loc.phone}">
                            <i class="bi bi-telephone me-1"></i>
                            <span th:text="${loc.phone}">-</span>
                        </div>
                        <div class="d-flex justify-content-between align-items-center">
                            <span th:if="${loc.type}" class="badge rounded-pill"
                                  th:classappend="${loc.type == 'HOSPITAL' ? 'bg-primary' :
                                                   loc.type == 'CLINIC' ? 'bg-info text-dark' : 'bg-secondary'}"
                                  th:text="${loc.type}">-</span>
                            <a th:if="${loc.lat != null and loc.lng != null}"
                               th:href="@{/map/directions(lat=${loc.lat},lng=${loc.lng},name=${loc.name})}"
                               class="btn btn-outline-primary rounded-pill btn-sm ms-auto">
                                <i class="bi bi-signpost me-1"></i>Directions
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div th:if="${locations == null or locations.isEmpty()}"
             class="text-center py-5 text-muted">
            <i class="bi bi-geo-alt fs-1"></i>
            <p class="mt-3">No locations available at this time.</p>
        </div>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV/XN/WLs=" crossorigin=""></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script th:inline="javascript">
    /*<![CDATA[*/
    const locations = /*[[${locations}]]*/ [];

    const map = L.map('map');

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 18,
        attribution: '© <a href="https://www.openstreetmap.org/">OpenStreetMap</a> contributors'
    }).addTo(map);

    const crimsonIcon = L.divIcon({
        html: '<div style="background:#7a1428;width:28px;height:28px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);border:3px solid white;box-shadow:0 2px 6px rgba(0,0,0,0.4);"></div>',
        iconSize: [28, 28],
        iconAnchor: [14, 28],
        popupAnchor: [0, -30],
        className: ''
    });

    const markers = [];

    if (locations && locations.length > 0) {
        const bounds = [];

        locations.forEach(function(loc, i) {
            if (loc.lat != null && loc.lng != null) {
                const marker = L.marker([loc.lat, loc.lng], {icon: crimsonIcon}).addTo(map);

                const typeLabel = loc.type || '';
                const address  = loc.address ? '<br><small>' + loc.address + '</small>' : '';
                const phone    = loc.phone   ? '<br><small>' + loc.phone + '</small>'   : '';
                const dirUrl   = '/map/directions?lat=' + loc.lat + '&lng=' + loc.lng + '&name=' + encodeURIComponent(loc.name || '');

                marker.bindPopup(
                    '<strong style="color:#7a1428;">' + (loc.name || '') + '</strong>' +
                    address + phone +
                    '<br><a href="' + dirUrl + '" class="btn btn-sm btn-primary rounded-pill mt-2" style="font-size:0.75rem;">Get Directions</a>'
                );

                markers.push(marker);
                bounds.push([loc.lat, loc.lng]);
            }
        });

        if (bounds.length > 0) {
            map.fitBounds(bounds, {padding: [40, 40]});
        }
    } else {
        // Default to Milan if no locations
        map.setView([45.4642, 9.1900], 12);
    }

    // Click on location card → pan map and open popup
    document.querySelectorAll('.location-card').forEach(function(card) {
        card.addEventListener('mouseenter', function() {
            this.style.boxShadow = '0 4px 16px rgba(122,20,40,0.25)';
        });
        card.addEventListener('mouseleave', function() {
            this.style.boxShadow = '';
        });
        card.addEventListener('click', function(e) {
            if (e.target.closest('a')) return; // let links work normally
            const idx = parseInt(this.dataset.index);
            const lat = parseFloat(this.dataset.lat);
            const lng = parseFloat(this.dataset.lng);
            if (!isNaN(lat) && !isNaN(lng)) {
                map.flyTo([lat, lng], 15, {duration: 1});
                if (markers[idx]) markers[idx].openPopup();
            }
        });
    });
    /*]]>*/
</script>
</body>
</html>
