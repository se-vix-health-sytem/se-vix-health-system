<!-- src/main/resources/templates/map/hospitals.html -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${pageTitle}">Find Our Locations</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        #map { height: 500px; border-radius: 10px; }
        .location-card { cursor: pointer; transition: all 0.2s; }
        .location-card:hover { background-color: #f8f9fa; transform: translateX(5px); }
        .custom-marker { font-size: 24px; }
    </style>
</head>
<body>
<div class="container mt-4">
    <div class="card">
        <div class="card-header bg-primary text-white">
            <h2 th:text="${pageTitle}">Our Locations</h2>
        </div>
        <div class="card-body">
            <div class="row">
                <div class="col-md-4">
                    <h5>📍 Select a location:</h5>
                    <div id="locations-list">
                        <div class="location-card card mb-2 p-2" data-lat="46.066422" data-lng="11.119928">
                            <strong>🏥 VIX Central Hospital</strong>
                            <small>Via San Camillo 1, 38122 Trento TN</small>
                            <small class="text-muted">📞 +39 0461 000 001</small>
                        </div>
                        <div class="location-card card mb-2 p-2" data-lat="46.082944" data-lng="11.119928">
                            <strong>🏥 VIX Tecnomed Nord</strong>
                            <small>Via Brennero 45, 38100 Trento TN</small>
                            <small class="text-muted">📞 +39 0461 000 002</small>
                        </div>
                        <div class="location-card card mb-2 p-2" data-lat="45.890584" data-lng="11.039744">
                            <strong>🏥 VIX Tecnomed Sud</strong>
                            <small>Via Malpensa 12, 38068 Rovereto TN</small>
                            <small class="text-muted">📞 +39 0461 000 003</small>
                        </div>
                    </div>

                    <div class="mt-3">
                        <a href="/map/directions" class="btn btn-outline-primary w-100">
                            🚗 Get Directions
                        </a>
                    </div>
                </div>
                <div class="col-md-8">
                    <div id="map"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // Initialize map centered on Trento
    var map = L.map('map').setView([46.066422, 11.119928], 12);

    // Add OpenStreetMap tiles (FREE, no API key needed!)
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
        maxZoom: 19
    }).addTo(map);

    // Hospital locations
    var locations = [
        { name: "VIX Central Hospital", lat: 46.066422, lng: 11.119928, address: "Via San Camillo 1, Trento", phone: "+39 0461 000 001", type: "hospital" },
        { name: "VIX Tecnomed Nord", lat: 46.082944, lng: 11.119928, address: "Via Brennero 45, Trento", phone: "+39 0461 000 002", type: "clinic" },
        { name: "VIX Tecnomed Sud", lat: 45.890584, lng: 11.039744, address: "Via Malpensa 12, Rovereto", phone: "+39 0461 000 003", type: "clinic" }
    ];

    // Custom icons
    var hospitalIcon = L.divIcon({
        html: '🏥',
        className: 'custom-marker',
        iconSize: [30, 30]
    });

    var clinicIcon = L.divIcon({
        html: '🏥',
        className: 'custom-marker',
        iconSize: [30, 30]
    });

    // Add markers
    locations.forEach(function(loc) {
        var marker = L.marker([loc.lat, loc.lng]).addTo(map);

        // Popup with details
        marker.bindPopup(`
            <strong>${loc.name}</strong><br>
            ${loc.address}<br>
            📞 ${loc.phone}<br>
            <a href="https://www.google.com/maps/dir/?api=1&destination=${loc.lat},${loc.lng}" target="_blank">
                Get Directions →
            </a>
        `);

        // Click handler for cards
        marker.on('click', function() {
            map.setView([loc.lat, loc.lng], 15);
        });
    });

    // Card click handlers
    document.querySelectorAll('.location-card').forEach(card => {
        card.addEventListener('click', function() {
            var lat = parseFloat(this.dataset.lat);
            var lng = parseFloat(this.dataset.lng);
            map.setView([lat, lng], 15);

            // Find and open the marker's popup
            locations.forEach(loc => {
                if (Math.abs(loc.lat - lat) < 0.0001) {
                    var marker = L.marker([lat, lng]);
                    marker.bindPopup(`<strong>${loc.name}</strong><br>${loc.address}`).openPopup();
                }
            });
        });
    });
</script>
</body>
</html>
