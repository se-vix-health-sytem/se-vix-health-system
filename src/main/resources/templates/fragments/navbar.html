<!DOCTYPE html>
<!--
  ============================================================
  Template : fragments/navbar.html
  Role     : All users (public, patient, staff)
  Access   : Public — included on every public-facing page
  Purpose  : Renders the top navigation bar with brand, nav links, and context-sensitive auth controls.
  Model    : session.patient, session.user, session.role — used to toggle login/logout buttons
  Controller: N/A — reusable fragment
  ============================================================
-->
<html xmlns:th="http://www.thymeleaf.org">
<div th:fragment="navbar" class="vix-navbar">
    <nav class="navbar navbar-expand-lg bg-white border-bottom py-2 sticky-top">
        <div class="container">
            <!-- Brand -->
            <a class="navbar-brand d-flex align-items-center gap-2" th:href="@{/}">
                <img src="/images/vix-logo.png" alt="VIX Logo" width="40" height="40"
                     style="background: white; border-radius: 50%; padding: 4px;">
                <div>
                    <strong class="font-display" style="color: var(--vix-crimson); font-size: 1.2rem;">
                        VIX Health System
                    </strong>
                    <br>
                    <small style="color: var(--vix-gold); font-size: 0.68rem; letter-spacing: 0.07em;">
                        Hospital Network · Trento
                    </small>
                </div>
            </a>

            <!-- Toggler -->
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent">
                <span class="navbar-toggler-icon"></span>
            </button>

            <!-- Nav links -->
            <ul class="navbar-nav mx-auto gap-2">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/}">Home</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/departments}">Departments</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/specialists}">Medical Specialists</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/about}">About Us</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/contact}">Contact</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/map/hospitals}">Locations</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/questionnaire}">Find Specialist</a>
                </li>
            </ul>

                <!-- Auth controls -->
                <div class="d-flex gap-2">
                    <div th:if="${session.patient == null and session.user == null}">
                        <a th:href="@{/login}" class="btn btn-outline-primary rounded-pill px-4">
                            <i class="bi bi-person me-1"></i> Staff Login
                        </a>
                        <a th:href="@{/patient/login}" class="btn btn-primary rounded-pill px-4">
                            <i class="bi bi-calendar-plus me-1"></i> Patient Portal
                        </a>
                    </div>
                    <div th:if="${session.patient != null}">
                        <span class="badge bg-success rounded-pill px-3 py-2 me-2">
                            <i class="bi bi-person-circle me-1"></i>
                            <span th:text="${session.patient.name + ' ' + session.patient.surname}">Patient</span>
                        </span>
                        <a th:href="@{/patient/dashboard}" class="btn btn-outline-primary rounded-pill">Dashboard</a>
                        <a th:href="@{/patient/logout}" class="btn btn-primary rounded-pill">Logout</a>
                    </div>
                    <div th:if="${session.user != null}">
                        <span class="badge bg-success rounded-pill px-3 py-2 me-2">
                            <i class="bi bi-person-badge me-1"></i>
                            <span th:text="${session.user.name + ' ' + session.user.surname}">Staff</span>
                            <span class="ms-1 small" th:text="'(' + ${session.role} + ')'"></span>
                        </span>
                        <a th:href="@{/logout}" class="btn btn-primary rounded-pill">Logout</a>
                    </div>
                </div>
            </div>
    </nav>
</div>
</html>
