<!DOCTYPE html>
<!--
  ============================================================
  Template : fragments/footer/medical-specialist.html
  Role     : Public — all visitors
  Access   : Public
  Purpose  : Displays a public listing of medical specialists with avatar cards and department links.
  Model    : featuredDoctors (List<MedicalSpecialist>) — specialists to display; falls back to placeholder if null
  Controller: SiteController or specialist listing controller
  ============================================================
-->
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Medical Specialists - VIX Health System</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>

    <style>
        body {
            font-family: 'DM Sans', sans-serif;
            background: #faf7f2;
            color: #2a1518;
        }

        :root {
            --crimson: #7a1428;
            --gold: #b8952a;
            --border: #e8ddd5;
        }

        .page-header {
            background: linear-gradient(135deg, #5a0e1e, #7a1428);
            color: white;
            padding: 4rem 0;
            text-align: center;
        }

        .page-header h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 3rem;
        }

        .specialist-card {
            background: #fff;
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            transition: 0.25s;
            height: 100%;
        }

        .specialist-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(122,20,40,0.15);
        }

        .avatar {
            height: 200px;
            background: linear-gradient(135deg, #f5edd8, #fff);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            color: var(--crimson);
        }

        .info {
            padding: 1.2rem;
        }

        .name {
            font-weight: 700;
            color: var(--crimson);
        }

        .spec {
            color: var(--gold);
            font-weight: 600;
            font-size: 0.9rem;
        }

        .dept {
            font-size: 0.85rem;
            color: #7a6068;
        }

        .btn-profile {
            display: block;
            margin: 1rem;
            text-align: center;
            border: 1px solid var(--border);
            border-radius: 50px;
            padding: 0.5rem;
            text-decoration: none;
            color: var(--crimson);
            font-weight: 600;
            transition: 0.2s;
        }

        .btn-profile:hover {
            background: var(--crimson);
            color: white;
        }

        .back-btn {
            display: inline-block;
            margin: 2rem 0;
            text-decoration: none;
            color: var(--crimson);
            font-weight: 600;
        }
    </style>
</head>

<body>

<!-- HEADER -->
<div class="page-header">
    <h1>Medical Specialists</h1>
    <p>Expert care across all departments</p>
</div>

<div class="container py-5">

    <!-- BACK -->
    <a th:href="@{/}" class="back-btn">
        <i class="bi bi-arrow-left"></i> Back to Home
    </a>

    <!-- SPECIALISTS GRID -->
    <div class="row g-4">

        <!-- DYNAMIC LIST (from DB) -->
        <div class="col-md-6 col-lg-3"
             th:if="${featuredDoctors != null}"
             th:each="doc : ${featuredDoctors}">

            <div class="specialist-card">

                <div class="avatar">
                    <i class="bi bi-person-circle"></i>
                </div>

                <div class="info">
                    <div class="name"
                         th:text="${doc.title + ' ' + doc.firstName + ' ' + doc.lastName}">
                        Dr Name
                    </div>

                    <div class="spec"
                         th:text="${doc.specialization}">
                        Specialization
                    </div>

                    <div class="dept"
                         th:text="${doc.department?.name}">
                        Department
                    </div>
                </div>

                <!-- IMPORTANT: no /doctors route -->
                <a th:href="@{/departments}" class="btn-profile">
                    View Department
                </a>
            </div>
        </div>

        <!-- FALLBACK (if DB empty) -->
        <div class="col-md-6 col-lg-3" th:if="${featuredDoctors == null}">
            <div class="specialist-card">
                <div class="avatar"><i class="bi bi-person-circle"></i></div>
                <div class="info">
                    <div class="name">Medical Specialist</div>
                    <div class="spec">Cardiology</div>
                    <div class="dept">Department</div>
                </div>
                <a th:href="@{/departments}" class="btn-profile">View Department</a>
            </div>
        </div>

    </div>
</div>

</body>
</html>
