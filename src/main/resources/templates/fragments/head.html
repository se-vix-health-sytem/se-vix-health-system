<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(pageTitle)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle} ?: 'VIX Health System'">VIX Health System</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        /* ── Design Tokens ───────────────────────────────────────────── */
        :root {
            --vix-crimson: #7a1428;
            --vix-crimson-dk: #5a0e1e;
            --vix-crimson-lt: #9e1a34;
            --vix-gold: #b8952a;
            --vix-gold-lt: #d4ae4a;
            --vix-gold-pale: #f5edd8;
            --vix-cream: #faf7f2;
            --vix-white: #ffffff;
            --vix-text: #2a1518;
            --vix-muted: #7a6068;
            --vix-border: #e8ddd5;
            --radius-lg: 1rem;
            --radius-pill: 50px;
            --shadow-sm: 0 2px 8px rgba(122,20,40,.08);
            --shadow-md: 0 6px 24px rgba(122,20,40,.14);
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            color: var(--vix-text);
            background: var(--vix-cream);
            overflow-x: hidden;
        }

        h1, h2, h3, .font-display {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 600;
        }

        /* Utility classes */
        .section-eyebrow {
            font-size: 0.72rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: var(--vix-gold);
            margin-bottom: 0.5rem;
        }

        .section-title {
            font-size: clamp(1.8rem, 3vw, 2.5rem);
            color: var(--vix-crimson);
            margin-bottom: 0.75rem;
            font-weight: 600;
        }

        .section-divider {
            width: 48px;
            height: 2px;
            background: linear-gradient(90deg, var(--vix-gold), var(--vix-gold-lt));
            border-radius: 2px;
            margin: 1rem 0 1.5rem;
        }

        /* Card styles */
        .card {
            border: 1px solid var(--vix-border);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-sm);
            background: var(--vix-white);
        }

        .card-header {
            background: linear-gradient(135deg, var(--vix-crimson) 0%, var(--vix-crimson-dk) 100%);
            color: white;
            border-radius: var(--radius-lg) var(--radius-lg) 0 0;
            padding: 1.25rem 1.5rem;
            font-family: 'Cormorant Garamond', serif;
            font-weight: 600;
        }

        /* Form styles */
        .form-label {
            font-weight: 600;
            font-size: 0.83rem;
            color: var(--vix-crimson);
            letter-spacing: 0.02em;
        }

        .form-control, .form-select {
            border: 1.5px solid var(--vix-border);
            border-radius: 10px;
            font-size: 0.9rem;
            padding: 0.6rem 0.9rem;
            background: var(--vix-cream);
        }

        .form-control:focus, .form-select:focus {
            border-color: var(--vix-gold);
            box-shadow: 0 0 0 3px rgba(184,149,42,.12);
            background: #fff;
        }

        /* Button styles */
        .btn-primary {
            background: var(--vix-crimson);
            border-color: var(--vix-crimson);
            border-radius: var(--radius-pill);
            font-weight: 600;
            padding: 0.6rem 1.5rem;
        }

        .btn-primary:hover {
            background: var(--vix-crimson-dk);
            border-color: var(--vix-crimson-dk);
        }

        .btn-outline-primary {
            border-color: var(--vix-crimson);
            color: var(--vix-crimson);
            border-radius: var(--radius-pill);
        }

        .btn-outline-primary:hover {
            background: var(--vix-crimson);
            border-color: var(--vix-crimson);
        }

        /* Status badges */
        .badge-status-confirmed { background: #28a745; }
        .badge-status-pending { background: #ffc107; color: #000; }
        .badge-status-cancelled { background: #dc3545; }
        .badge-status-completed { background: #17a2b8; }
        .badge-status-rescheduled { background: #fd7e14; }

        /* Alert cards */
        .alert-card {
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            padding: 1rem;
            margin-bottom: 0.75rem;
            border-radius: 0.5rem;
        }

        /* Quick stats */
        .stat-mini {
            text-align: center;
            padding: 1rem;
            background: var(--vix-white);
            border-radius: 0.75rem;
            border: 1px solid var(--vix-border);
        }

        .stat-mini-number {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2rem;
            font-weight: 700;
            color: var(--vix-crimson);
            line-height: 1;
        }

        .stat-mini-label {
            font-size: 0.78rem;
            color: var(--vix-muted);
            margin-top: 0.3rem;
        }
    </style>
</head>
