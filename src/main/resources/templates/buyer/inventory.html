<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Inventory')}"></head>
<body>
<div th:replace="~{fragments/dashboard-nav :: dashboardNav}"></div>

<div class="dashboard-content" style="margin-left: 280px;">
    <div class="container p-4">

        <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-3">
            <h2 class="font-display mb-0" style="color:var(--vix-crimson);">
                <i class="bi bi-box-seam me-2"></i>
                <span th:text="${isLowStockView ? 'Low Stock Items' : 'Inventory'}">Inventory</span>
            </h2>
            <div class="d-flex gap-2">
                <a th:href="@{/buyer/inventory}"
                   class="btn btn-sm rounded-pill"
                   th:classappend="${!isLowStockView ? 'btn-primary' : 'btn-outline-secondary'}">All</a>
                <a th:href="@{/buyer/inventory/low-stock}"
                   class="btn btn-sm rounded-pill"
                   th:classappend="${isLowStockView ? 'btn-danger' : 'btn-outline-danger'}">Low Stock</a>
                <a th:href="@{/buyer/inventory/add}" class="btn btn-sm btn-outline-primary rounded-pill">
                    <i class="bi bi-plus me-1"></i>Add Resource
                </a>
            </div>
        </div>

        <div class="card">
            <div class="card-body p-0">
                <div th:if="${resources != null and !resources.isEmpty()}">
                    <div class="table-responsive">
                        <table class="table table-hover mb-0">
                            <thead style="background: var(--vix-cream);">
                                <tr>
                                    <th>Name</th>
                                    <th>Description</th>
                                    <th>Quantity</th>
                                    <th>Unit</th>
                                    <th>Price</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="item : ${resources}">
                                    <td>
                                        <i class="bi bi-box me-1" style="color:var(--vix-crimson);"></i>
                                        <strong th:text="${item.name}">-</strong>
                                    </td>
                                    <td class="small text-muted" th:text="${item.description ?: '-'}">-</td>
                                    <td>
                                        <span th:text="${item.quantity}">0</span>
                                        <span th:if="${item.quantity != null and item.quantity <= 10}"
                                              class="badge bg-danger ms-1 small">Low</span>
                                    </td>
                                    <td class="small" th:text="${item.unit ?: '-'}">-</td>
                                    <td class="small">
                                        <span th:if="${item.price != null}"
                                              th:text="'€' + ${#numbers.formatDecimal(item.price, 1, 2)}">-</span>
                                        <span th:if="${item.price == null}">-</span>
                                    </td>
                                    <td>
                                        <a th:href="@{/buyer/inventory/{id}(id=${item.id})}"
                                           class="btn btn-sm btn-outline-primary rounded-pill">
                                            <i class="bi bi-eye me-1"></i>Details
                                        </a>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
                <div th:if="${resources == null or resources.isEmpty()}"
                     class="text-center py-5 text-muted">
                    <i class="bi bi-box fs-1"></i>
                    <p class="mt-3">No inventory items found.</p>
                    <a th:href="@{/buyer/inventory/add}" class="btn btn-primary rounded-pill">
                        <i class="bi bi-plus me-1"></i>Add First Resource
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
