<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${pageTitle}">Inventory</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <div class="card">
        <div class="card-header">
            <h2 th:text="${pageTitle}">Inventory</h2>
        </div>
        <div class="card-body">
            <div th:if="${resources != null and !resources.isEmpty()}">
                <table class="table table-striped">
                    <thead>
                    <tr>
                        <th>ID</th><th>Name</th><th>Quantity</th><th>Unit</th><th>Price/Unit</th><th>Status</th><th>Action</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="resource : ${resources}">
                        <td th:text="${resource.id}">1</td>
                        <td th:text="${resource.name}">Item</td>
                        <td th:text="${resource.quantity}">100</td>
                        <td th:text="${resource.unit}">units</td>
                        <td th:text="'€' + ${resource.price}">€0.00</td>
                        <td>
                            <span th:if="${resource.lowStock}" class="badge bg-warning">Low Stock!</span>
                            <span th:unless="${resource.lowStock}" class="badge bg-success">In Stock</span>
                        </td>
                        <td>
                            <a th:href="@{/buyer/inventory/{id}(id=${resource.id})}" class="btn btn-sm btn-info">Details</a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
            <div th:if="${resources == null or resources.isEmpty()}">
                <div th:if="${isLowStockView}">
                    <p>✅ No low stock items found. All inventory levels are healthy!</p>
                </div>
                <div th:unless="${isLowStockView}">
                    <p>No resources found in inventory.</p>
                </div>
            </div>
            <a href="/buyer/dashboard" class="btn btn-secondary mt-3">Back to Dashboard</a>
            <a href="/buyer/inventory/add" class="btn btn-success mt-3">Add New Resource</a>
        </div>
    </div>
</div>
</body>
</html>
