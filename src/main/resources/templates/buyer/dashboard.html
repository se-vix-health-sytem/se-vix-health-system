<!DOCTYPE html>
<!--
==============================================================================
  FILE:    buyer/dashboard.html
  ACCESS:  ROLE_BUYER (session.user required)
  PURPOSE: Buyer home screen with inventory stats, a low-stock alert banner,
           and quick-action cards for the main procurement tasks.

  Model attributes:
    - totalResources (int): total distinct resource types in inventory
    - lowStockCount (int): number of resources below the low-stock threshold
    - buyerName (String): display name of the logged-in buyer

  Dependencies:
    - fragments/head, fragments/dashboard-nav, fragments/footer
==============================================================================
-->
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Buyer Dashboard')}"></head>
<body>
<div th:replace="~{fragments/dashboard-nav :: dashboardNav}"></div>

<div class="dashboard-content" style="margin-left: 280px;">
    <div class="container p-4">

        <div class="card mb-4 border-0 shadow-sm">
            <div class="card-body p-4">
                <div class="d-flex justify-content-between align-items-center flex-wrap gap-3">
                    <div>
                        <p class="section-eyebrow mb-1">Buyer Portal</p>
                        <h2 class="font-display mb-1" style="color: var(--vix-crimson);"
                            th:text="${buyerName ?: (session.user.name + ' ' + session.user.surname)}">Name</h2>
                        <p class="text-muted mb-0 small"
                           th:text="${session.user.department?.name ?: 'No department assigned'}">Department</p>
                    </div>
                    <div class="d-flex gap-2">
                        <a th:href="@{/buyer/inventory}" class="btn btn-primary rounded-pill px-4">
                            <i class="bi bi-box-seam me-2"></i>Inventory
                        </a>
                        <a th:href="@{/buyer/inventory/add}" class="btn btn-outline-primary rounded-pill px-4">
                            <i class="bi bi-plus-circle me-2"></i>Add Resource
                        </a>
                    </div>
                </div>
            </div>
        </div>

        <!-- Stats -->
        <div class="row g-4 mb-4">
            <div class="col-6 col-md-4">
                <div class="stat-mini">
                    <div class="stat-mini-number" th:text="${totalResources ?: 0}">0</div>
                    <div class="stat-mini-label">Total Resources</div>
                </div>
            </div>
            <div class="col-6 col-md-4">
                <div class="stat-mini">
                    <div class="stat-mini-number text-danger" th:text="${lowStockCount ?: 0}">0</div>
                    <div class="stat-mini-label">Low Stock Items</div>
                </div>
            </div>
            <div class="col-6 col-md-4">
                <div class="stat-mini">
                    <div class="stat-mini-number text-success"
                         th:text="${totalResources != null and lowStockCount != null ? totalResources - lowStockCount : 0}">0</div>
                    <div class="stat-mini-label">Well Stocked</div>
                </div>
            </div>
        </div>

        <div class="row g-4">
            <!-- Quick Actions -->
            <div class="col-md-5">
                <div class="card h-100">
                    <div class="card-header"><i class="bi bi-lightning me-2"></i>Quick Actions</div>
                    <div class="card-body d-flex flex-column gap-2">
                        <a th:href="@{/buyer/inventory}" class="btn btn-outline-primary rounded-pill text-start">
                            <i class="bi bi-box-seam me-2"></i>View Full Inventory
                        </a>
                        <a th:href="@{/buyer/inventory/low-stock}"
                           class="btn btn-outline-danger rounded-pill text-start">
                            <i class="bi bi-exclamation-circle me-2"></i>Low Stock Items
                            <span th:if="${lowStockCount != null and lowStockCount > 0}"
                                  class="badge bg-danger ms-1" th:text="${lowStockCount}">0</span>
                        </a>
                        <a th:href="@{/buyer/inventory/add}" class="btn btn-primary rounded-pill text-start">
                            <i class="bi bi-plus-circle me-2"></i>Add New Resource
                        </a>
                    </div>
                </div>
            </div>

            <!-- Low Stock Alert -->
            <div class="col-md-7">
                <div class="card h-100">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <span><i class="bi bi-exclamation-circle me-2"></i>Low Stock Alert</span>
                        <span th:if="${lowStockCount != null and lowStockCount > 0}"
                              class="badge bg-danger" th:text="${lowStockCount + ' items'}">0</span>
                    </div>
                    <div class="card-body">
                        <div th:if="${lowStockCount != null and lowStockCount > 0}" class="alert alert-warning">
                            <i class="bi bi-exclamation-triangle me-2"></i>
                            <span th:text="${lowStockCount}">0</span> resource(s) are running low on stock.
                            <a th:href="@{/buyer/inventory/low-stock}" class="alert-link ms-2">
                                View low stock items →
                            </a>
                        </div>
                        <div th:if="${lowStockCount == null or lowStockCount == 0}"
                             class="text-center py-4 text-muted">
                            <i class="bi bi-check-circle-fill fs-1" style="color:var(--vix-gold);"></i>
                            <p class="mt-3 small">All inventory levels are adequate.</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
