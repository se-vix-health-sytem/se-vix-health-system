<!DOCTYPE html>
<!--
==============================================================================
  FILE:    buyer/resource-details.html
  ACCESS:  ROLE_BUYER (session.user required)
  PURPOSE: Detail view for a single inventory resource with current stock,
           low-stock indicator, and a form to update the quantity.

  Model attributes:
    - resource (Resource) — the resource being viewed
    - totalQuantity (int) — total quantity across all storages
    - isLowStock (boolean) — true when below the threshold
    - lowStockThreshold (int) — quantity level that triggers the alert

  Dependencies:
    - fragments/head, fragments/dashboard-nav, fragments/footer
==============================================================================
-->
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Resource Details')}"></head>
<body>
<div th:replace="~{fragments/dashboard-nav :: dashboardNav}"></div>

<div class="dashboard-content" style="margin-left: 280px;">
    <div class="container p-4" style="max-width: 800px;">

        <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-3">
            <h2 class="font-display mb-0" style="color:var(--vix-crimson);">
                <i class="bi bi-box me-2"></i>
                <span th:text="${resource?.name ?: 'Resource Details'}">Resource</span>
            </h2>
            <a th:href="@{/buyer/inventory}" class="btn btn-outline-secondary rounded-pill">
                <i class="bi bi-arrow-left me-1"></i>Back to Inventory
            </a>
        </div>

        <div th:if="${resource != null}">
            <!-- Info -->
            <div class="card mb-4">
                <div class="card-header">Resource Information</div>
                <div class="card-body">
                    <div class="row g-3">
                        <div class="col-md-4">
                            <div class="text-muted small">Name</div>
                            <div class="fw-semibold" th:text="${resource.name}">-</div>
                        </div>
                        <div class="col-md-4">
                            <div class="text-muted small">Description</div>
                            <div th:text="${resource.description ?: '-'}">-</div>
                        </div>
                        <div class="col-md-4">
                            <div class="text-muted small">Unit</div>
                            <div>units</div>
                        </div>
                        <div class="col-md-4">
                            <div class="text-muted small">Current Stock</div>
                            <div>
                                <strong th:text="${totalQuantity ?: resource.quantity ?: 0}">0</strong>
                                <span th:if="${isLowStock}" class="badge bg-danger ms-2">Low Stock</span>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="text-muted small">Low Stock Threshold</div>
                            <div th:text="${lowStockThreshold ?: '-'}">-</div>
                        </div>
                        <div class="col-md-4">
                            <div class="text-muted small">Price per Unit</div>
                            <div th:if="${resource.price != null}"
                                 th:text="'€' + ${#numbers.formatDecimal(resource.price, 1, 2)}">-</div>
                            <div th:if="${resource.price == null}">-</div>
                        </div>
                    </div>
                    <div th:if="${isLowStock}" class="alert alert-warning mt-3 mb-0">
                        <i class="bi bi-exclamation-triangle me-2"></i>
                        This item is below the low stock threshold. Consider restocking soon.
                    </div>
                </div>
            </div>

            <!-- Update Quantity -->
            <div class="card">
                <div class="card-header"><i class="bi bi-pencil me-2"></i>Update Quantity</div>
                <div class="card-body">
                    <form th:action="@{/buyer/inventory/update-quantity}" method="post"
                          class="d-flex gap-3 align-items-end flex-wrap">
                        <input type="hidden" name="resourceId" th:value="${resource.id}">
                        <div>
                            <label class="form-label">Quantity to add / remove</label>
                            <input type="number" name="quantity" class="form-control"
                                   value="1" min="1" style="max-width: 160px;" required>
                        </div>
                        <button type="submit" name="action" value="add" class="btn btn-success rounded-pill">
                            <i class="bi bi-plus-circle me-1"></i>Add
                        </button>
                        <button type="submit" name="action" value="remove" class="btn btn-outline-danger rounded-pill">
                            <i class="bi bi-dash-circle me-1"></i>Remove
                        </button>
                    </form>
                </div>
            </div>
        </div>

        <div th:if="${resource == null}" class="text-center py-5 text-muted">
            <i class="bi bi-question-circle fs-1"></i>
            <p class="mt-3">Resource not found.</p>
            <a th:href="@{/buyer/inventory}" class="btn btn-outline-primary rounded-pill">Back to Inventory</a>
        </div>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
