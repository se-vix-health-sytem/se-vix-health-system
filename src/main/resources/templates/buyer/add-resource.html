<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Add Resource')}"></head>
<body>
<div th:replace="~{fragments/dashboard-nav :: dashboardNav}"></div>

<div class="dashboard-content" style="margin-left: 280px;">
    <div class="container p-4" style="max-width: 800px;">
        <div class="card">
            <div class="card-header">
                <h3 class="mb-0 font-display"><i class="bi bi-plus-circle me-2"></i>Add New Resource</h3>
            </div>
            <div class="card-body">
                <form th:action="@{/buyer/inventory/add}" method="post" class="row g-3">

                    <div class="col-md-6">
                        <label class="form-label">Resource Name</label>
                        <input type="text" name="name" class="form-control"
                               placeholder="e.g. Surgical Gloves" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Unit</label>
                        <input type="text" name="unit" class="form-control"
                               placeholder="e.g. box, piece, litre">
                    </div>

                    <div class="col-12">
                        <label class="form-label">Description</label>
                        <textarea name="description" class="form-control" rows="2"
                                  placeholder="Brief description of this resource…"></textarea>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Initial Quantity</label>
                        <input type="number" name="quantity" class="form-control"
                               placeholder="0" min="0" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Price per Unit (€)</label>
                        <input type="number" name="price" class="form-control"
                               placeholder="0.00" min="0" step="0.01">
                    </div>

                    <div class="col-12 d-flex gap-3 mt-2">
                        <button type="submit" class="btn btn-primary rounded-pill px-5">
                            <i class="bi bi-check-circle me-2"></i>Add Resource
                        </button>
                        <a th:href="@{/buyer/inventory}" class="btn btn-outline-secondary rounded-pill">
                            Cancel
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
