<!DOCTYPE html>
<!--
==============================================================================
  FILE:    technician/maintenance-history.html
  ACCESS:  ROLE_TECHNICIAN (session.user required)
  PURPOSE: Shows all machines with their current status as a maintenance
           history snapshot: working, faulty, or under maintenance.

  Model attributes:
    - machines (List<Machine>): all machines with their current status
    - message (String): optional info message

  Dependencies:
    - fragments/head, fragments/dashboard-nav, fragments/footer
==============================================================================
-->
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Maintenance History')}"></head>
<body>
<div th:replace="~{fragments/dashboard-nav :: dashboardNav}"></div>

<div class="dashboard-content" style="margin-left: 280px;">
    <div class="container p-4">

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="font-display mb-0" style="color:var(--vix-crimson);">
                <i class="bi bi-clock-history me-2"></i>Maintenance History
            </h2>
            <a th:href="@{/technician/machines}" class="btn btn-outline-secondary rounded-pill">
                <i class="bi bi-arrow-left me-1"></i>Back to Machines
            </a>
        </div>

        <div th:if="${message != null}"
             class="alert alert-info alert-dismissible fade show mb-3" role="alert">
            <span th:text="${message}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div class="card">
            <div class="card-body p-0">
                <div th:if="${machines != null and !machines.isEmpty()}">
                    <div class="table-responsive">
                        <table class="table table-hover mb-0">
                            <thead style="background: var(--vix-cream);">
                                <tr>
                                    <th>ID</th>
                                    <th>Machine</th>
                                    <th>Status</th>
                                    <th>Notes</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="machine : ${machines}">
                                    <td class="small text-muted" th:text="${machine.id}">-</td>
                                    <td>
                                        <a th:href="@{/technician/machines/{id}(id=${machine.id})}"
                                           class="text-decoration-none fw-semibold" th:text="${machine.name}">-</a>
                                    </td>
                                    <td>
                                        <span class="badge rounded-pill"
                                              th:classappend="${machine.status?.name() == 'WORKING' ? 'bg-success' :
                                                               machine.status?.name() == 'FAULTY' ? 'bg-danger' :
                                                               machine.status?.name() == 'UNDER_MAINTENANCE' ? 'bg-warning text-dark' : 'bg-secondary'}"
                                              th:text="${machine.status ?: 'UNKNOWN'}">-</span>
                                    </td>
                                    <td class="small text-muted">
                                        <span th:if="${machine.status?.name() == 'UNDER_MAINTENANCE'}">Under scheduled maintenance</span>
                                        <span th:if="${machine.status?.name() == 'FAULTY'}">⚠ Requires repair</span>
                                        <span th:if="${machine.status?.name() == 'WORKING'}">Operational</span>
                                        <span th:if="${machine.status == null}">-</span>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
                <div th:if="${machines == null or machines.isEmpty()}"
                     class="text-center py-5 text-muted">
                    <i class="bi bi-clock-history fs-1"></i>
                    <p class="mt-3">No maintenance history available.</p>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
