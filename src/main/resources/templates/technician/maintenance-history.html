<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Maintenance History')}"></head>
<body>
<div th:replace="~{fragments/dashboard-nav :: dashboardNav}"></div>

<div class="dashboard-content" style="margin-left: 280px;">
    <div class="container p-4">

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="font-display mb-0" style="color:var(--vix-crimson);">
                <i class="bi bi-clock-history me-2"></i>Maintenance History
            </h2>
            <a th:href="@{/technician/machines}" class="btn btn-outline-secondary rounded-pill">
                <i class="bi bi-arrow-left me-1"></i>Back to Machines
            </a>
        </div>

        <div th:if="${message != null}"
             class="alert alert-info alert-dismissible fade show mb-3" role="alert">
            <span th:text="${message}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div class="card">
            <div class="card-body p-0">
                <div th:if="${machines != null and !machines.isEmpty()}">
                    <div class="table-responsive">
                        <table class="table table-hover mb-0">
                            <thead style="background: var(--vix-cream);">
                                <tr>
                                    <th>Machine</th>
                                    <th>Type</th>
                                    <th>Status</th>
                                    <th>Last Maintenance</th>
                                    <th>Location</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="machine : ${machines}">
                                    <td>
                                        <a th:href="@{/technician/machines/{id}(id=${machine.id})}"
                                           class="text-decoration-none" th:text="${machine.name}">-</a>
                                    </td>
                                    <td class="small" th:text="${machine.type ?: '-'}">-</td>
                                    <td>
                                        <span class="badge rounded-pill"
                                              th:classappend="${machine.status == 'OPERATIONAL' ? 'bg-success' :
                                                               machine.status == 'FAULTY' ? 'bg-danger' :
                                                               machine.status == 'MAINTENANCE' ? 'bg-warning text-dark' : 'bg-secondary'}"
                                              th:text="${machine.status ?: '-'}">-</span>
                                    </td>
                                    <td class="small"
                                        th:text="${machine.lastMaintenanceDate != null ?
                                            #temporals.format(machine.lastMaintenanceDate,'dd/MM/yyyy') : 'Never'}">-</td>
                                    <td class="small" th:text="${machine.location ?: '-'}">-</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
                <div th:if="${machines == null or machines.isEmpty()}"
                     class="text-center py-5 text-muted">
                    <i class="bi bi-clock-history fs-1"></i>
                    <p class="mt-3">No maintenance history available.</p>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
