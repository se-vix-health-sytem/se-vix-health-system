<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Technician Dashboard')}"></head>
<body>
<div th:replace="~{fragments/dashboard-nav :: dashboardNav}"></div>

<div class="dashboard-content" style="margin-left: 280px;">
    <div class="container p-4">

        <div class="card mb-4 border-0 shadow-sm">
            <div class="card-body p-4">
                <div class="d-flex justify-content-between align-items-center flex-wrap gap-3">
                    <div>
                        <p class="section-eyebrow mb-1">Technician Portal</p>
                        <h2 class="font-display mb-1" style="color: var(--vix-crimson);"
                            th:text="${session.user.name + ' ' + session.user.surname}">Name</h2>
                        <p class="text-muted mb-0 small"
                           th:text="${session.user.department?.name ?: 'No department assigned'}">Department</p>
                    </div>
                    <div class="d-flex gap-2">
                        <a th:href="@{/technician/machines}" class="btn btn-primary rounded-pill px-4">
                            <i class="bi bi-tools me-2"></i>Machines
                        </a>
                        <a th:href="@{/technician/alerts}" class="btn btn-outline-danger rounded-pill px-4">
                            <i class="bi bi-exclamation-triangle me-2"></i>Alerts
                            <span th:if="${alertCount != null and alertCount > 0}"
                                  class="badge bg-danger ms-1" th:text="${alertCount}">0</span>
                        </a>
                    </div>
                </div>
            </div>
        </div>

        <!-- Stats -->
        <div class="row g-4 mb-4">
            <div class="col-6 col-md-3">
                <div class="stat-mini">
                    <div class="stat-mini-number" th:text="${totalMachines ?: 0}">0</div>
                    <div class="stat-mini-label">Total Machines</div>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="stat-mini">
                    <div class="stat-mini-number text-danger" th:text="${faultyCount ?: 0}">0</div>
                    <div class="stat-mini-label">Faulty</div>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="stat-mini">
                    <div class="stat-mini-number text-warning" th:text="${maintenanceCount ?: 0}">0</div>
                    <div class="stat-mini-label">Under Maintenance</div>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="stat-mini">
                    <div class="stat-mini-number text-danger" th:text="${alertCount ?: 0}">0</div>
                    <div class="stat-mini-label">Active Alerts</div>
                </div>
            </div>
        </div>

        <div class="row g-4">
            <!-- Quick Actions -->
            <div class="col-md-5">
                <div class="card h-100">
                    <div class="card-header"><i class="bi bi-lightning me-2"></i>Quick Actions</div>
                    <div class="card-body d-flex flex-column gap-2">
                        <a th:href="@{/technician/machines}" class="btn btn-outline-primary rounded-pill text-start">
                            <i class="bi bi-cpu me-2"></i>All Machines
                        </a>
                        <a th:href="@{/technician/machines?filter=faulty}"
                           class="btn btn-outline-danger rounded-pill text-start">
                            <i class="bi bi-exclamation-circle me-2"></i>Faulty Machines
                        </a>
                        <a th:href="@{/technician/alerts}" class="btn btn-outline-warning rounded-pill text-start">
                            <i class="bi bi-bell me-2"></i>Active Alerts
                        </a>
                        <a th:href="@{/technician/machines/maintenance-history}"
                           class="btn btn-outline-secondary rounded-pill text-start">
                            <i class="bi bi-clock-history me-2"></i>Maintenance History
                        </a>
                    </div>
                </div>
            </div>

            <!-- Active Alerts Summary -->
            <div class="col-md-7">
                <div class="card h-100">
                    <div class="card-header"><i class="bi bi-bell me-2"></i>Active Alerts</div>
                    <div class="card-body p-0">
                        <div th:if="${activeAlerts != null and !activeAlerts.isEmpty()}">
                            <div th:each="alert : ${activeAlerts}"
                                 class="d-flex justify-content-between align-items-start border-bottom px-3 py-2 small">
                                <div>
                                    <span class="badge bg-danger me-2">ALERT</span>
                                    <strong th:text="${alert.name ?: 'Machine'}">-</strong>
                                    <div class="text-muted" th:text="${alert.message ?: '-'}">-</div>
                                </div>
                                <a th:href="@{/technician/machines/{id}(id=${alert.id})}"
                                   class="btn btn-sm btn-outline-danger rounded-pill text-nowrap ms-2">
                                    View
                                </a>
                            </div>
                        </div>
                        <div th:if="${activeAlerts == null or activeAlerts.isEmpty()}"
                             class="text-center py-5 text-muted">
                            <i class="bi bi-check-circle fs-1" style="color:var(--vix-gold);"></i>
                            <p class="mt-3 small">No active alerts. All systems operational.</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
