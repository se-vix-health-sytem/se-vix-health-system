<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Machines')}"></head>
<body>
<div th:replace="~{fragments/dashboard-nav :: dashboardNav}"></div>

<div class="dashboard-content" style="margin-left: 280px;">
    <div class="container p-4">

        <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-3">
            <h2 class="font-display mb-0" style="color:var(--vix-crimson);">
                <i class="bi bi-cpu me-2"></i>
                <span th:text="${isFaultyView ? 'Faulty Machines' : 'All Machines'}">Machines</span>
            </h2>
            <div class="d-flex gap-2">
                <a th:href="@{/technician/machines}"
                   class="btn btn-sm rounded-pill"
                   th:classappend="${!isFaultyView ? 'btn-primary' : 'btn-outline-secondary'}">All</a>
                <a th:href="@{/technician/machines?filter=faulty}"
                   class="btn btn-sm rounded-pill"
                   th:classappend="${isFaultyView ? 'btn-danger' : 'btn-outline-danger'}">
                    Faulty Only
                </a>
            </div>
        </div>

        <div class="card">
            <div class="card-body p-0">
                <div th:if="${machines != null and !machines.isEmpty()}">
                    <div class="table-responsive">
                        <table class="table table-hover mb-0">
                            <thead style="background: var(--vix-cream);">
                                <tr>
                                    <th>Machine Name</th>
                                    <th>Type</th>
                                    <th>Status</th>
                                    <th>Location</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="machine : ${machines}">
                                    <td>
                                        <i class="bi bi-cpu me-1" style="color:var(--vix-crimson);"></i>
                                        <a th:href="@{/technician/machines/{id}(id=${machine.id})}"
                                           class="text-decoration-none"
                                           th:text="${machine.name}">-</a>
                                    </td>
                                    <td class="small" th:text="${machine.type ?: '-'}">-</td>
                                    <td>
                                        <span class="badge rounded-pill"
                                              th:classappend="${machine.status == 'OPERATIONAL' ? 'bg-success' :
                                                               machine.status == 'FAULTY' ? 'bg-danger' :
                                                               machine.status == 'MAINTENANCE' ? 'bg-warning text-dark' : 'bg-secondary'}"
                                              th:text="${machine.status ?: 'UNKNOWN'}">-</span>
                                    </td>
                                    <td class="small" th:text="${machine.location ?: '-'}">-</td>
                                    <td>
                                        <div class="d-flex gap-1 align-items-center">
                                            <a th:href="@{/technician/machines/{id}(id=${machine.id})}"
                                               class="btn btn-sm btn-outline-primary rounded-pill">
                                                <i class="bi bi-eye"></i>
                                            </a>
                                            <form th:action="@{/technician/machines/update-status}" method="post"
                                                  class="d-flex gap-1">
                                                <input type="hidden" name="machineId" th:value="${machine.id}">
                                                <select name="status" class="form-select form-select-sm"
                                                        style="max-width: 140px;">
                                                    <option value="OPERATIONAL">Operational</option>
                                                    <option value="MAINTENANCE">Maintenance</option>
                                                    <option value="FAULTY">Faulty</option>
                                                </select>
                                                <button type="submit"
                                                        class="btn btn-sm btn-outline-secondary rounded-pill">
                                                    Update
                                                </button>
                                            </form>
                                        </div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
                <div th:if="${machines == null or machines.isEmpty()}"
                     class="text-center py-5 text-muted">
                    <i class="bi bi-cpu fs-1"></i>
                    <p class="mt-3">No machines found.</p>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
