<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${pageTitle}">Machine Details</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <div class="card">
        <div class="card-header bg-dark text-white">
            <h2 th:text="${pageTitle}">Machine Details</h2>
        </div>
        <div class="card-body">
            <div th:if="${machine != null}">
                <h3 th:text="${machine.name}">Machine Name</h3>
                <p><strong>ID:</strong> <span th:text="${machine.id}"></span></p>
                <p><strong>Location:</strong> <span th:text="${machine.location}">Location</span></p>
                <p><strong>Status:</strong> <span th:text="${machine.status}">Status</span></p>
                <p><strong>Description:</strong> <span th:text="${machine.description}">Description</span></p>

                <form th:action="@{/technician/machines/update-status}" method="post" class="mt-3">
                    <input type="hidden" name="machineId" th:value="${machine.id}">
                    <select name="status" class="form-select w-50 d-inline-block">
                        <option value="WORKING">Working</option>
                        <option value="FAULTY">Faulty</option>
                        <option value="UNDER_MAINTENANCE">Under Maintenance</option>
                    </select>
                    <button type="submit" class="btn btn-primary">Update Status</button>
                </form>
            </div>
            <div th:unless="${machine != null}">
                <p>Machine not found.</p>
            </div>
            <a href="/technician/machines" class="btn btn-secondary mt-3">Back to Machines</a>
        </div>
    </div>
</div>
</body>
</html>
