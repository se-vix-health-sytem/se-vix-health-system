<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Machine Details')}"></head>
<body>
<div th:replace="~{fragments/dashboard-nav :: dashboardNav}"></div>

<div class="dashboard-content" style="margin-left: 280px;">
    <div class="container p-4" style="max-width: 900px;">

        <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-3">
            <h2 class="font-display mb-0" style="color:var(--vix-crimson);">
                <i class="bi bi-cpu me-2"></i>
                <span th:text="${machine?.name ?: 'Machine Details'}">Machine</span>
            </h2>
            <a th:href="@{/technician/machines}" class="btn btn-outline-secondary rounded-pill">
                <i class="bi bi-arrow-left me-1"></i>Back to Machines
            </a>
        </div>

        <div th:if="${machine != null}">
            <div class="card mb-4">
                <div class="card-header">Machine Information</div>
                <div class="card-body">
                    <div class="row g-3">
                        <div class="col-md-4">
                            <div class="text-muted small">Name</div>
                            <div class="fw-semibold" th:text="${machine.name}">-</div>
                        </div>
                        <div class="col-md-4">
                            <div class="text-muted small">Type</div>
                            <div th:text="${machine.type ?: '-'}">-</div>
                        </div>
                        <div class="col-md-4">
                            <div class="text-muted small">Status</div>
                            <span class="badge rounded-pill"
                                  th:classappend="${machine.status == 'OPERATIONAL' ? 'bg-success' :
                                                   machine.status == 'FAULTY' ? 'bg-danger' :
                                                   machine.status == 'MAINTENANCE' ? 'bg-warning text-dark' : 'bg-secondary'}"
                                  th:text="${machine.status ?: 'UNKNOWN'}">-</span>
                        </div>
                        <div class="col-md-4">
                            <div class="text-muted small">Location</div>
                            <div th:text="${machine.location ?: '-'}">-</div>
                        </div>
                        <div class="col-md-4">
                            <div class="text-muted small">Serial Number</div>
                            <div th:text="${machine.serialNumber ?: '-'}">-</div>
                        </div>
                        <div class="col-md-4">
                            <div class="text-muted small">Last Maintenance</div>
                            <div th:text="${machine.lastMaintenanceDate != null ?
                                #temporals.format(machine.lastMaintenanceDate,'dd/MM/yyyy') : '-'}">-</div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card mb-4">
                <div class="card-header"><i class="bi bi-pencil me-2"></i>Update Status</div>
                <div class="card-body">
                    <form th:action="@{/technician/machines/update-status}" method="post"
                          class="d-flex gap-3 align-items-end flex-wrap">
                        <input type="hidden" name="machineId" th:value="${machine.id}">
                        <div>
                            <label class="form-label">New Status</label>
                            <select name="status" class="form-select" style="min-width: 180px;">
                                <option value="OPERATIONAL">Operational</option>
                                <option value="MAINTENANCE">Under Maintenance</option>
                                <option value="FAULTY">Faulty</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-primary rounded-pill">
                            <i class="bi bi-check-circle me-1"></i>Update Status
                        </button>
                    </form>
                </div>
            </div>

            <div class="card">
                <div class="card-header"><i class="bi bi-wrench me-2"></i>Submit Repair</div>
                <div class="card-body">
                    <form th:action="@{/technician/repair/{machineId}(machineId=${machine.id})}" method="post"
                          class="row g-3">
                        <div class="col-12">
                            <label class="form-label">Repair Notes</label>
                            <textarea name="notes" class="form-control" rows="3"
                                      placeholder="Describe the repair performed…"></textarea>
                        </div>
                        <div class="col-12">
                            <button type="submit" class="btn btn-success rounded-pill">
                                <i class="bi bi-wrench me-2"></i>Submit Repair
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <div th:if="${machine == null}" class="text-center py-5 text-muted">
            <i class="bi bi-question-circle fs-1"></i>
            <p class="mt-3">Machine not found.</p>
            <a th:href="@{/technician/machines}" class="btn btn-outline-primary rounded-pill">Back to Machines</a>
        </div>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
