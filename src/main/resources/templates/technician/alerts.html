<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Active Alerts')}"></head>
<body>
<div th:replace="~{fragments/dashboard-nav :: dashboardNav}"></div>

<div class="dashboard-content" style="margin-left: 280px;">
    <div class="container p-4">

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="font-display mb-0" style="color:var(--vix-crimson);">
                <i class="bi bi-exclamation-triangle me-2"></i>Active Alerts
            </h2>
            <span class="badge rounded-pill px-3 py-2 bg-danger"
                  th:text="${alertCount != null ? alertCount + ' active' : '0 active'}">0</span>
        </div>

        <div class="card">
            <div class="card-body p-0">
                <div th:if="${alerts != null and !alerts.isEmpty()}">
                    <div th:each="alert : ${alerts}"
                         class="border-bottom px-4 py-3 d-flex justify-content-between align-items-start">
                        <div>
                            <div class="d-flex align-items-center gap-2 mb-1">
                                <i class="bi bi-exclamation-triangle-fill text-danger"></i>
                                <strong th:text="${alert.machineName ?: 'Machine'}">Machine</strong>
                            </div>
                            <div class="text-muted small" th:text="${alert.message ?: '-'}">-</div>
                            <div class="text-muted small" th:if="${alert.timestamp != null}"
                                 th:text="'Reported: ' + ${#temporals.format(alert.timestamp,'dd/MM/yyyy HH:mm')}">-</div>
                        </div>
                        <a th:if="${alert.machineId != null}"
                           th:href="@{/technician/machines/{id}(id=${alert.machineId})}"
                           class="btn btn-sm btn-outline-primary rounded-pill text-nowrap ms-3">
                            <i class="bi bi-tools me-1"></i>View Machine
                        </a>
                    </div>
                </div>
                <div th:if="${alerts == null or alerts.isEmpty()}"
                     class="text-center py-5 text-muted">
                    <i class="bi bi-check-circle-fill fs-1" style="color:var(--vix-gold);"></i>
                    <p class="mt-3">No active alerts. All systems operational.</p>
                    <a th:href="@{/technician/dashboard}" class="btn btn-outline-primary rounded-pill">
                        <i class="bi bi-arrow-left me-1"></i>Back to Dashboard
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
