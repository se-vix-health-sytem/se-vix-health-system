<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Payment Confirmation')}"></head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="container py-5" style="max-width: 600px;">

    <!-- Success case (flash message from redirect) -->
    <div th:if="${message != null}" class="text-center">
        <div class="mb-4">
            <div class="rounded-circle mx-auto d-flex align-items-center justify-content-center mb-4"
                 style="width:90px;height:90px;background:#d4edda;">
                <i class="bi bi-check-circle-fill fs-1 text-success"></i>
            </div>
            <h1 class="font-display display-6" style="color: var(--vix-crimson);">Payment Successful</h1>
            <p class="text-muted">Your appointment has been confirmed and paid.</p>
        </div>

        <div class="card border-0 shadow-sm mb-4">
            <div class="card-body p-4">
                <div class="alert alert-success mb-3" th:text="${message}"></div>

                <div class="d-flex justify-content-between align-items-center py-2 border-bottom">
                    <span class="text-muted small">Appointment ID</span>
                    <strong th:text="${'#' + appointmentId}">#</strong>
                </div>

                <div th:if="${appointment != null}">
                    <div class="d-flex justify-content-between align-items-center py-2 border-bottom">
                        <span class="text-muted small">Date &amp; Time</span>
                        <span class="small"
                              th:text="${appointment.dateTime != null ? #temporals.format(appointment.dateTime, 'dd/MM/yyyy HH:mm') : '-'}">-</span>
                    </div>
                    <div class="d-flex justify-content-between align-items-center py-2 border-bottom">
                        <span class="text-muted small">Status</span>
                        <span class="badge bg-success">PAID</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="d-flex gap-3 justify-content-center flex-wrap">
            <a th:href="@{/patient/appointments}" class="btn btn-primary rounded-pill px-4">
                <i class="bi bi-calendar-check me-2"></i>My Appointments
            </a>
            <a th:href="@{/patient/dashboard}" class="btn btn-outline-secondary rounded-pill px-4">
                <i class="bi bi-house me-2"></i>Dashboard
            </a>
        </div>
    </div>

    <!-- Error case -->
    <div th:if="${error != null}" class="text-center">
        <div class="mb-4">
            <div class="rounded-circle mx-auto d-flex align-items-center justify-content-center mb-4"
                 style="width:90px;height:90px;background:#f8d7da;">
                <i class="bi bi-x-circle-fill fs-1 text-danger"></i>
            </div>
            <h1 class="font-display display-6" style="color: var(--vix-crimson);">Payment Failed</h1>
            <p class="text-muted">There was a problem processing your payment.</p>
        </div>

        <div class="card border-0 shadow-sm mb-4">
            <div class="card-body p-4">
                <div class="alert alert-danger mb-0" th:text="${error}"></div>
            </div>
        </div>

        <div class="d-flex gap-3 justify-content-center flex-wrap">
            <a th:href="@{/payment/appointment/{id}(id=${appointmentId})}"
               class="btn btn-primary rounded-pill px-4">
                <i class="bi bi-arrow-repeat me-2"></i>Try Again
            </a>
            <a th:href="@{/patient/appointments}" class="btn btn-outline-secondary rounded-pill px-4">
                <i class="bi bi-calendar me-2"></i>My Appointments
            </a>
        </div>
    </div>

    <!-- Fallback (no flash attributes — direct navigation) -->
    <div th:if="${message == null and error == null}" class="text-center">
        <div class="rounded-circle mx-auto d-flex align-items-center justify-content-center mb-4"
             style="width:90px;height:90px;background:var(--vix-cream);border:2px solid var(--vix-gold);">
            <i class="bi bi-receipt fs-1" style="color:var(--vix-crimson);"></i>
        </div>
        <h1 class="font-display display-6 mb-3" style="color: var(--vix-crimson);">
            Appointment #<span th:text="${appointmentId}"></span>
        </h1>

        <div th:if="${appointment != null}" class="card border-0 shadow-sm mb-4">
            <div class="card-body p-4">
                <div class="d-flex justify-content-between align-items-center py-2 border-bottom">
                    <span class="text-muted small">Date &amp; Time</span>
                    <span th:text="${appointment.dateTime != null ? #temporals.format(appointment.dateTime,'dd/MM/yyyy HH:mm') : '-'}">-</span>
                </div>
                <div class="d-flex justify-content-between align-items-center py-2 border-bottom">
                    <span class="text-muted small">Payment Status</span>
                    <span class="badge rounded-pill"
                          th:classappend="${appointment.paymentStatus ? 'bg-success' : 'bg-warning text-dark'}"
                          th:text="${appointment.paymentStatus ? 'PAID' : 'PENDING'}">-</span>
                </div>
            </div>
        </div>

        <div class="d-flex gap-3 justify-content-center flex-wrap">
            <a th:href="@{/patient/appointments}" class="btn btn-primary rounded-pill px-4">
                <i class="bi bi-calendar-check me-2"></i>My Appointments
            </a>
            <a th:href="@{/patient/dashboard}" class="btn btn-outline-secondary rounded-pill px-4">
                <i class="bi bi-house me-2"></i>Dashboard
            </a>
        </div>
    </div>

</main>

<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
