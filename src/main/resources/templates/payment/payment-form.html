<!-- src/main/resources/templates/payment/payment-form.html -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${pageTitle}">Payment</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <div class="card" style="max-width: 500px; margin: 0 auto;">
        <div class="card-header bg-success text-white">
            <h2>💳 Complete Payment</h2>
        </div>
        <div class="card-body">
            <div class="alert alert-info">
                <strong>💰 Amount to pay:</strong> €<span th:text="${amount}">85.00</span>
            </div>

            <div class="alert alert-warning">
                <strong>🔧 DEMO MODE</strong><br>
                No real payment will be charged. Enter any fake card details to simulate payment.
            </div>

            <form action="/payment/fake-pay" method="post">
                <input type="hidden" name="appointmentId" th:value="${appointmentId}">
                <input type="hidden" name="amount" th:value="${amount}">

                <div class="mb-3">
                    <label class="form-label">Card Number</label>
                    <input type="text" class="form-control" value="4111111111111111" required>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Expiry Date</label>
                        <input type="text" class="form-control" placeholder="MM/YY" value="12/25" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">CVV</label>
                        <input type="text" class="form-control" placeholder="123" value="123" required>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Cardholder Name</label>
                    <input type="text" class="form-control" value="TEST USER" required>
                </div>

                <button type="submit" class="btn btn-success w-100">
                    💰 Pay €<span th:text="${amount}">85.00</span>
                </button>
            </form>
        </div>
    </div>
</div>
</body>
</html>
