<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Payment')}"></head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="container py-5" style="max-width: 600px;">
    <div class="text-center mb-5">
        <p class="section-eyebrow">VIX Health System</p>
        <h1 class="font-display display-6" style="color: var(--vix-crimson);">Appointment Payment</h1>
    </div>

    <div class="card border-0 shadow-sm">
        <div class="card-body p-4">

            <!-- Summary -->
            <div class="p-3 rounded-3 mb-4" style="background: var(--vix-cream);">
                <div class="d-flex justify-content-between align-items-center mb-2">
                    <span class="text-muted small">Appointment ID</span>
                    <strong th:text="${appointmentId}">#</strong>
                </div>
                <div class="d-flex justify-content-between align-items-center">
                    <span class="text-muted small">Amount Due</span>
                    <span class="fs-4 fw-bold font-display" style="color:var(--vix-crimson);"
                          th:text="${amount != null ? '€' + #numbers.formatDecimal(amount, 1, 2) : '€0.00'}">€0.00</span>
                </div>
            </div>

            <form th:action="@{/payment/fake-pay}" method="post" class="row g-3">
                <input type="hidden" name="appointmentId" th:value="${appointmentId}">
                <input type="hidden" name="amount" th:value="${amount}">

                <div class="col-12">
                    <label class="form-label">Cardholder Name</label>
                    <input type="text" name="cardName" class="form-control"
                           placeholder="Name on card" required>
                </div>
                <div class="col-12">
                    <label class="form-label">Card Number</label>
                    <input type="text" name="cardNumber" class="form-control"
                           placeholder="•••• •••• •••• ••••" maxlength="19" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Expiry Date</label>
                    <input type="text" name="expiry" class="form-control"
                           placeholder="MM/YY" maxlength="5" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">CVV</label>
                    <input type="text" name="cvv" class="form-control"
                           placeholder="•••" maxlength="4" required>
                </div>

                <div class="col-12 mt-2">
                    <button type="submit" class="btn btn-primary rounded-pill w-100 py-2">
                        <i class="bi bi-lock me-2"></i>
                        Pay <span th:text="${amount != null ? '€' + #numbers.formatDecimal(amount, 1, 2) : ''}"></span>
                    </button>
                    <p class="text-center text-muted small mt-2">
                        <i class="bi bi-shield-lock me-1"></i>Simulated payment — no real charges apply.
                    </p>
                </div>
            </form>
        </div>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
