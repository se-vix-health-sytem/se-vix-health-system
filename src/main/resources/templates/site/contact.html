<!DOCTYPE html>
<!--
==============================================================================
  FILE:    site/contact.html
  ACCESS:  Public
  PURPOSE: Contact page with an enquiry form and hospital info cards.

  Model attributes:
    - pageTitle (String) — page title
    - successMessage (String) — shown after a successful form submission

  Dependencies:
    - fragments/head, fragments/navbar, fragments/footer
==============================================================================
-->
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Contact Us')}"></head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="container py-5">
    <!-- ===== PAGE HEADER ===== -->
    <div class="text-center mb-5">
        <p class="section-eyebrow">Get in Touch</p>
        <h1 class="font-display display-5" style="color: var(--vix-crimson);">Contact Us</h1>
        <p class="text-muted">We're here to help. Reach out to us anytime.</p>
    </div>

    <div th:if="${successMessage}" class="alert alert-success text-center" th:text="${successMessage}"></div>

    <!-- ===== CONTACT FORM & INFO ===== -->
    <div class="row g-5">
        <div class="col-lg-6">
            <div class="card border-0 shadow-sm">
                <div class="card-header">Send us a Message</div>
                <div class="card-body">
                    <form th:action="@{/contact/submit}" method="post" class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">Full Name</label>
                            <input type="text" name="name" class="form-control" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Email</label>
                            <input type="email" name="email" class="form-control" required>
                        </div>
                        <div class="col-12">
                            <label class="form-label">Message</label>
                            <textarea name="message" class="form-control" rows="5" required></textarea>
                        </div>
                        <div class="col-12">
                            <button type="submit" class="btn btn-primary rounded-pill px-5">Send Message</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-lg-6">
            <div class="card border-0 shadow-sm mb-3">
                <div class="card-body d-flex gap-3">
                    <i class="bi bi-geo-alt-fill fs-3" style="color: var(--vix-crimson);"></i>
                    <div>
                        <h6 class="fw-bold">Main Hospital</h6>
                        <p class="small text-muted mb-0">Via San Camillo 1, 38122 Trento TN</p>
                    </div>
                </div>
            </div>
            <div class="card border-0 shadow-sm mb-3">
                <div class="card-body d-flex gap-3">
                    <i class="bi bi-telephone-fill fs-3" style="color: var(--vix-crimson);"></i>
                    <div>
                        <h6 class="fw-bold">Phone</h6>
                        <p class="small text-muted mb-0">+39 0461 000 001</p>
                    </div>
                </div>
            </div>
            <div class="card border-0 shadow-sm">
                <div class="card-body d-flex gap-3">
                    <i class="bi bi-envelope-fill fs-3" style="color: var(--vix-crimson);"></i>
                    <div>
                        <h6 class="fw-bold">Email</h6>
                        <p class="small text-muted mb-0">info@vixhealth.it</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
