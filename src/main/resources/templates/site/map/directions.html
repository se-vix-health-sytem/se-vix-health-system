<!DOCTYPE html>
<!--
==============================================================================
  FILE:    site/map/directions.html
  ACCESS:  Public
  PURPOSE: Shows a Leaflet map pinned to a single hospital so the patient
           can get directions or open Google Maps.

  Model attributes:
    - param.lat  (String) — latitude of the target location
    - param.lng  (String) — longitude of the target location
    - param.name (String) — location name shown on the pin popup

  Dependencies:
    - fragments/head, fragments/navbar, fragments/footer
    - Leaflet CSS injected after <head> fragment; Leaflet JS at bottom
==============================================================================
-->
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Directions')}"></head>
<!-- Leaflet CSS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="container py-4" style="max-width: 900px;">

    <a th:href="@{/map/hospitals}" class="btn btn-outline-secondary rounded-pill btn-sm mb-4">
        <i class="bi bi-arrow-left me-1"></i>All Locations
    </a>

    <div class="d-flex justify-content-between align-items-start flex-wrap gap-3 mb-4">
        <div>
            <p class="section-eyebrow mb-1">Directions</p>
            <h1 class="font-display display-6 mb-0" style="color: var(--vix-crimson);"
                th:text="${param.name != null ? param.name[0] : 'VIX Health Location'}">Location</h1>
        </div>
        <a th:if="${param.lat != null and param.lng != null}"
           th:href="${'https://www.google.com/maps/search/?api=1&query=' + param.lat[0] + ',' + param.lng[0]}"
           class="btn btn-primary rounded-pill" target="_blank" rel="noopener noreferrer">
            <i class="bi bi-box-arrow-up-right me-2"></i>Open in Google Maps
        </a>
    </div>

    <!-- Leaflet map -->
    <div id="map" class="mb-4 rounded-3 shadow-sm" style="height: 420px;"></div>

    <!-- Info cards -->
    <div class="row g-3">
        <div class="col-md-4">
            <div class="card border-0 shadow-sm text-center p-3 h-100">
                <i class="bi bi-car-front fs-2 mb-2" style="color:var(--vix-gold);"></i>
                <div class="small fw-semibold">By Car</div>
                <div class="small text-muted">Free parking available on site</div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card border-0 shadow-sm text-center p-3 h-100">
                <i class="bi bi-bus-front fs-2 mb-2" style="color:var(--vix-gold);"></i>
                <div class="small fw-semibold">By Bus</div>
                <div class="small text-muted">Check local transit routes</div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card border-0 shadow-sm text-center p-3 h-100">
                <i class="bi bi-bicycle fs-2 mb-2" style="color:var(--vix-gold);"></i>
                <div class="small fw-semibold">By Bike</div>
                <div class="small text-muted">Bike racks at main entrance</div>
            </div>
        </div>
    </div>

</main>

<div th:replace="~{fragments/footer :: footer}"></div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV/XN/WLs=" crossorigin=""></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script th:inline="javascript">
    /*<![CDATA[*/
    const latParam  = /*[[${param.lat  != null ? param.lat[0]  : null}]]*/ null;
    const lngParam  = /*[[${param.lng  != null ? param.lng[0]  : null}]]*/ null;
    const nameParam = /*[[${param.name != null ? param.name[0] : 'VIX Health Location'}]]*/ 'VIX Health Location';

    const lat = latParam  != null ? parseFloat(latParam)  : 45.4642;
    const lng = lngParam  != null ? parseFloat(lngParam)  : 9.1900;
    const zoom = (latParam != null && lngParam != null) ? 16 : 12;

    const map = L.map('map').setView([lat, lng], zoom);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 18,
        attribution: '© <a href="https://www.openstreetmap.org/">OpenStreetMap</a> contributors'
    }).addTo(map);

    const crimsonIcon = L.divIcon({
        html: '<div style="background:#7a1428;width:34px;height:34px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);border:3px solid white;box-shadow:0 2px 8px rgba(0,0,0,0.5);"></div>',
        iconSize: [34, 34],
        iconAnchor: [17, 34],
        popupAnchor: [0, -36],
        className: ''
    });

    const marker = L.marker([lat, lng], {icon: crimsonIcon}).addTo(map);
    marker.bindPopup(
        '<strong style="color:#7a1428;">' + nameParam + '</strong>' +
        '<br><small style="color:#888;">' + lat.toFixed(4) + ', ' + lng.toFixed(4) + '</small>'
    ).openPopup();
    /*]]>*/
</script>
</body>
</html>
