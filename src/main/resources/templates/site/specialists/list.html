<!DOCTYPE html>
<!--
==============================================================================
  FILE:    site/specialists/list.html
  ACCESS:  Public
  PURPOSE: Public directory of all medical specialists with photo, specialty,
           and links to book an appointment or view a full profile.

  Model attributes:
    - specialists (List<MedicalSpecialist>) — all active specialists
    - doctorImages (Map<Long, String>) — maps specialist ID to image path
    - departmentCount (int) — number of distinct departments covered

  Dependencies:
    - fragments/head, fragments/navbar, fragments/footer
==============================================================================
-->
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head(pageTitle)}"></head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="container py-5">
    <!-- ===== PAGE HEADER ===== -->
    <div class="text-center mb-5">
        <p class="section-eyebrow">VIX Health System</p>
        <h1 class="font-display display-5" style="color: var(--vix-crimson);">Our Medical Specialists</h1>
        <p class="text-muted">Expert physicians across all medical disciplines</p>
    </div>

    <!-- ===== STATS ===== -->
    <div class="row g-4 mb-5">
        <div class="col-md-4">
            <div class="card border-0 shadow-sm text-center p-3">
                <div class="display-6 fw-bold" style="color: var(--vix-crimson);"
                     th:text="${specialists != null ? specialists.size() : 0}">0</div>
                <div class="text-muted small">Medical Specialists</div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card border-0 shadow-sm text-center p-3">
                <div class="display-6 fw-bold" style="color: var(--vix-crimson);"
                     th:text="${departmentCount ?: 0}">0</div>
                <div class="text-muted small">Departments Covered</div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card border-0 shadow-sm text-center p-3">
                <div class="display-6 fw-bold" style="color: var(--vix-crimson);">10+</div>
                <div class="text-muted small">Years of Excellence</div>
            </div>
        </div>
    </div>

    <!-- ===== SPECIALIST GRID ===== -->
    <div th:if="${specialists != null and !specialists.isEmpty()}" class="row g-4">
        <div class="col-md-6 col-lg-4" th:each="specialist : ${specialists}">
            <div class="card h-100 border-0 shadow-sm">
                <div class="card-body p-4 d-flex flex-column">
                    <!-- Photo + name row -->
                    <div class="d-flex align-items-center gap-3 mb-3">
                        <img th:src="${doctorImages != null and doctorImages.containsKey(specialist.id) ? doctorImages[specialist.id] : '/images/doctors/placeholder.jpg'}"
                             th:alt="'Dr. ' + ${specialist.name} + ' ' + ${specialist.surname}"
                             class="rounded-circle flex-shrink-0"
                             width="64" height="64"
                             style="object-fit:cover;border:2px solid var(--vix-gold);"
                             onerror="this.onerror=null;this.src='/images/doctors/placeholder.jpg';">
                        <div>
                            <h5 class="font-display mb-1" style="color: var(--vix-crimson); font-size: 1rem;">
                                Dr. <span th:text="${specialist.name} + ' ' + ${specialist.surname}">Name</span>
                            </h5>
                            <span class="badge rounded-pill" style="background: var(--vix-gold); color: white;"
                                  th:text="${specialist.specialty ?: 'General Medicine'}">Specialty</span>
                        </div>
                    </div>

                    <!-- Contact details -->
                    <div class="mb-3 flex-grow-1">
                        <p class="text-muted small mb-1" th:if="${specialist.email}">
                            <i class="bi bi-envelope me-2" style="color: var(--vix-gold);"></i>
                            <span th:text="${specialist.email}">Email</span>
                        </p>
                        <p class="text-muted small mb-1" th:if="${specialist.phoneNumber}">
                            <i class="bi bi-telephone me-2" style="color: var(--vix-gold);"></i>
                            <span th:text="${specialist.phoneNumber}">Phone</span>
                        </p>
                        <p class="text-muted small mb-1" th:if="${specialist.department != null}">
                            <i class="bi bi-building me-2" style="color: var(--vix-gold);"></i>
                            <span th:text="${specialist.department.name}">Department</span>
                        </p>
                    </div>

                    <!-- Buttons always pinned to bottom -->
                    <div class="d-flex gap-2">
                        <a th:href="@{/specialists/{id}(id=${specialist.id})}"
                           class="btn btn-outline-primary rounded-pill btn-sm flex-grow-1">
                            View Profile
                        </a>
                        <a th:href="@{/patient/appointments/book}"
                           class="btn btn-primary rounded-pill btn-sm flex-grow-1">
                            Book
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div th:if="${specialists == null or specialists.isEmpty()}" class="text-center py-5 text-muted">
        <i class="bi bi-person-x fs-1"></i>
        <p class="mt-3">No medical specialists found.</p>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
