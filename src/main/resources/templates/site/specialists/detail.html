<!DOCTYPE html>
<!--
==============================================================================
  FILE:    site/specialists/detail.html
  ACCESS:  Public
  PURPOSE: Full profile page for a single medical specialist with contact
           info, department details, and a book-appointment CTA.

  Model attributes:
    - specialist (MedicalSpecialist): the specialist to display
    - doctorImages (Map<Long, String>): maps specialist ID to image path
    - pageTitle (String): page title

  Dependencies:
    - fragments/head, fragments/navbar, fragments/footer
==============================================================================
-->
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head(${specialist.name + ' ' + specialist.surname})}"></head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="container py-5" style="max-width: 960px;">

    <a th:href="@{/specialists}" class="btn btn-outline-secondary rounded-pill btn-sm mb-4">
        <i class="bi bi-arrow-left me-1"></i> All Specialists
    </a>

    <div th:if="${specialist != null}">
        <div class="card border-0 shadow-sm mb-4">
            <div class="card-body p-4">
                <div class="row align-items-center">
                    <div class="col-md-3 text-center text-md-start mb-3 mb-md-0">
                        <img th:src="${doctorImages != null and doctorImages.containsKey(specialist.id) ? doctorImages[specialist.id] : '/images/doctors/placeholder.jpg'}"
                             th:alt="'Dr. ' + ${specialist.name} + ' ' + ${specialist.surname}"
                             class="rounded-circle mx-auto mx-md-0 d-block"
                             width="120" height="120"
                             style="object-fit:cover;border:3px solid var(--vix-gold);cursor:pointer;"
                             onerror="this.onerror=null;this.src='/images/doctors/placeholder.jpg';"
                             data-bs-toggle="modal" data-bs-target="#photoModal"
                             th:data-src="${doctorImages != null and doctorImages.containsKey(specialist.id) ? doctorImages[specialist.id] : '/images/doctors/placeholder.jpg'}">
                        <small class="text-muted d-block mt-1" style="font-size:0.7rem;">Click to enlarge</small>
                    </div>
                    <div class="col-md-9">
                        <p class="section-eyebrow mb-1">Medical Specialist</p>
                        <h1 class="font-display mb-1" style="color: var(--vix-crimson);">
                            Dr. <span th:text="${specialist.name} + ' ' + ${specialist.surname}">Name</span>
                        </h1>
                        <span class="badge rounded-pill px-3 py-2" style="background: var(--vix-gold); color: white;"
                              th:text="${specialist.specialty ?: 'General Medicine'}">Specialty</span>
                        <span class="badge rounded-pill px-3 py-2 bg-secondary ms-2" th:if="${specialist.department != null}"
                              th:text="${specialist.department.name}">Department</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="row g-4">
            <div class="col-md-5">
                <div class="card h-100">
                    <div class="card-header">Contact Information</div>
                    <div class="card-body">
                        <dl class="row mb-0">
                            <dt class="col-5 text-muted fw-normal small">Email</dt>
                            <dd class="col-7 small" th:text="${specialist.email ?: 'Not available'}">-</dd>

                            <dt class="col-5 text-muted fw-normal small mt-2">Phone</dt>
                            <dd class="col-7 small" th:text="${specialist.phoneNumber ?: 'Not available'}">-</dd>

                            <dt class="col-5 text-muted fw-normal small mt-2">Gender</dt>
                            <dd class="col-7 small"
                                th:text="${specialist.gender.toString() == 'M' or specialist.gender.toString() == 'm'} ? 'Male' : (${specialist.gender.toString() == 'F' or specialist.gender.toString() == 'f'} ? 'Female' : '-')">-</dd>

                            <dt class="col-5 text-muted fw-normal small mt-2">License No.</dt>
                            <dd class="col-7 small" th:text="${specialist.licenseNumber ?: 'Not available'}">-</dd>
                        </dl>
                    </div>
                </div>
            </div>

            <div class="col-md-7">
                <div class="card h-100">
                    <div class="card-header">Department Information</div>
                    <div class="card-body">
                        <div th:if="${specialist.department != null}">
                            <h5 class="font-display mb-2" style="color: var(--vix-crimson);"
                                th:text="${specialist.department.name}">Department Name</h5>
                            <p class="text-muted small" th:text="${specialist.department.description ?: 'No description available'}">-</p>
                        </div>
                        <div th:unless="${specialist.department != null}" class="text-center py-4 text-muted">
                            <i class="bi bi-building-x fs-2"></i>
                            <p class="mt-2 small">No department assigned.</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-12">
                <div class="card">
                    <div class="card-header">Book an Appointment</div>
                    <div class="card-body text-center py-4">
                        <p>Ready to schedule a consultation with Dr. <span th:text="${specialist.name + ' ' + specialist.surname}">?</span></p>
                        <a th:href="${session.patient != null}
                                    ? @{/patient/appointments/book/{id}(id=${specialist.id})}
                                    : @{/patient/login(redirect=${'appointments/book/' + specialist.id})}"
                           class="btn btn-primary rounded-pill px-5">
                            <i class="bi bi-calendar-plus me-1"></i> Book Appointment
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<!-- Photo expand modal -->
<div class="modal fade" id="photoModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0" style="background:transparent;">
            <div class="modal-body p-0 text-center">
                <img id="photoModalImg" src="" alt="Specialist photo"
                     class="img-fluid rounded-3"
                     style="max-height:80vh;border:4px solid var(--vix-gold);">
                <button type="button" class="btn btn-light rounded-pill mt-3"
                        data-bs-dismiss="modal">Close</button>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.getElementById('photoModal').addEventListener('show.bs.modal', function(e) {
        var src = e.relatedTarget.getAttribute('data-src');
        document.getElementById('photoModalImg').src = src || e.relatedTarget.src;
    });
</script>
</body>
</html>
