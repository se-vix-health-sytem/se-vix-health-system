<!DOCTYPE html>
<!--
==============================================================================
  FILE:    site/questionnaire/index.html
  ACCESS:  Public
  PURPOSE: Short symptom-checker form that guides visitors to the right
           specialist based on affected body area, severity, and duration.

  Model attributes:
    - symptomCategories (Map<String, String>) — key=value pairs for radio
      buttons (e.g. CARDIAC → Heart & Cardiovascular)

  Dependencies:
    - fragments/head, fragments/navbar, fragments/footer
==============================================================================
-->
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Symptom Questionnaire')}"></head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="container py-5" style="max-width: 720px;">
    <div class="text-center mb-5">
        <p class="section-eyebrow">VIX Health System</p>
        <h1 class="font-display display-5" style="color: var(--vix-crimson);">Symptom Checker</h1>
        <p class="text-muted">Answer a few quick questions and we'll help guide you to the right specialist.</p>
    </div>

    <div class="card border-0 shadow-sm">
        <div class="card-body p-4">
            <form th:action="@{/questionnaire/result}" method="post" class="row g-4">

                <div class="col-12">
                    <label class="form-label fw-semibold">What area of your body is affected?</label>
                    <div th:if="${symptomCategories != null and !symptomCategories.isEmpty()}"
                         class="row g-2 mt-1">
                        <div class="col-6 col-md-4"
                             th:each="entry : ${symptomCategories}">
                            <input type="radio" class="btn-check" name="symptomArea"
                                   th:id="${'area-' + entry.key}"
                                   th:value="${entry.key}" required>
                            <label class="btn btn-outline-primary w-100 text-start rounded-3"
                                   th:for="${'area-' + entry.key}"
                                   th:text="${entry.value}">Area</label>
                        </div>
                    </div>
                    <div th:if="${symptomCategories == null or symptomCategories.isEmpty()}">
                        <input type="text" name="symptomArea" class="form-control"
                               placeholder="Describe the affected area…" required>
                    </div>
                </div>

                <div class="col-md-6">
                    <label class="form-label fw-semibold">Severity</label>
                    <select name="severity" class="form-select" required>
                        <option value="">Select severity…</option>
                        <option value="MILD">Mild — noticeable but manageable</option>
                        <option value="MODERATE">Moderate — affecting daily life</option>
                        <option value="SEVERE">Severe — urgent attention needed</option>
                    </select>
                </div>

                <div class="col-md-6">
                    <label class="form-label fw-semibold">How long have you had symptoms?</label>
                    <select name="duration" class="form-select" required>
                        <option value="">Select duration…</option>
                        <option value="HOURS">Less than 24 hours</option>
                        <option value="DAYS">A few days</option>
                        <option value="WEEKS">Several weeks</option>
                        <option value="MONTHS">Months or longer</option>
                    </select>
                </div>

                <div class="col-12">
                    <button type="submit" class="btn btn-primary rounded-pill px-5">
                        <i class="bi bi-search me-2"></i>Get Recommendation
                    </button>
                </div>
            </form>
        </div>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
