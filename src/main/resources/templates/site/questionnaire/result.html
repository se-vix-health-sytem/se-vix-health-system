<!DOCTYPE html>
<!--
==============================================================================
  FILE:    site/questionnaire/result.html
  ACCESS:  Public
  PURPOSE: Displays the specialist recommendation produced by the symptom
           checker, including urgency level and links to book or browse.

  Model attributes:
    - recommendation (Map): keys: specialist, description, urgency,
      symptomArea, departmentLink

  Dependencies:
    - fragments/head, fragments/navbar, fragments/footer
==============================================================================
-->
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Questionnaire Result')}"></head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="container py-5" style="max-width: 720px;">
    <div class="text-center mb-5">
        <p class="section-eyebrow">Your Result</p>
        <h1 class="font-display display-5" style="color: var(--vix-crimson);">Specialist Recommendation</h1>
    </div>

    <div th:if="${recommendation != null}" class="card border-0 shadow-sm mb-4">
        <div class="card-body p-4">

            <!-- Urgency banner -->
            <div class="alert mb-4"
                 th:classappend="${recommendation['urgency'] == 'HIGH' ? 'alert-danger' :
                                  recommendation['urgency'] == 'MEDIUM' ? 'alert-warning' : 'alert-success'}">
                <i class="bi me-2"
                   th:classappend="${recommendation['urgency'] == 'HIGH' ? 'bi-exclamation-octagon-fill' :
                                    recommendation['urgency'] == 'MEDIUM' ? 'bi-exclamation-triangle-fill' : 'bi-check-circle-fill'}"></i>
                <strong>Urgency: </strong>
                <span th:text="${recommendation['urgency']}">-</span>
            </div>

            <!-- Specialist -->
            <div class="d-flex align-items-start gap-3 mb-4 p-3 rounded-3"
                 style="background: var(--vix-cream);">
                <div class="rounded-circle d-flex align-items-center justify-content-center flex-shrink-0"
                     style="width:52px;height:52px;background:var(--vix-crimson);">
                    <i class="bi bi-person-badge text-white fs-4"></i>
                </div>
                <div>
                    <div class="text-muted small mb-1">Recommended Specialist</div>
                    <h4 class="font-display mb-1" th:text="${recommendation['specialist']}">Specialist</h4>
                    <p class="text-muted small mb-0" th:text="${recommendation['description']}">Description</p>
                </div>
            </div>

            <!-- Symptom area -->
            <div th:if="${recommendation['symptomArea'] != null}" class="mb-3 small text-muted">
                <i class="bi bi-geo me-1"></i>
                Symptom area: <strong th:text="${recommendation['symptomArea']}">-</strong>
            </div>

            <!-- CTA -->
            <div class="d-flex gap-3 flex-wrap mt-4">
                <!-- Link to the specific department where the relevant specialists are -->
                <a th:if="${recommendation['departmentLink'] != null}"
                   th:href="${recommendation['departmentLink']}"
                   class="btn btn-primary rounded-pill">
                    <i class="bi bi-calendar-check me-2"></i>Book with a Specialist
                </a>
                <!-- Fallback for General Medicine (no department) -->
                <a th:if="${recommendation['departmentLink'] == null}"
                   th:href="@{/specialists}"
                   class="btn btn-primary rounded-pill">
                    <i class="bi bi-calendar-check me-2"></i>Browse Specialists
                </a>
                <a th:if="${recommendation['departmentLink'] != null}"
                   th:href="${recommendation['departmentLink']}"
                   class="btn btn-outline-primary rounded-pill">
                    <i class="bi bi-hospital me-2"></i>View Department
                </a>
                <a th:href="@{/questionnaire}" class="btn btn-outline-secondary rounded-pill">
                    <i class="bi bi-arrow-repeat me-2"></i>Start Over
                </a>
            </div>
        </div>
    </div>

    <div th:if="${recommendation == null}" class="text-center py-5 text-muted">
        <i class="bi bi-question-circle fs-1"></i>
        <p class="mt-3">No recommendation could be generated. Please try again.</p>
        <a th:href="@{/questionnaire}" class="btn btn-primary rounded-pill">Try Again</a>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
