<!DOCTYPE html>
<!--
==============================================================================
  FILE:    staff-manager/shifts.html
  ACCESS:  ROLE_STAFFMANAGER (session.user required)
  PURPOSE: Assign shifts to employees and view all currently scheduled shifts
           in a table with date, shift type, and notes.

  Model attributes:
    - employees (List<Employee>): all employees for the assign dropdown
    - shifts (List<Shift>): all shifts currently scheduled

  Dependencies:
    - fragments/head, fragments/dashboard-nav, fragments/footer
==============================================================================
-->
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Shift Management')}"></head>
<body>
<div th:replace="~{fragments/dashboard-nav :: dashboardNav}"></div>

<div class="dashboard-content" style="margin-left: 280px;">
    <div class="container p-4">

        <!-- Assign Shift Form -->
        <div class="card mb-4">
            <div class="card-header">
                <h5 class="mb-0 font-display"><i class="bi bi-plus-circle me-2"></i>Assign Shift</h5>
            </div>
            <div class="card-body">
                <form th:action="@{/staff-manager/shifts/assign}" method="post" class="row g-3">
                    <div class="col-md-4">
                        <label class="form-label">Employee</label>
                        <select name="employeeId" class="form-select" required>
                            <option value="">Select employee…</option>
                            <option th:each="emp : ${employees}" th:value="${emp.id}"
                                    th:text="${emp.name + ' ' + emp.surname + ' (' + emp.class.simpleName + ')'}">-</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Date</label>
                        <input type="date" name="date" class="form-control" required>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Shift Type</label>
                        <select name="shiftType" class="form-select" required>
                            <option value="MORNING">Morning</option>
                            <option value="AFTERNOON">Afternoon</option>
                            <option value="NIGHT">Night</option>
                        </select>
                    </div>
                    <div class="col-md-2 d-flex align-items-end">
                        <button type="submit" class="btn btn-primary rounded-pill w-100">Assign</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Shifts List -->
        <div class="card">
            <div class="card-header">
                <h5 class="mb-0 font-display">
                    <i class="bi bi-calendar-week me-2"></i>All Shifts
                    <span class="badge bg-secondary ms-2"
                          th:text="${shifts != null ? shifts.size() : 0}">0</span>
                </h5>
            </div>
            <div class="card-body p-0">
                <div th:if="${shifts != null and !shifts.isEmpty()}">
                    <div class="table-responsive">
                        <table class="table table-hover mb-0">
                            <thead style="background: var(--vix-cream);">
                                <tr>
                                    <th>Employee ID</th>
                                    <th>Date</th>
                                    <th>Shift Type</th>
                                    <th>Notes</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="shift : ${shifts}">
                                    <td class="small">
                                        <i class="bi bi-person me-1"></i>
                                        <span th:text="${shift.employeeId}">-</span>
                                    </td>
                                    <td class="small"
                                        th:text="${shift.date != null ? #temporals.format(shift.date,'dd/MM/yyyy (EEE)') : '-'}">-</td>
                                    <td>
                                        <span class="badge rounded-pill"
                                              th:classappend="${shift.shiftType == 'MORNING' ? 'bg-warning text-dark' :
                                                               shift.shiftType == 'AFTERNOON' ? 'bg-info text-dark' : 'bg-dark'}"
                                              th:text="${shift.shiftType}">-</span>
                                    </td>
                                    <td class="small text-muted" th:text="${shift.notes ?: '-'}">-</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
                <div th:if="${shifts == null or shifts.isEmpty()}"
                     class="text-center py-5 text-muted">
                    <i class="bi bi-calendar2-x fs-1"></i>
                    <p class="mt-3">No shifts assigned yet.</p>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
