<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Employees')}"></head>
<body>
<div th:replace="~{fragments/dashboard-nav :: dashboardNav}"></div>

<div class="dashboard-content" style="margin-left: 280px;">
    <div class="container p-4">

        <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-3">
            <h2 class="font-display mb-0" style="color:var(--vix-crimson);">
                <i class="bi bi-people me-2"></i>Employee Management
            </h2>
            <a th:href="@{/staff-manager/employees/create}" class="btn btn-primary rounded-pill">
                <i class="bi bi-person-plus me-2"></i>Create Employee
            </a>
        </div>

        <!-- Type filter -->
        <div class="card mb-3">
            <div class="card-body py-2">
                <div class="d-flex gap-2 flex-wrap">
                    <a th:href="@{/staff-manager/employees}"
                       class="btn btn-sm rounded-pill"
                       th:classappend="${selectedType == null ? 'btn-primary' : 'btn-outline-secondary'}">
                        All
                    </a>
                    <a th:each="type : ${employeeTypes}"
                       th:href="@{/staff-manager/employees(type=${type})}"
                       class="btn btn-sm rounded-pill"
                       th:classappend="${selectedType == type ? 'btn-primary' : 'btn-outline-secondary'}"
                       th:text="${type.replace('_', ' ')}">Type</a>
                </div>
            </div>
        </div>

        <!-- Employees Table -->
        <div class="card">
            <div class="card-body p-0">
                <div th:if="${employees != null and !employees.isEmpty()}">
                    <div class="table-responsive">
                        <table class="table table-hover mb-0">
                            <thead style="background: var(--vix-cream);">
                                <tr>
                                    <th>Name</th>
                                    <th>Type</th>
                                    <th>Email</th>
                                    <th>Department</th>
                                    <th>Hire Date</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="emp : ${employees}">
                                    <td>
                                        <i class="bi bi-person-circle me-1" style="color:var(--vix-crimson);"></i>
                                        <span th:text="${emp.name + ' ' + emp.surname}">-</span>
                                    </td>
                                    <td>
                                        <span class="badge rounded-pill"
                                              th:text="${emp.class.simpleName}"
                                              th:classappend="${emp.class.simpleName == 'MedicalSpecialist' ? 'bg-primary' :
                                                               emp.class.simpleName == 'Secretary' ? 'bg-info text-dark' :
                                                               emp.class.simpleName == 'Technician' ? 'bg-warning text-dark' :
                                                               emp.class.simpleName == 'Buyer' ? 'bg-success' : 'bg-dark'}">-</span>
                                    </td>
                                    <td class="small" th:text="${emp.email ?: '-'}">-</td>
                                    <td class="small" th:text="${emp.department?.name ?: '-'}">-</td>
                                    <td class="small"
                                        th:text="${emp.hireDate != null ? #temporals.format(emp.hireDate,'dd/MM/yyyy') : '-'}">-</td>
                                    <td>
                                        <form th:action="@{/staff-manager/employees/delete}" method="post"
                                              class="d-inline">
                                            <input type="hidden" name="employeeId" th:value="${emp.id}">
                                            <button type="submit" class="btn btn-sm btn-outline-danger rounded-pill"
                                                    onclick="return confirm('Delete this employee?')">
                                                <i class="bi bi-trash"></i>
                                            </button>
                                        </form>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
                <div th:if="${employees == null or employees.isEmpty()}"
                     class="text-center py-5 text-muted">
                    <i class="bi bi-person-x fs-1"></i>
                    <p class="mt-3">No employees found.</p>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
