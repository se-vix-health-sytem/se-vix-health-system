<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Employees')}"></head>
<body>
<div th:replace="~{fragments/dashboard-nav :: dashboardNav}"></div>

<div class="dashboard-content" style="margin-left: 280px;">
    <div class="container p-4">

        <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-3">
            <h2 class="font-display mb-0" style="color:var(--vix-crimson);">
                <i class="bi bi-people me-2"></i>Employee Management
            </h2>
            <a th:href="@{/staff-manager/employees/create}" class="btn btn-primary rounded-pill">
                <i class="bi bi-person-plus me-2"></i>Create Employee
            </a>
        </div>

        <div class="card mb-3">
            <div class="card-body py-2">
                <div class="d-flex gap-2 flex-wrap">
                    <a th:href="@{/staff-manager/employees}"
                       class="btn btn-sm rounded-pill"
                       th:classappend="${selectedType == null ? 'btn-primary' : 'btn-outline-secondary'}">
                        All
                    </a>
                    <a th:each="type : ${employeeTypes}"
                       th:href="@{/staff-manager/employees(type=${type})}"
                       class="btn btn-sm rounded-pill"
                       th:classappend="${selectedType == type ? 'btn-primary' : 'btn-outline-secondary'}"
                       th:text="${type.replace('_', ' ')}">Type</a>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-body p-0">
                <div th:if="${employees != null and !employees.isEmpty()}">
                    <div class="table-responsive">
                        <table class="table table-hover mb-0">
                            <thead style="background: var(--vix-cream);">
                            <tr>
                                <th>Name</th>
                                <th>Type</th>
                                <th>Email</th>
                                <th>Department</th>
                                <th>Hire Date</th>
                                <th>Actions</th>
                            </tr>
                            </thead>

                            <tbody>
                            <tr th:each="employee : ${employees}">
                                <td>
                                    <i class="bi bi-person-circle me-1" style="color:var(--vix-crimson);"></i>
                                    <span th:text="${employee.name + ' ' + employee.surname}">-</span>
                                </td>

                                <td>
                                    <span class="badge rounded-pill"
                                          th:text="${employee.getClass().getSimpleName()}"
                                          th:classappend="${employee.getClass().getSimpleName() == 'MedicalSpecialist' ? 'bg-primary' :
                                                           employee.getClass().getSimpleName() == 'Secretary' ? 'bg-info text-dark' :
                                                           employee.getClass().getSimpleName() == 'Technician' ? 'bg-warning text-dark' :
                                                           employee.getClass().getSimpleName() == 'Buyer' ? 'bg-success' : 'bg-dark'}">-</span>
                                </td>

                                <td class="small"
                                    th:text="${employee.email != null ? employee.email : '-'}">-</td>

                                <td class="small"
                                    th:text="${employee.department != null ? employee.department.name : '-'}">-</td>

                                <td class="small"
                                    th:text="${employee.hireDate != null ? #temporals.format(employee.hireDate,'dd/MM/yyyy') : '-'}">-</td>

                                <td>
                                    <a th:href="@{/staff-manager/employees/{id}(id=${employee.id})}"
                                       class="btn btn-sm btn-outline-info rounded-pill me-1" title="View Details">
                                        <i class="bi bi-eye"></i>
                                    </a>
                                    <form th:action="@{/staff-manager/employees/reset-password}" method="post" class="d-inline">
                                        <input type="hidden" name="employeeId" th:value="${employee.id}">
                                        <button type="submit" class="btn btn-sm btn-outline-warning rounded-pill me-1"
                                                onclick="return confirm('Generate password reset link for this employee?')">
                                            <i class="bi bi-key"></i>
                                        </button>
                                    </form>
                                    <form th:action="@{/staff-manager/employees/delete}" method="post" class="d-inline">
                                        <input type="hidden" name="employeeId" th:value="${employee.id}">
                                        <button type="submit" class="btn btn-sm btn-outline-danger rounded-pill"
                                                onclick="return confirm('Delete this employee?')">
                                            <i class="bi bi-trash"></i>
                                        </button>
                                    </form>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <div th:if="${employees == null or employees.isEmpty()}"
                     class="text-center py-5 text-muted">
                    <i class="bi bi-person-x fs-1"></i>
                    <p class="mt-3">No employees found.</p>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
