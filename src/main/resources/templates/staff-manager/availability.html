<!DOCTYPE html>
<!--
==============================================================================
  FILE:    staff-manager/availability.html
  ACCESS:  ROLE_STAFFMANAGER (session.user required)
  PURPOSE: Per-employee availability overview listing each person's shifts,
           approved vacations, and (for specialists) upcoming appointments.

  Model attributes:
    - employees (List<Employee>) — all employees
    - shiftsByEmployee (Map<Long, List<Shift>>) — shifts keyed by employee ID
    - vacationsByEmployee (Map<Long, List<Vacation>>) — vacations by employee
    - appointmentsBySpecialist (Map<Long, List<Appointment>>) — appts by ID

  Dependencies:
    - fragments/head, fragments/dashboard-nav, fragments/footer
==============================================================================
-->
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Employee Availability')}"></head>
<body>
<div th:replace="~{fragments/dashboard-nav :: dashboardNav}"></div>

<div class="dashboard-content" style="margin-left: 280px;">
    <div class="container p-4">

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="font-display mb-0" style="color:var(--vix-crimson);">
                <i class="bi bi-clock-history me-2"></i>Employee Availability
            </h2>
            <a th:href="@{/staff-manager/shifts}" class="btn btn-outline-primary rounded-pill">
                <i class="bi bi-calendar-week me-1"></i>Manage Shifts
            </a>
        </div>

        <div th:if="${employees == null or employees.isEmpty()}"
             class="text-center py-5 text-muted">
            <i class="bi bi-people fs-1"></i>
            <p class="mt-3">No employees found.</p>
        </div>

        <div th:if="${employees != null and !employees.isEmpty()}">
            <div th:each="emp : ${employees}" class="card mb-3">
                <div class="card-header d-flex justify-content-between align-items-center py-2">
                    <div class="d-flex align-items-center gap-2">
                        <i class="bi bi-person-circle" style="color:var(--vix-crimson);"></i>
                        <span class="fw-semibold" th:text="${emp.name + ' ' + emp.surname}">-</span>
                        <span class="badge rounded-pill"
                              th:classappend="${emp.class.simpleName == 'MedicalSpecialist' ? 'bg-primary' :
                                               emp.class.simpleName == 'Secretary' ? 'bg-info text-dark' :
                                               emp.class.simpleName == 'Technician' ? 'bg-warning text-dark' :
                                               emp.class.simpleName == 'Buyer' ? 'bg-success' : 'bg-dark'}"
                              th:text="${emp.class.simpleName}">-</span>
                    </div>
                    <small class="text-muted"
                           th:text="${shiftsByEmployee.containsKey(emp.id) ? shiftsByEmployee.get(emp.id).size() + ' shift(s) assigned' : 'No shifts assigned'}">
                    </small>
                </div>
                <div th:if="${shiftsByEmployee.containsKey(emp.id)}" class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-sm mb-0">
                            <thead style="background: var(--vix-cream);">
                                <tr>
                                    <th class="ps-3">Date</th>
                                    <th>Shift</th>
                                    <th>Notes</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="shift : ${shiftsByEmployee.get(emp.id)}">
                                    <td class="ps-3"
                                        th:text="${shift.date != null ? #temporals.format(shift.date,'dd/MM/yyyy') : '-'}">-</td>
                                    <td>
                                        <span class="badge rounded-pill"
                                              th:classappend="${shift.shiftType == 'MORNING' ? 'bg-warning text-dark' :
                                                               shift.shiftType == 'AFTERNOON' ? 'bg-info text-dark' : 'bg-dark'}"
                                              th:text="${shift.shiftType}">-</span>
                                    </td>
                                    <td class="small text-muted" th:text="${shift.notes ?: '-'}">-</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
                <div th:if="${!shiftsByEmployee.containsKey(emp.id)}"
                     class="card-body py-2 border-bottom">
                    <small class="text-muted"><i class="bi bi-dash me-1"></i>No shifts scheduled.</small>
                </div>
                <!-- Approved vacations -->
                <div th:if="${vacationsByEmployee.containsKey(emp.id)}" class="card-body pt-2 pb-1">
                    <div class="small fw-semibold mb-1" style="color: var(--vix-crimson);">
                        <i class="bi bi-umbrella me-1"></i>Approved Vacations
                    </div>
                    <div th:each="vac : ${vacationsByEmployee.get(emp.id)}"
                         class="d-flex align-items-center gap-2 mb-1 small">
                        <span class="badge bg-success rounded-pill">APPROVED</span>
                        <span th:text="${#temporals.format(vac.startDate,'dd/MM/yyyy') + ' → ' + #temporals.format(vac.endDate,'dd/MM/yyyy')}">-</span>
                        <span class="text-muted" th:if="${vac.reason != null and !vac.reason.isEmpty()}"
                              th:text="'(' + ${vac.reason} + ')'">-</span>
                        <span class="text-muted" th:text="${vac.daysRequested + ' day(s)'}">-</span>
                    </div>
                </div>
                <!-- Appointments (Medical Specialists only) -->
                <div th:if="${appointmentsBySpecialist != null and appointmentsBySpecialist.containsKey(emp.id)}"
                     class="card-body pt-2 pb-1 border-top">
                    <div class="small fw-semibold mb-1" style="color: var(--vix-crimson);">
                        <i class="bi bi-calendar-check me-1"></i>Scheduled Appointments
                    </div>
                    <div class="table-responsive">
                        <table class="table table-sm mb-0">
                            <thead style="background: var(--vix-cream);">
                                <tr>
                                    <th class="ps-2">Patient</th>
                                    <th>Date &amp; Time</th>
                                    <th>Duration</th>
                                    <th>Status</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="appt : ${appointmentsBySpecialist.get(emp.id)}">
                                    <td class="ps-2 small"
                                        th:text="${appt.patient != null ? appt.patient.name + ' ' + appt.patient.surname : 'Unknown'}">-</td>
                                    <td class="small"
                                        th:text="${appt.dateTime != null ? #temporals.format(appt.dateTime,'dd/MM/yyyy HH:mm') : '-'}">-</td>
                                    <td class="small" th:text="${appt.duration + ' min'}">-</td>
                                    <td>
                                        <span class="badge rounded-pill"
                                              th:classappend="${appt.status == 'CONFIRMED' ? 'bg-success' :
                                                               appt.status == 'PENDING'    ? 'bg-warning text-dark' :
                                                               appt.status == 'RESCHEDULED'? 'bg-info text-dark' :
                                                               appt.status == 'COMPLETED'  ? 'bg-secondary' : 'bg-info'}"
                                              th:text="${appt.status ?: '-'}">-</span>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
