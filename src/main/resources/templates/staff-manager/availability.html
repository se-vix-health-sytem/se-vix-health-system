<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Employee Availability')}"></head>
<body>
<div th:replace="~{fragments/dashboard-nav :: dashboardNav}"></div>

<div class="dashboard-content" style="margin-left: 280px;">
    <div class="container p-4">
        <div class="card">
            <div class="card-header">
                <h3 class="mb-0 font-display"><i class="bi bi-clock-history me-2"></i>Employee Availability</h3>
            </div>
            <div class="card-body">
                <div class="alert alert-info">
                    <i class="bi bi-info-circle me-2"></i>
                    Availability is derived from assigned shifts in the shift schedule.
                    Use the <a th:href="@{/staff-manager/shifts}">Shifts</a> page to assign or modify shifts.
                </div>
                <div class="text-center py-5 text-muted">
                    <i class="bi bi-calendar-week fs-1"></i>
                    <p class="mt-3">Availability overview coming soon.</p>
                    <a th:href="@{/staff-manager/shifts}" class="btn btn-outline-primary rounded-pill me-2">
                        <i class="bi bi-calendar-week me-1"></i>Go to Shifts
                    </a>
                    <a th:href="@{/staff-manager/dashboard}" class="btn btn-outline-secondary rounded-pill">
                        <i class="bi bi-arrow-left me-1"></i>Dashboard
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
