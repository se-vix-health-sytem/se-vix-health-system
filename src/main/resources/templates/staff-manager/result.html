<!DOCTYPE html>
<!--
==============================================================================
  FILE:    staff-manager/result.html
  ACCESS:  ROLE_STAFFMANAGER (session.user required)
  PURPOSE: Generic action-result page for staff manager operations such as
           creating employees, resetting passwords, or deleting accounts.

  Model attributes:
    - pageTitle (String) — card heading
    - message (String) — success or error description (❌ prefix = error)

  Dependencies:
    - fragments/head, fragments/dashboard-nav, fragments/footer
==============================================================================
-->
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Result')}"></head>
<body>
<div th:replace="~{fragments/dashboard-nav :: dashboardNav}"></div>

<div class="dashboard-content" style="margin-left: 280px;">
    <div class="container p-4" style="max-width: 700px;">
        <div class="card">
            <div class="card-header">
                <h3 class="mb-0 font-display" th:text="${pageTitle ?: 'Action Result'}">Result</h3>
            </div>
            <div class="card-body text-center py-5">
                <div th:if="${message != null}">
                    <i class="bi fs-1 mb-3"
                       th:classappend="${message.startsWith('❌') ? 'bi-x-circle-fill text-danger' : 'bi-check-circle-fill'}"
                       style="color: var(--vix-crimson);"></i>
                    <div class="alert mt-3"
                         th:classappend="${message.startsWith('❌') ? 'alert-danger' : 'alert-success'}"
                         style="white-space: pre-line;" th:text="${message}"></div>
                </div>
                <div class="d-flex gap-3 justify-content-center mt-3">
                    <a th:href="@{/staff-manager/dashboard}" class="btn btn-primary rounded-pill">
                        <i class="bi bi-speedometer2 me-1"></i>Dashboard
                    </a>
                    <a th:href="@{/staff-manager/employees}" class="btn btn-outline-secondary rounded-pill">
                        <i class="bi bi-people me-1"></i>Employees
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
