<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${pageTitle}">Result</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        .message {
            padding: 10px;
            background: #d4edda;
            border: 1px solid #c3e6cb;
            border-radius: 4px;
        }
        .btn {
            display: inline-block;
            padding: 10px 20px;
            background: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 4px;
        }
    </style>
</head>
<body>
<div class="container">
    <h1 th:text="${pageTitle}">Result</h1>

    <div class="message" th:text="${message}">
        Action completed
    </div>

    <p><i>This proves frontend-backend communication works!</i></p>

    <a href="/staff-manager/dashboard" class="btn">← Back to Dashboard</a>
</div>
</body>
</html>
