<!DOCTYPE html>
<!--
==============================================================================
  FILE:    staff-manager/vacations.html
  ACCESS:  ROLE_STAFFMANAGER (session.user required)
  PURPOSE: Vacation request management: register new requests, approve or
           deny pending ones, and view the full request history.

  Model attributes:
    - employees (List<Employee>) — all employees for the registration form
    - pendingRequests (List) — requests awaiting approval
    - allRequests (List) — complete request history

  Dependencies:
    - fragments/head, fragments/dashboard-nav, fragments/footer
==============================================================================
-->
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Vacation Management')}"></head>
<body>
<div th:replace="~{fragments/dashboard-nav :: dashboardNav}"></div>

<div class="dashboard-content" style="margin-left: 280px;">
    <div class="container p-4">

        <h2 class="font-display mb-4" style="color:var(--vix-crimson);">
            <i class="bi bi-umbrella me-2"></i>Vacation Requests
        </h2>

        <!-- Add Vacation Request -->
        <div class="card mb-4">
            <div class="card-header">
                <h5 class="mb-0 font-display">
                    <i class="bi bi-plus-circle me-2"></i>Register New Vacation Request
                </h5>
            </div>
            <div class="card-body">
                <form th:action="@{/staff-manager/vacations/add}" method="post" class="row g-3">
                    <div class="col-md-4">
                        <label class="form-label">Employee</label>
                        <select name="employeeId" class="form-select" required>
                            <option value="">Select employee…</option>
                            <option th:each="emp : ${employees}"
                                    th:value="${emp.id}"
                                    th:text="${emp.name + ' ' + emp.surname + ' (' + emp.class.simpleName + ')'}">
                                Employee
                            </option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label">Start Date</label>
                        <input type="date" name="startDate" class="form-control" required>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label">End Date</label>
                        <input type="date" name="endDate" class="form-control" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Reason <span class="text-muted small">(optional)</span></label>
                        <input type="text" name="reason" class="form-control" placeholder="e.g. Annual leave">
                    </div>
                    <div class="col-12">
                        <button type="submit" class="btn btn-primary rounded-pill px-4">
                            <i class="bi bi-plus-circle me-2"></i>Add Request
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Pending Requests -->
        <div class="card mb-4">
            <div class="card-header d-flex justify-content-between align-items-center">
                <h5 class="mb-0 font-display">
                    <i class="bi bi-hourglass-split me-2"></i>Pending Requests
                    <span class="badge bg-danger ms-2"
                          th:text="${pendingRequests != null ? pendingRequests.size() : 0}">0</span>
                </h5>
            </div>
            <div class="card-body p-0">
                <div th:if="${pendingRequests != null and !pendingRequests.isEmpty()}">
                    <div th:each="req : ${pendingRequests}"
                         class="d-flex justify-content-between align-items-center border-bottom px-4 py-3">
                        <div>
                            <strong th:text="${req.employeeName}">Name</strong>
                            <div class="text-muted small">
                                <i class="bi bi-calendar-range me-1"></i>
                                <span th:text="${req.startDate != null ? #temporals.format(req.startDate,'dd/MM/yyyy') : '-'}">-</span>
                                →
                                <span th:text="${req.endDate != null ? #temporals.format(req.endDate,'dd/MM/yyyy') : '-'}">-</span>
                            </div>
                            <div class="text-muted small" th:if="${req.reason}">
                                <i class="bi bi-chat-left me-1"></i>
                                <span th:text="${req.reason}">-</span>
                            </div>
                        </div>
                        <div class="d-flex gap-2">
                            <form th:action="@{/staff-manager/vacations/approve}" method="post">
                                <input type="hidden" name="requestId" th:value="${req.id}">
                                <button type="submit" class="btn btn-success btn-sm rounded-pill">
                                    <i class="bi bi-check me-1"></i>Approve
                                </button>
                            </form>
                            <form th:action="@{/staff-manager/vacations/deny}" method="post">
                                <input type="hidden" name="requestId" th:value="${req.id}">
                                <button type="submit" class="btn btn-danger btn-sm rounded-pill">
                                    <i class="bi bi-x me-1"></i>Deny
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
                <div th:if="${pendingRequests == null or pendingRequests.isEmpty()}"
                     class="text-center py-4 text-muted">
                    <i class="bi bi-check-circle fs-2"></i>
                    <p class="mt-2 small">No pending vacation requests.</p>
                </div>
            </div>
        </div>

        <!-- All Requests -->
        <div class="card">
            <div class="card-header">
                <h5 class="mb-0 font-display">
                    <i class="bi bi-list-check me-2"></i>All Requests
                    <span class="badge bg-secondary ms-2"
                          th:text="${allRequests != null ? allRequests.size() : 0}">0</span>
                </h5>
            </div>
            <div class="card-body p-0">
                <div th:if="${allRequests != null and !allRequests.isEmpty()}">
                    <div class="table-responsive">
                        <table class="table table-hover mb-0">
                            <thead style="background: var(--vix-cream);">
                                <tr>
                                    <th>Employee</th>
                                    <th>From</th>
                                    <th>To</th>
                                    <th>Reason</th>
                                    <th>Status</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="req : ${allRequests}">
                                    <td th:text="${req.employeeName}">-</td>
                                    <td class="small"
                                        th:text="${req.startDate != null ? #temporals.format(req.startDate,'dd/MM/yyyy') : '-'}">-</td>
                                    <td class="small"
                                        th:text="${req.endDate != null ? #temporals.format(req.endDate,'dd/MM/yyyy') : '-'}">-</td>
                                    <td class="small text-muted" th:text="${req.reason ?: '-'}">-</td>
                                    <td>
                                        <span class="badge rounded-pill"
                                              th:classappend="${req.status == 'APPROVED' ? 'bg-success' :
                                                               req.status == 'DENIED' ? 'bg-danger' : 'bg-warning text-dark'}"
                                              th:text="${req.status}">-</span>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
                <div th:if="${allRequests == null or allRequests.isEmpty()}"
                     class="text-center py-4 text-muted">
                    <p class="small">No vacation requests on record.</p>
                </div>
            </div>
        </div>

    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
