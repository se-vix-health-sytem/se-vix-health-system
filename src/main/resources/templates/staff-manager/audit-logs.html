<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Audit Logs')}"></head>
<body>
<div th:replace="~{fragments/dashboard-nav :: dashboardNav}"></div>

<div class="dashboard-content" style="margin-left: 280px;">
    <div class="container p-4">

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="font-display mb-0" style="color:var(--vix-crimson);">
                <i class="bi bi-file-text me-2"></i>Audit Logs
            </h2>
            <span class="badge rounded-pill px-3 py-2" style="background:var(--vix-crimson);"
                  th:text="${logs != null ? logs.size() + ' entries' : '0 entries'}">0</span>
        </div>

        <!-- Entity Type Filter -->
        <div class="card mb-3">
            <div class="card-body py-2">
                <form th:action="@{/staff-manager/audit-logs}" method="get" class="d-flex gap-2 align-items-center">
                    <label class="form-label mb-0 small fw-semibold">Filter by entity:</label>
                    <input type="text" name="entityType" class="form-control form-control-sm"
                           style="max-width: 200px;"
                           placeholder="e.g. Employee, Patient…"
                           th:value="${#httpServletRequest?.getParameter('entityType')}">
                    <button type="submit" class="btn btn-primary btn-sm rounded-pill">Filter</button>
                    <a th:href="@{/staff-manager/audit-logs}" class="btn btn-outline-secondary btn-sm rounded-pill">Clear</a>
                </form>
            </div>
        </div>

        <div class="card">
            <div class="card-body p-0">
                <div th:if="${logs != null and !logs.isEmpty()}">
                    <div class="table-responsive">
                        <table class="table table-hover mb-0 small">
                            <thead style="background: var(--vix-cream);">
                                <tr>
                                    <th>Timestamp</th>
                                    <th>Action</th>
                                    <th>Entity Type</th>
                                    <th>Entity ID</th>
                                    <th>User</th>
                                    <th>Details</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="log : ${logs}">
                                    <td class="text-nowrap"
                                        th:text="${log.timestamp != null ? #temporals.format(log.timestamp,'dd/MM/yyyy HH:mm') : '-'}">-</td>
                                    <td>
                                        <span class="badge bg-secondary" th:text="${log.action}">-</span>
                                    </td>
                                    <td th:text="${log.entityType ?: '-'}">-</td>
                                    <td th:text="${log.entityId ?: '-'}">-</td>
                                    <td th:text="${log.username ?: '-'}">-</td>
                                    <td class="text-muted" th:text="${log.details ?: '-'}">-</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
                <div th:if="${logs == null or logs.isEmpty()}"
                     class="text-center py-5 text-muted">
                    <i class="bi bi-file-earmark-x fs-1"></i>
                    <p class="mt-3">No audit log entries found.</p>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
