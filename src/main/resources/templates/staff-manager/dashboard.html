<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Staff Manager Dashboard')}"></head>
<body>
<div th:replace="~{fragments/dashboard-nav :: dashboardNav}"></div>

<div class="dashboard-content" style="margin-left: 280px;">
    <div class="container p-4">

        <div class="card mb-4 border-0 shadow-sm">
            <div class="card-body p-4">
                <div class="d-flex justify-content-between align-items-center flex-wrap gap-3">
                    <div>
                        <p class="section-eyebrow mb-1">Staff Manager Portal</p>
                        <h2 class="font-display mb-1" style="color: var(--vix-crimson);"
                            th:text="${session.user.name + ' ' + session.user.surname}">Name</h2>
                        <p class="text-muted mb-0 small"
                           th:text="${session.user.department?.name ?: 'No department assigned'}">Department</p>
                    </div>
                    <a th:href="@{/staff-manager/employees/create}" class="btn btn-primary rounded-pill px-4">
                        <i class="bi bi-person-plus me-2"></i>Create Employee
                    </a>
                </div>
            </div>
        </div>

        <!-- Stats -->
        <div class="row g-4 mb-4">
            <div class="col-6 col-md-3">
                <div class="stat-mini">
                    <div class="stat-mini-number" th:text="${totalEmployees}">0</div>
                    <div class="stat-mini-label">Total Employees</div>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="stat-mini">
                    <div class="stat-mini-number" th:text="${activeEmployees}">0</div>
                    <div class="stat-mini-label">Active</div>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="stat-mini">
                    <div class="stat-mini-number" th:text="${pendingVacations}">0</div>
                    <div class="stat-mini-label">Pending Vacation Requests</div>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="stat-mini">
                    <div class="stat-mini-number"
                         th:text="${recentActivities != null ? recentActivities.size() : 0}">0</div>
                    <div class="stat-mini-label">Recent Actions</div>
                </div>
            </div>
        </div>

        <div class="row g-4">
            <!-- Quick Actions -->
            <div class="col-md-5">
                <div class="card h-100">
                    <div class="card-header"><i class="bi bi-lightning me-2"></i>Quick Actions</div>
                    <div class="card-body d-flex flex-column gap-2">
                        <a th:href="@{/staff-manager/employees}"
                           class="btn btn-outline-primary rounded-pill text-start">
                            <i class="bi bi-people me-2"></i>View All Employees
                        </a>
                        <a th:href="@{/staff-manager/employees/create}"
                           class="btn btn-primary rounded-pill text-start">
                            <i class="bi bi-person-plus me-2"></i>Create New Employee
                        </a>
                        <a th:href="@{/staff-manager/shifts}"
                           class="btn btn-outline-primary rounded-pill text-start">
                            <i class="bi bi-calendar-week me-2"></i>Manage Shifts
                        </a>
                        <a th:href="@{/staff-manager/vacations}"
                           class="btn btn-outline-primary rounded-pill text-start">
                            <i class="bi bi-umbrella me-2"></i>Review Vacation Requests
                            <span th:if="${pendingVacations > 0}"
                                  class="badge bg-danger ms-2" th:text="${pendingVacations}">0</span>
                        </a>
                        <a th:href="@{/staff-manager/audit-logs}"
                           class="btn btn-outline-secondary rounded-pill text-start">
                            <i class="bi bi-file-text me-2"></i>Audit Logs
                        </a>
                    </div>
                </div>
            </div>

            <!-- Recent Activity -->
            <div class="col-md-7">
                <div class="card h-100">
                    <div class="card-header"><i class="bi bi-clock-history me-2"></i>Recent Activity</div>
                    <div class="card-body p-0">
                        <div th:if="${recentActivities != null and !recentActivities.isEmpty()}">
                            <div th:each="log : ${recentActivities}"
                                 class="d-flex justify-content-between align-items-start border-bottom px-3 py-2 small">
                                <div>
                                    <span class="badge bg-secondary me-2" th:text="${log.entityType}">-</span>
                                    <strong th:text="${log.action}">-</strong>
                                    <div class="text-muted" th:text="${log.username}">-</div>
                                </div>
                                <small class="text-muted text-nowrap ms-2"
                                       th:text="${log.timestamp != null ? #temporals.format(log.timestamp,'dd/MM HH:mm') : '-'}">-</small>
                            </div>
                        </div>
                        <div th:if="${recentActivities == null or recentActivities.isEmpty()}"
                             class="text-center py-4 text-muted">
                            <i class="bi bi-clock fs-2"></i>
                            <p class="mt-2 small">No recent activity.</p>
                        </div>
                        <div class="p-3 border-top">
                            <a th:href="@{/staff-manager/audit-logs}" class="small text-decoration-none"
                               style="color:var(--vix-crimson);">
                                View all audit logs <i class="bi bi-arrow-right ms-1"></i>
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
