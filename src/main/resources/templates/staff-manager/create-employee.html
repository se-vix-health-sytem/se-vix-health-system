<!DOCTYPE html>
<!--
==============================================================================
  FILE:    staff-manager/create-employee.html
  ACCESS:  ROLE_STAFFMANAGER (session.user required)
  PURPOSE: Form for creating a new employee account. Specialty and license
           number fields are shown/hidden by JS based on the selected type.

  Model attributes:
    - employeeTypes (List<String>): available role types for the dropdown
    - departments (List<Department>): departments for the optional selector

  Dependencies:
    - fragments/head, fragments/dashboard-nav, fragments/footer
    - inline JS to toggle specialty/license fields for MedicalSpecialist
==============================================================================
-->
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Create Employee')}"></head>
<body>
<div th:replace="~{fragments/dashboard-nav :: dashboardNav}"></div>

<div class="dashboard-content" style="margin-left: 280px;">
    <div class="container p-4" style="max-width: 800px;">
        <div class="card">
            <div class="card-header">
                <h3 class="mb-0 font-display"><i class="bi bi-person-plus me-2"></i>Create Employee Account</h3>
            </div>
            <div class="card-body">
                <form th:action="@{/staff-manager/employees/create}" method="post" class="row g-3">

                    <div class="col-md-6">
                        <label class="form-label">First Name</label>
                        <input type="text" name="name" class="form-control" placeholder="First name" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Surname</label>
                        <input type="text" name="surname" class="form-control" placeholder="Last name" required>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Email</label>
                        <input type="email" name="email" class="form-control"
                               placeholder="employee@vixhealth.com" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Gender</label>
                        <select name="gender" class="form-select" required>
                            <option value="">Select gender…</option>
                            <option value="M">Male</option>
                            <option value="F">Female</option>
                        </select>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Phone</label>
                        <input type="tel" name="phone" class="form-control" placeholder="+39 344 1234567">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Hire Date</label>
                        <input type="date" name="hireDate" class="form-control"
                               th:value="${#temporals.format(#temporals.createNow(), 'yyyy-MM-dd')}">
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Date of Birth</label>
                        <input type="date" name="birthDate" class="form-control">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Place of Birth</label>
                        <input type="text" name="birthPlace" class="form-control" placeholder="e.g. Milano">
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Employee Type</label>
                        <select name="employeeType" class="form-select" id="employeeTypeSelect" required>
                            <option value="">Select type…</option>
                            <option th:each="type : ${employeeTypes}" th:value="${type}"
                                    th:text="${type.replace('_', ' ')}">Type</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Department <span class="text-muted small">(optional)</span></label>
                        <select name="departmentId" class="form-select">
                            <option value="">-- No department --</option>
                            <option th:each="dept : ${departments}"
                                    th:value="${dept.id}"
                                    th:text="${dept.name + ' (ID ' + dept.id + ')'}">Department</option>
                        </select>
                    </div>

                    <!-- Medical Specialist fields -->
                    <div class="col-md-6" id="specialtyField" style="display:none;">
                        <label class="form-label">Specialty</label>
                        <input type="text" name="specialty" class="form-control"
                               placeholder="e.g. Cardiology, Neurology">
                    </div>
                    <div class="col-md-6" id="licenseField" style="display:none;">
                        <label class="form-label">License Number</label>
                        <input type="text" name="licenseNumber" class="form-control"
                               placeholder="e.g. LIC-CARD-004">
                    </div>

                    <div class="col-12 d-flex gap-3 mt-2">
                        <button type="submit" class="btn btn-primary rounded-pill px-5">
                            <i class="bi bi-check-circle me-2"></i>Create Employee
                        </button>
                        <a th:href="@{/staff-manager/employees}" class="btn btn-outline-secondary rounded-pill">
                            Cancel
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
<script>
    document.getElementById('employeeTypeSelect').addEventListener('change', function() {
        var isSpecialist = this.value === 'MEDICAL_SPECIALIST';
        document.getElementById('specialtyField').style.display = isSpecialist ? 'block' : 'none';
        document.getElementById('licenseField').style.display  = isSpecialist ? 'block' : 'none';
    });
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
