<!-- src/main/resources/templates/staff-manager/create-employee.html -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${pageTitle}">Create Employee</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <!-- Sidebar -->
        <div class="col-md-2 bg-light p-0" style="min-height: 100vh;">
            <div class="p-3 bg-white border-bottom">
                <h5><i class="bi bi-people-fill"></i> Staff Manager</h5>
                <small class="text-muted">Administration Portal</small>
            </div>
            <nav class="nav flex-column p-2">
                <a class="nav-link" href="/staff-manager/dashboard"><i class="bi bi-speedometer2"></i> Dashboard</a>
                <a class="nav-link active" href="/staff-manager/employees"><i class="bi bi-person-badge"></i> Employees</a>
                <a class="nav-link" href="/staff-manager/shifts"><i class="bi bi-calendar-week"></i> Shifts</a>
                <a class="nav-link" href="/staff-manager/vacations"><i class="bi bi-umbrella"></i> Vacations</a>
                <a class="nav-link" href="/staff-manager/availability"><i class="bi bi-clock-history"></i> Availability</a>
                <a class="nav-link" href="/staff-manager/transfers"><i class="bi bi-arrow-left-right"></i> Transfers</a>
                <a class="nav-link" href="/staff-manager/resources"><i class="bi bi-box-seam"></i> Resources</a>
                <a class="nav-link" href="/staff-manager/audit-logs"><i class="bi bi-file-text"></i> Audit Logs</a>
                <hr>
                <a class="nav-link" href="/logout"><i class="bi bi-box-arrow-right"></i> Logout</a>
            </nav>
        </div>

        <!-- Main Content -->
        <div class="col-md-10 p-4">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h2><i class="bi bi-person-plus"></i> <span th:text="${pageTitle}">Create Employee</span></h2>
                <a href="/staff-manager/employees" class="btn btn-secondary">
                    <i class="bi bi-arrow-left"></i> Back to Employees
                </a>
            </div>

            <div class="card">
                <div class="card-body">
                    <form action="/staff-manager/employees/create" method="post">
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">First Name *</label>
                                <input type="text" name="name" class="form-control" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Surname *</label>
                                <input type="text" name="surname" class="form-control" required>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Email *</label>
                            <input type="email" name="email" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Username *</label>
                            <input type="text" name="username" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Password *</label>
                            <input type="password" name="password" class="form-control" required>
                            <small class="text-muted">Temporary password. Employee should change on first login.</small>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Role *</label>
                                <select name="role" class="form-select" required onchange="updateDepartmentField()">
                                    <option value="">Select Role...</option>
                                    <option value="MEDICAL_SPECIALIST">Medical Specialist</option>
                                    <option value="TECHNICIAN">Technician</option>
                                    <option value="SECRETARY">Secretary</option>
                                    <option value="STAFF_MANAGER">Staff Manager</option>
                                    <option value="BUYER">Buyer</option>
                                </select>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label" id="departmentLabel">Department/Specialty (Medical Specialists only)</label>
                                <select name="department" id="departmentSelect" class="form-select" disabled>
                                    <option value="">Select Department...</option>
                                    <option value="Cardiology">Cardiology</option>
                                    <option value="Neurology">Neurology</option>
                                    <option value="Orthopaedics">Orthopaedics</option>
                                    <option value="Oncology">Oncology</option>
                                    <option value="Radiology">Radiology</option>
                                    <option value="Gynaecology">Gynaecology</option>
                                    <option value="Paediatrics">Paediatrics</option>
                                    <option value="Laboratory Medicine">Laboratory Medicine</option>
                                    <option value="Dermatology">Dermatology</option>
                                    <option value="Psychiatry">Psychiatry</option>
                                    <option value="Ophthalmology">Ophthalmology</option>
                                    <option value="Gastroenterology">Gastroenterology</option>
                                </select>
                            </div>
                        </div>

                        <div class="alert alert-info mt-3">
                            <i class="bi bi-info-circle"></i> The employee will receive their credentials via email.
                        </div>

                        <button type="submit" class="btn btn-primary">Create Employee</button>
                        <a href="/staff-manager/employees" class="btn btn-secondary">Cancel</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    function updateDepartmentField() {
        const role = document.querySelector('select[name="role"]').value;
        const departmentSelect = document.getElementById('departmentSelect');
        const departmentLabel = document.getElementById('departmentLabel');

        if (role === 'MEDICAL_SPECIALIST') {
            departmentSelect.disabled = false;
            departmentSelect.required = true;
            departmentLabel.innerHTML = 'Specialty *';
        } else if (role === 'TECHNICIAN') {
            departmentSelect.disabled = false;
            departmentSelect.required = true;

        } else {
            departmentSelect.disabled = true;
            departmentSelect.required = false;
            departmentLabel.innerHTML = 'Department (Optional)';
        }
    }
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
