<!-- src/main/resources/templates/staff-manager/transfers.html -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${pageTitle}">Patient Transfers</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <!-- Sidebar -->
        <div class="col-md-2 bg-light p-0" style="min-height: 100vh;">
            <div class="p-3 bg-white border-bottom">
                <h5><i class="bi bi-people-fill"></i> Staff Manager</h5>
                <small class="text-muted">Administration Portal</small>
            </div>
            <nav class="nav flex-column p-2">
                <a class="nav-link" href="/staff-manager/dashboard"><i class="bi bi-speedometer2"></i> Dashboard</a>
                <a class="nav-link" href="/staff-manager/employees"><i class="bi bi-person-badge"></i> Employees</a>
                <a class="nav-link" href="/staff-manager/shifts"><i class="bi bi-calendar-week"></i> Shifts</a>
                <a class="nav-link" href="/staff-manager/vacations"><i class="bi bi-umbrella"></i> Vacations</a>
                <a class="nav-link" href="/staff-manager/availability"><i class="bi bi-clock-history"></i> Availability</a>
                <a class="nav-link active" href="/staff-manager/transfers"><i class="bi bi-arrow-left-right"></i> Transfers</a>
                <a class="nav-link" href="/staff-manager/resources"><i class="bi bi-box-seam"></i> Resources</a>
                <a class="nav-link" href="/staff-manager/audit-logs"><i class="bi bi-file-text"></i> Audit Logs</a>
                <hr>
                <a class="nav-link" href="/logout"><i class="bi bi-box-arrow-right"></i> Logout</a>
            </nav>
        </div>

        <!-- Main Content -->
        <div class="col-md-10 p-4">
            <h2><i class="bi bi-arrow-left-right"></i> <span th:text="${pageTitle}">Patient Transfers</span></h2>
            <hr>

            <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
            <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

            <div class="row">
                <!-- Transfer Form -->
                <div class="col-md-5">
                    <div class="card">
                        <div class="card-header bg-primary text-white">
                            <h5><i class="bi bi-send"></i> Transfer Patient</h5>
                        </div>
                        <div class="card-body">
                            <form action="/staff-manager/transfers/transfer" method="post">
                                <div class="mb-3">
                                    <label class="form-label">Patient</label>
                                    <select name="patientId" class="form-select" required>
                                        <option value="">Select Patient...</option>
                                        <option th:each="patient : ${patients}" th:value="${patient.id}"
                                                th:text="${patient.name} + ' ' + ${patient.surname} + ' (ID: ' + ${patient.id} + ')'">
                                        </option>
                                    </select>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label">Target Hospital/Room</label>
                                    <select name="targetRoomId" class="form-select" required>
                                        <option value="">Select Destination...</option>
                                        <option th:each="room : ${rooms}" th:value="${room.id}"
                                                th:text="${room.roomNumber} + ' - ' + ${room.type} + ' (' + ${room.availableBeds} + ' beds available)'">
                                        </option>
                                    </select>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label">Transfer Reason</label>
                                    <textarea name="reason" class="form-control" rows="3" required
                                              placeholder="e.g., Specialized care required, Bed availability, Patient request..."></textarea>
                                </div>

                                <button type="submit" class="btn btn-primary w-100">
                                    <i class="bi bi-send"></i> Transfer Patient
                                </button>
                            </form>
                        </div>
                    </div>
                </div>

                <!-- Transfer History -->
                <div class="col-md-7">
                    <div class="card">
                        <div class="card-header bg-info text-white">
                            <h5><i class="bi bi-clock-history"></i> Transfer History</h5>
                        </div>
                        <div class="card-body">
                            <table class="table table-striped">
                                <thead>
                                <tr><th>Date</th><th>Patient</th><th>From</th><th>To</th><th>Reason</th><th>By</th></tr>
                                </thead>
                                <tbody>
                                <tr th:each="transfer : ${transfers}">
                                    <td th:text="${#temporals.format(transfer.transferDate, 'dd/MM/yyyy HH:mm')}">-</td>
                                    <td th:text="${transfer.patientName}">-</td>
                                    <td th:text="${transfer.fromHospital}">-</td>
                                    <td th:text="${transfer.toHospital}">-</td>
                                    <td th:text="${transfer.reason}">-</td>
                                    <td th:text="${transfer.transferredBy}">-</td>
                                </tr>
                                <tr th:if="${transfers.empty}">
                                    <td colspan="6" class="text-center">No transfer history</td>
                                </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
