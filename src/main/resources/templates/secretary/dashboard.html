<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${pageTitle}">Secretary Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <div class="user-section">
    <span class="user-badge">
        <i class="bi bi-person-circle me-2"></i>
        Staff Manager
    </span>
        <a href="/logout" class="btn-logout">
            <i class="bi bi-box-arrow-right me-1"></i> Logout
        </a>
    </div>
</head>
<body>
<div class="container mt-4">
    <div class="card">
        <div class="card-header bg-info text-white">
            <h2 th:text="${pageTitle}">Secretary Dashboard</h2>
        </div>
        <div class="card-body">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <div class="card">
                        <div class="card-body">
                            <h5>Room Management</h5>
                            <a href="/secretary/rooms" class="btn btn-primary">View All Rooms</a>
                            <a href="/secretary/rooms/available" class="btn btn-success">View Available Rooms</a>
                        </div>
                    </div>
                </div>
                <div class="col-md-6 mb-3">
                    <div class="card">
                        <div class="card-body">
                            <h5>Patient Admissions</h5>
                            <form action="/secretary/patients/admit" method="post" class="mb-2">
                                <input type="number" name="patientId" placeholder="Patient ID" class="form-control mb-2" required>
                                <input type="number" name="roomId" placeholder="Room ID" class="form-control mb-2" required>
                                <button type="submit" class="btn btn-primary">Admit Patient</button>
                            </form>
                            <form action="/secretary/patients/dismiss" method="post">
                                <input type="number" name="patientId" placeholder="Patient ID" class="form-control mb-2" required>
                                <input type="number" name="roomId" placeholder="Room ID" class="form-control mb-2" required>
                                <button type="submit" class="btn btn-warning">Dismiss Patient</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
            <a href="/" class="btn btn-secondary">Back to Home</a>
        </div>
    </div>
</div>
</body>
</html>
