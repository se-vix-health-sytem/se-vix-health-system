<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Secretary Dashboard')}"></head>
<body>
<div th:replace="~{fragments/dashboard-nav :: dashboardNav}"></div>

<div class="dashboard-content" style="margin-left: 280px;">
    <div class="container p-4">

        <div class="card mb-4 border-0 shadow-sm">
            <div class="card-body p-4">
                <div class="d-flex justify-content-between align-items-center flex-wrap gap-3">
                    <div>
                        <p class="section-eyebrow mb-1">Secretary Portal</p>
                        <h2 class="font-display mb-1" style="color: var(--vix-crimson);">
                            <span th:text="${session.user.name + ' ' + session.user.surname}">Name</span>
                        </h2>
                        <p class="text-muted mb-0 small">
                            <span th:text="${departmentName}">Department</span>
                        </p>
                    </div>
                    <a th:href="@{/secretary/appointments}" class="btn btn-primary rounded-pill px-4">
                        <i class="bi bi-calendar-plus me-2"></i>Manage Appointments
                    </a>
                </div>
            </div>
        </div>

        <!-- Stats Row -->
        <div class="row g-4 mb-4">
            <div class="col-6 col-md-3">
                <div class="stat-mini">
                    <div class="stat-mini-number" th:text="${totalRooms}">0</div>
                    <div class="stat-mini-label">Total Rooms</div>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="stat-mini">
                    <div class="stat-mini-number" th:text="${availableRooms}">0</div>
                    <div class="stat-mini-label">Available Rooms</div>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="stat-mini">
                    <div class="stat-mini-number" th:text="${totalAvailableBeds}">0</div>
                    <div class="stat-mini-label">Free Beds</div>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="stat-mini">
                    <div class="stat-mini-number" th:text="${totalAppointments}">0</div>
                    <div class="stat-mini-label">Total Appointments</div>
                </div>
            </div>
        </div>

        <!-- Flash messages -->
        <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

        <!-- Quick Actions -->
        <div class="row g-4">
            <div class="col-md-3">
                <a th:href="@{/secretary/rooms}" class="text-decoration-none">
                    <div class="card h-100 text-center p-4">
                        <i class="bi bi-door-open fs-1 mb-3" style="color:var(--vix-crimson);"></i>
                        <h5 class="font-display">Room Management</h5>
                        <p class="text-muted small mb-0">Admit and dismiss inpatients</p>
                    </div>
                </a>
            </div>
            <div class="col-md-3">
                <a th:href="@{/secretary/appointments}" class="text-decoration-none">
                    <div class="card h-100 text-center p-4">
                        <i class="bi bi-calendar-check fs-1 mb-3" style="color:var(--vix-crimson);"></i>
                        <h5 class="font-display">Appointments</h5>
                        <p class="text-muted small mb-0">Book, reschedule, cancel</p>
                    </div>
                </a>
            </div>
            <div class="col-md-3">
                <a th:href="@{/secretary/patients/search}" class="text-decoration-none">
                    <div class="card h-100 text-center p-4">
                        <i class="bi bi-person-lines-fill fs-1 mb-3" style="color:var(--vix-crimson);"></i>
                        <h5 class="font-display">Search Patients</h5>
                        <p class="text-muted small mb-0">Find patient records</p>
                    </div>
                </a>
            </div>
            <div class="col-md-3">
                <a th:href="@{/secretary/rooms/available}" class="text-decoration-none">
                    <div class="card h-100 text-center p-4">
                        <i class="bi bi-hospital fs-1 mb-3" style="color:var(--vix-crimson);"></i>
                        <h5 class="font-display">Available Rooms</h5>
                        <p class="text-muted small mb-0">View rooms with free beds</p>
                    </div>
                </a>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
