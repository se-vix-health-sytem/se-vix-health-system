<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${pageTitle}">Rooms</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <div class="card">
        <div class="card-header">
            <h2 th:text="${pageTitle}">Rooms</h2>
        </div>
        <div class="card-body">
            <table class="table">
                <thead>
                <tr><th>ID</th><th>Room #</th><th>Type</th><th>Beds</th><th>Occupied</th><th>Available</th></tr>
                </thead>
                <tbody>
                <tr th:each="room : ${rooms}">
                    <td th:text="${room.id}">1</td>
                    <td th:text="${room.roomNumber}">101</td>
                    <td th:text="${room.type}">PRIVATE</td>
                    <td th:text="${room.totalBeds}">1</td>
                    <td th:text="${room.occupiedBeds}">0</td>
                    <td>
                        <span th:if="${room.availableBeds > 0}" class="badge bg-success">Available</span>
                        <span th:unless="${room.availableBeds > 0}" class="badge bg-danger">Full</span>
                    </td>
                </tr>
                </tbody>
            </table>
            <a href="/secretary/dashboard" class="btn btn-secondary">Back</a>
        </div>
    </div>
</div>
</body>
</html>
