<!DOCTYPE html>
<!--
==============================================================================
  FILE:    secretary/rooms.html
  ACCESS:  ROLE_SECRETARY (session.user required)
  PURPOSE: Room management view for admitting and dismissing inpatients.
           Can show all rooms or available-only depending on isAvailableView.

  Model attributes:
    - rooms (List<Room>) — rooms to display
    - patients (List<Patient>) — all patients for the admit dropdown
    - message (String) — success flash
    - error (String) — error flash
    - isAvailableView (boolean) — true when showing available rooms only

  Dependencies:
    - fragments/head, fragments/dashboard-nav, fragments/footer
==============================================================================
-->
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Room Management')}"></head>
<body>
<div th:replace="~{fragments/dashboard-nav :: dashboardNav}"></div>

<div class="dashboard-content" style="margin-left: 280px;">
    <div class="container p-4">

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="font-display mb-0" style="color:var(--vix-crimson);">
                <i class="bi bi-door-open me-2"></i>
                <span th:text="${isAvailableView != null and isAvailableView ? 'Available Rooms' : 'All Rooms'}">Rooms</span>
            </h2>
            <div class="d-flex gap-2">
                <a th:href="@{/secretary/rooms}" class="btn btn-outline-secondary rounded-pill btn-sm">All Rooms</a>
                <a th:href="@{/secretary/rooms/available}" class="btn btn-outline-primary rounded-pill btn-sm">Available Only</a>
            </div>
        </div>

        <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

        <!-- Transfer confirmation modal — shown when patient is already in another room -->
        <div th:if="${transferWarning != null}" class="modal d-block" tabindex="-1"
             style="background: rgba(0,0,0,0.5);">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content">
                    <div class="modal-header" style="background: var(--vix-crimson); color: white;">
                        <h5 class="modal-title"><i class="bi bi-exclamation-triangle me-2"></i>Patient Already Assigned</h5>
                    </div>
                    <div class="modal-body">
                        <p th:text="${transferWarning}"></p>
                    </div>
                    <div class="modal-footer">
                        <a th:href="@{/secretary/rooms}" class="btn btn-secondary">
                            <i class="bi bi-x-circle me-1"></i> No, Keep Current Room
                        </a>
                        <form th:action="@{/secretary/patients/admit}" method="post" class="d-inline">
                            <input type="hidden" name="patientId" th:value="${pendingPatientId}">
                            <input type="hidden" name="roomId" th:value="${pendingRoomId}">
                            <input type="hidden" name="confirmTransfer" value="true">
                            <button type="submit" class="btn btn-warning">
                                <i class="bi bi-arrow-left-right me-1"></i> Yes, Transfer Patient
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <div class="row g-3">
            <div th:each="room : ${rooms}" class="col-md-6 col-lg-4">
                <div class="card h-100">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <span class="font-display">Room <span th:text="${room.number}">-</span></span>
                        <span th:if="${room instanceof T(com.nvivx.vixhealthsystem.model.facility.InternationRoom)}"
                              class="badge rounded-pill"
                              th:classappend="${room.nFreeBeds > 0 ? 'bg-success' : 'bg-danger'}"
                              th:text="${room.nFreeBeds + '/' + room.totalNBeds + ' free'}">-</span>
                        <span th:unless="${room instanceof T(com.nvivx.vixhealthsystem.model.facility.InternationRoom)}"
                              class="badge bg-secondary rounded-pill">Non-inpatient</span>
                    </div>
                    <div class="card-body">
                        <!-- Inpatient room: show patients and admit/dismiss forms -->
                        <div th:if="${room instanceof T(com.nvivx.vixhealthsystem.model.facility.InternationRoom)}">
                            <div th:if="${room.patients != null and !room.patients.isEmpty()}">
                                <p class="small text-muted mb-2">Admitted patients:</p>
                                <ul class="list-unstyled mb-3">
                                    <li th:each="p : ${room.patients}" class="d-flex justify-content-between align-items-center mb-1 small">
                                        <span><i class="bi bi-person me-1"></i>
                                            <span th:text="${p.name + ' ' + p.surname}">-</span>
                                        </span>
                                        <form th:action="@{/secretary/patients/dismiss}" method="post" class="d-inline">
                                            <input type="hidden" name="patientId" th:value="${p.id}">
                                            <input type="hidden" name="roomId" th:value="${room.id}">
                                            <button type="submit" class="btn btn-outline-danger btn-sm rounded-pill py-0 px-2"
                                                    onclick="return confirm('Dismiss this patient?')">
                                                Dismiss
                                            </button>
                                        </form>
                                    </li>
                                </ul>
                            </div>
                            <div th:if="${room.nFreeBeds > 0 and patients != null and !patients.isEmpty()}">
                                <p class="small text-muted mb-1">Admit a patient:</p>
                                <form th:action="@{/secretary/patients/admit}" method="post" class="d-flex gap-2">
                                    <input type="hidden" name="roomId" th:value="${room.id}">
                                    <select name="patientId" class="form-select form-select-sm">
                                        <option value="">Select patient…</option>
                                        <option th:each="p : ${patients}" th:value="${p.id}"
                                                th:text="${p.name + ' ' + p.surname + ' (' + p.fiscalCode + ')'}">-</option>
                                    </select>
                                    <button type="submit" class="btn btn-primary btn-sm rounded-pill text-nowrap">Admit</button>
                                </form>
                            </div>
                            <div th:if="${room.nFreeBeds == 0}" class="alert alert-warning py-1 small mt-2 mb-0">
                                <i class="bi bi-lock me-1"></i> Room is full
                            </div>
                        </div>
                        <!-- Other room types -->
                        <div th:unless="${room instanceof T(com.nvivx.vixhealthsystem.model.facility.InternationRoom)}"
                             class="text-muted small">
                            Non-inpatient room — no bed management required.
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div th:if="${rooms == null or rooms.isEmpty()}" class="text-center py-5 text-muted">
            <i class="bi bi-building-x fs-1"></i>
            <p class="mt-3">No rooms found.</p>
        </div>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
