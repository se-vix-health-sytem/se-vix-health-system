<!-- src/main/resources/templates/secretary/manage-appointments.html -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${pageTitle}">Manage Appointments</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <div class="card">
        <div class="card-header bg-info text-white">
            <h2 th:text="${pageTitle}">Manage Appointments</h2>
        </div>
        <div class="card-body">
            <!-- Book Appointment Form -->
            <div class="card mb-4">
                <div class="card-header bg-light">
                    <h5>Book New Appointment for Patient</h5>
                </div>
                <div class="card-body">
                    <form action="/secretary/appointments/book-for-patient" method="post">
                        <div class="row">
                            <div class="col-md-3">
                                <label class="form-label">Patient</label>
                                <select name="patientId" class="form-select" required>
                                    <option value="">Select patient</option>
                                    <option th:each="patient : ${patients}"
                                            th:value="${patient.id}"
                                            th:text="${patient.name} + ' ' + ${patient.surname}"></option>
                                </select>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label">Specialist</label>
                                <select name="specialistId" class="form-select" required>
                                    <option value="">Select specialist</option>
                                    <option th:each="specialist : ${specialists}"
                                            th:value="${specialist.id}"
                                            th:text="${specialist.name} + ' ' + ${specialist.surname} + ' - ' + ${specialist.specialty}"></option>
                                </select>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label">Date & Time</label>
                                <input type="datetime-local" name="dateTime" class="form-control" required>
                            </div>
                            <div class="col-md-3">
                                <button type="submit" class="btn btn-primary mt-4">Book Appointment</button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>

            <!-- Appointments List -->
            <h4>All Appointments</h4>
            <table class="table table-striped">
                <thead>
                <tr><th>ID</th><th>Patient</th><th>Doctor</th><th>Date/Time</th><th>Status</th><th>Actions</th></tr>
                </thead>
                <tbody>
                <tr th:each="apt : ${appointments}">
                    <td th:text="${apt.id}">1</td>
                    <td th:text="${apt.patient?.name} + ' ' + ${apt.patient?.surname}">Patient</td>
                    <td th:text="${apt.doctor?.name} + ' ' + ${apt.doctor?.surname}">Doctor</td>
                    <td th:text="${apt.dateTime}">Date</td>
                    <td><span class="badge bg-success" th:text="${apt.status}">CONFIRMED</span></td>
                    <td>
                        <button class="btn btn-sm btn-warning" onclick="cancelAppointment(${apt.id})">Cancel</button>
                    </td>
                </tr>
                </tbody>
            </table>

            <a href="/secretary/dashboard" class="btn btn-secondary">Back to Dashboard</a>
        </div>
    </div>
</div>
<script>
    function cancelAppointment(id) {
        if(confirm('Cancel this appointment?')) {
            fetch('/secretary/appointments/' + id + '/cancel', {method: 'POST'})
                .then(() => location.reload());
        }
    }
</script>
</body>
</html>
