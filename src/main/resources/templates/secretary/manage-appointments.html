<!DOCTYPE html>
<!--
==============================================================================
  FILE:    secretary/manage-appointments.html
  ACCESS:  ROLE_SECRETARY (session.user required)
  PURPOSE: All-in-one appointment management page: book-for-patient form
           (collapsible), full appointments table, and reschedule modal.

  Model attributes:
    - patients (List<Patient>): all patients for the booking dropdown
    - specialists (List<MedicalSpecialist>): all specialists
    - appointments (List<Appointment>): all appointments to display
    - message (String): success flash
    - error (String): error flash

  Dependencies:
    - fragments/head, fragments/dashboard-nav, fragments/footer
==============================================================================
-->
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Manage Appointments')}"></head>
<body>
<div th:replace="~{fragments/dashboard-nav :: dashboardNav}"></div>

<div class="dashboard-content" style="margin-left: 280px;">
    <div class="container p-4">

        <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

        <!-- Book Appointment for Patient -->
        <div class="card mb-4">
            <div class="card-header d-flex justify-content-between align-items-center">
                <h5 class="mb-0 font-display"><i class="bi bi-plus-circle me-2"></i>Book Appointment for Patient</h5>
                <button class="btn btn-sm btn-light rounded-pill" data-bs-toggle="collapse"
                        data-bs-target="#bookForm">Toggle</button>
            </div>
            <div class="collapse show" id="bookForm">
                <div class="card-body">
                    <form th:action="@{/secretary/appointments/book-for-patient}" method="post"
                          class="row g-3">
                        <div class="col-md-4">
                            <label class="form-label">Patient</label>
                            <select name="patientId" class="form-select" required>
                                <option value="">Select patient…</option>
                                <option th:each="p : ${patients}" th:value="${p.id}"
                                        th:text="${p.name + ' ' + p.surname + ': ' + p.fiscalCode}">-</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Medical Specialist</label>
                            <select name="specialistId" class="form-select" required>
                                <option value="">Select specialist…</option>
                                <option th:each="s : ${specialists}" th:value="${s.id}"
                                        th:text="'Dr. ' + ${s.name} + ' ' + ${s.surname} + ': ' + ${s.specialty}">-</option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Date &amp; Time</label>
                            <input type="datetime-local" name="dateTime" class="form-control" required>
                        </div>
                        <div class="col-md-1 d-flex align-items-end">
                            <button type="submit" class="btn btn-primary rounded-pill w-100">Book</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <!-- Appointments Table -->
        <div class="card">
            <div class="card-header">
                <h5 class="mb-0 font-display">
                    <i class="bi bi-calendar-check me-2"></i>All Appointments
                    <span class="badge bg-secondary ms-2"
                          th:text="${appointments != null ? appointments.size() : 0}">0</span>
                </h5>
            </div>
            <div class="card-body p-0">
                <div th:if="${appointments != null and !appointments.isEmpty()}">
                    <div class="table-responsive">
                        <table class="table table-hover mb-0">
                            <thead style="background: var(--vix-cream);">
                                <tr>
                                    <th>Date &amp; Time</th>
                                    <th>Patient</th>
                                    <th>Specialist</th>
                                    <th>Status</th>
                                    <th>Payment</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="apt : ${appointments}">
                                    <td class="small"
                                        th:text="${apt.dateTime != null ? #temporals.format(apt.dateTime,'dd/MM/yyyy HH:mm') : '-'}">-</td>
                                    <td class="small"
                                        th:text="${apt.patient != null ? apt.patient.name + ' ' + apt.patient.surname : '-'}">-</td>
                                    <td class="small"
                                        th:text="${apt.medicalSpecialist != null ? 'Dr. ' + apt.medicalSpecialist.name + ' ' + apt.medicalSpecialist.surname : '-'}">-</td>
                                    <td>
                                        <span class="badge rounded-pill"
                                              th:classappend="${apt.status == 'CONFIRMED' ? 'bg-success' :
                                                               apt.status == 'CANCELLED' ? 'bg-danger' :
                                                               apt.status == 'COMPLETED' ? 'bg-info' : 'bg-warning text-dark'}"
                                              th:text="${apt.status ?: 'PENDING'}">-</span>
                                    </td>
                                    <td>
                                        <i class="bi"
                                           th:classappend="${apt.paid ? 'bi-check-circle-fill text-success' : 'bi-x-circle text-danger'}"></i>
                                    </td>
                                    <td>
                                        <!-- Reschedule -->
                                        <button class="btn btn-sm btn-outline-secondary rounded-pill me-1"
                                                data-bs-toggle="modal" data-bs-target="#rescheduleModal"
                                                th:data-aptid="${apt.id}">
                                            <i class="bi bi-arrow-repeat"></i>
                                        </button>
                                        <!-- Cancel -->
                                        <form th:action="@{/secretary/appointments/{id}/cancel(id=${apt.id})}"
                                              method="post" class="d-inline">
                                            <button type="submit" class="btn btn-sm btn-outline-danger rounded-pill"
                                                    onclick="return confirm('Cancel this appointment?')"
                                                    th:disabled="${apt.status == 'CANCELLED'}">
                                                <i class="bi bi-x"></i>
                                            </button>
                                        </form>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
                <div th:if="${appointments == null or appointments.isEmpty()}"
                     class="text-center py-5 text-muted">
                    <i class="bi bi-calendar2-x fs-1"></i>
                    <p class="mt-3">No appointments found.</p>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Reschedule Modal -->
<div class="modal fade" id="rescheduleModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header" style="background: var(--vix-crimson); color: white;">
                <h5 class="modal-title">Reschedule Appointment</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <form id="rescheduleForm" method="post">
                <div class="modal-body">
                    <label class="form-label">New Date &amp; Time</label>
                    <input type="datetime-local" name="newDateTime" class="form-control" required>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-primary rounded-pill">Confirm</button>
                </div>
            </form>
        </div>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
<script>
    document.getElementById('rescheduleModal').addEventListener('show.bs.modal', function(e) {
        var aptId = e.relatedTarget.getAttribute('data-aptid');
        document.getElementById('rescheduleForm').action = '/secretary/appointments/' + aptId + '/reschedule';
    });
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
