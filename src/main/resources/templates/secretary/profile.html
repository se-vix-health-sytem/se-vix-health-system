<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('My Profile')}"></head>
<body>
<div th:replace="~{fragments/dashboard-nav :: dashboardNav}"></div>

<div class="dashboard-content" style="margin-left: 280px;">
    <div class="container p-4" style="max-width: 700px;">

        <h2 class="font-display mb-4" style="color: var(--vix-crimson);">
            <i class="bi bi-person-circle me-2"></i>My Profile
        </h2>

        <div th:if="${employee != null}">
            <div class="card mb-4">
                <div class="card-header">Personal Information</div>
                <div class="card-body">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <div class="text-muted small">First Name</div>
                            <div class="fw-semibold" th:text="${employee.name}">-</div>
                        </div>
                        <div class="col-md-6">
                            <div class="text-muted small">Last Name</div>
                            <div class="fw-semibold" th:text="${employee.surname}">-</div>
                        </div>
                        <div class="col-md-6">
                            <div class="text-muted small">Employee ID</div>
                            <div th:text="${employee.id}">-</div>
                        </div>
                        <div class="col-md-6">
                            <div class="text-muted small">Role</div>
                            <div>
                                <span class="badge" style="background: var(--vix-crimson);">Secretary</span>
                            </div>
                        </div>
                        <div class="col-md-6" th:if="${employee.department != null}">
                            <div class="text-muted small">Department</div>
                            <div th:text="${employee.department.name}">-</div>
                        </div>
                        <div class="col-md-6" th:if="${employee.department == null}">
                            <div class="text-muted small">Department</div>
                            <div class="text-muted">Not assigned</div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="d-flex gap-2">
                <a th:href="@{/secretary/dashboard}" class="btn btn-outline-secondary rounded-pill">
                    <i class="bi bi-arrow-left me-1"></i>Back to Dashboard
                </a>
            </div>
        </div>

        <div th:if="${employee == null}" class="alert alert-warning">
            <i class="bi bi-exclamation-triangle me-2"></i>
            Could not load profile. Please <a th:href="@{/login}">log in</a> again.
        </div>

    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
