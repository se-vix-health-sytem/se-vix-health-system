spring.application.name=vix-health-system

# In-memory H2 for tests — same schema/data as dev, but isolated so tests
# can run while the app is also running (file-based H2 allows only one JVM at a time)
spring.datasource.url=jdbc:h2:mem:vixdb-test;MODE=PostgreSQL;DEFAULT_NULL_ORDERING=HIGH;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.h2.console.enabled=false

spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:database/schema.sql
spring.sql.init.data-locations=classpath:database/data.sql

spring.jpa.hibernate.ddl-auto=none
spring.jpa.defer-datasource-initialization=true
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.hibernate.naming.implicit-strategy=org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyJpaImpl

# Firebase disabled in tests — no service account file needed
firebase.enabled=false
firebase.service-account=classpath:firebase/firebase-service-account.json
firebase.web-api-key=test-key

server.port=0
